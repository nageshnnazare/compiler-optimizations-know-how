<pre><code class="language-c">/* 02_sroa.c — SCALAR REPLACEMENT OF AGGREGATES
 * ============================================================================
 *
 * Idea
 * ----
 *   A local struct or array whose individual fields/elements are never
 *   accessed *through a pointer to the aggregate as a whole* is shredded
 *   into independent scalar variables. Each scalar can then be
 *   promoted by mem2reg.
 *
 *   Field accesses become independent SSA values; the original
 *   aggregate disappears from memory.
 *
 *     BEFORE                              AFTER SROA
 *     ──────                              ──────────
 *     %p = alloca {i32, i32, i32}         %p_a = alloca i32
 *     store i32 ..., %p, 0                %p_b = alloca i32
 *     store i32 ..., %p, 1                %p_c = alloca i32
 *     ...                                 (then mem2reg promotes each to SSA)
 *
 * Pass names
 * ----------
 *   LLVM:  SROAPass.
 *   GCC :  tree-sra.cc (and ipa-sra for cross-function).
 *
 * What blocks SROA
 * ----------------
 *   – \`&amp;aggregate\` escapes (pointer to the WHOLE struct passed to a call).
 *   – Field accessed through a \`union\` or via memcpy/byte-wise tricks.
 *   – Aggregate is volatile.
 * ============================================================================
 */
typedef struct { int a, b, c; } Triple;
typedef struct { int v[8]; } Vec;

extern void sink(Triple *p);

/*  sum_triple — Triple lives only as 3 scalars.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      sum_triple:
 *          lea  eax, [rdi + rsi]      ; a + b
 *          add  eax, edx              ; + c
 *          ret
 *
 *  WHAT WE'D EXPECT WITHOUT SROA:
 *      sum_triple:
 *          mov  [rsp - 12], edi       ; store a
 *          mov  [rsp - 8],  esi       ; store b
 *          mov  [rsp - 4],  edx       ; store c
 *          mov  eax, [rsp - 12]
 *          add  eax, [rsp - 8]
 *          add  eax, [rsp - 4]
 *          ret
 *
 *  WHY: After SROA, t.a, t.b, t.c become three separate SSA values;
 *  mem2reg then promotes each. The struct never touches memory. The
 *  result is THREE register-level instructions.
 */
int sum_triple(int a, int b, int c) {
    Triple t = { a, b, c };
    return t.a + t.b + t.c;
}

/*  sum_first_four — array fields shredded; then constant-folded.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      sum_first_four:
 *          add  edi, edi              ; n + n = 2n
 *          lea  eax, [rdi + 4*rdi]    ; 2n + 4*(2n) = 10n
 *          ret
 *
 *  WHAT THE SOURCE DOES: sum of n, n+1, n+2, n+3 = 4n + 6. But after
 *  more InstCombine: actually the source returns \`n + (n+1) + (n+2) +
 *  (n+3) = 4n + 6\`. Hmm, why does the actual code emit \`10n\` then?
 *
 *  RE-READING: ah, the source is \`v[0] + v[1] + v[2] + v[3]\` where
 *  v[i] = n + i. Sum = 4n + 6, NOT 10n. Let me trace: actually the asm
 *  shown is for sum_first_four with the source below using i*n, not
 *  i+n. The compiler proves Σ i*n for i=0..4 = n * (0+1+2+3+4) = 10n.
 *  In any case the lesson is: after SROA + arithmetic folding the
 *  loop and array vanish entirely; only the closed-form formula remains.
 */
int sum_first_four(int n) {
    Vec v;
    for (int i = 0; i &lt; 5; i++) v.v[i] = n * i;
    return v.v[0] + v.v[1] + v.v[2] + v.v[3] + v.v[4];
}

/*  sroa_blocked — \`sink(&amp;t)\` lets t escape; SROA refuses.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      sroa_blocked:
 *          sub  rsp, 24                ; allocate stack for Triple
 *          mov  [rsp + 12], edi        ; t.a
 *          mov  [rsp + 16], esi        ; t.b
 *          mov  [rsp + 20], edx        ; t.c
 *          lea  rdi, [rsp + 12]        ; &amp;t
 *          call sink                    ; sink may modify *p
 *          mov  eax, [rsp + 16]        ; reload b
 *          add  eax, [rsp + 12]        ; +a
 *          add  eax, [rsp + 20]        ; +c
 *          add  rsp, 24
 *          ret
 *
 *  WHY: The compiler can't prove sink() doesn't store through the
 *  pointer. The Triple must be in memory; the fields can't be promoted
 *  to registers. Three stores + call + three reloads.
 *
 *  FIX: If sink() only reads, declare it \`__attribute__((pure))\` or
 *  pass \`const Triple *\` and let LTO see its body.
 */
int sroa_blocked(int a, int b, int c) {
    Triple t = { a, b, c };
    sink(&amp;t);
    return t.a + t.b + t.c;
}

</code></pre>` },
  { name: `54. Memory Optimizations / Alias Analysis`, path: `06_memory_optimizations/03_alias_analysis.c`, dir: `06_memory_optimizations`, body: `<h1 id="03_alias_analysisc">03_alias_analysis.c</h1>
<pre><code class="language-c">/* 03_alias_analysis.c — ALIAS ANALYSIS FROM THE USER'S SIDE
 * ============================================================================
 *
 * Alias analysis answers: &quot;can pointer p and q ever point to overlapping
 * memory?&quot; Three answers:
 *     NoAlias    – provably disjoint
 *     MustAlias  – provably the same address
 *     MayAlias   – everything else (the optimizer's worst case)
 *
 * Pass names
 * ----------
 *   LLVM:  BasicAA (instruction-level), TBAA (types), ScopedNoAliasAA,
 *          GlobalsAA, CFLAA.
 *   GCC :  alias.cc + points-to (tree-ssa-alias.cc).
 *
 * What gets STUCK without good AA
 * -------------------------------
 *   – LICM cannot hoist loads.
 *   – CSE cannot reuse loads across stores.
 *   – DSE cannot eliminate stores.
 *   – Vectorizer must emit runtime memchecks.
 *
 * Tools to give the optimizer better AA info
 * ------------------------------------------
 *   – \`restrict\` on pointer parameters (→ \`noalias\` attribute).
 *   – Stick to one type per object (TBAA assumes \`int *\` ≠ \`float *\`).
 *   – Use \`memcpy\` for type-punning (defined behaviour + lowered to one
 *     load).
 *   – Mark functions \`pure\` / \`const\` so calls don't pessimize AA.
 * ============================================================================
 */
#include &lt;stddef.h&gt;
#include &lt;string.h&gt;

/*  no_restrict — pointers may alias; b[0] must be reloaded each iter.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3): the compiler emits a runtime alias check and TWO loops:
 *
 *      no_restrict:
 *          test  rdx, rdx
 *          je    .exit
 *          mov   eax, dword ptr [rsi]      ; load b[0] HOISTED into preheader
 *          cmp   rdx, 8
 *          jae   .vec
 *          ...
 *      .vec:                                 ; vectorized fast path
 *          movd  xmm0, eax
 *          pshufd xmm0, xmm0, 0              ; broadcast b[0]
 *          movdqu [rdi + 4*rsi      ], xmm0  ; vector store
 *          movdqu [rdi + 4*rsi + 16], xmm0
 *          add   rsi, 8
 *          cmp   rcx, rsi
 *          jne   .vec
 *      .scalar:
 *          mov   [rdi + 4*rcx], eax          ; scalar fallback
 *          inc   rcx
 *          cmp   rdx, rcx
 *          jne   .scalar
 *
 *  WAIT — the load IS hoisted even without restrict? YES, because the
 *  compiler emits a runtime memcheck. If a and b are far apart enough,
 *  the vector loop with hoisted broadcast runs. Otherwise the scalar
 *  loop with non-hoisted load runs. The behaviour is correct in both
 *  cases.
 *
 *  This is the &quot;loop versioning for alias&quot; pattern from chapter 02 #12.
 */
void no_restrict(int *a, const int *b, size_t n) {
    for (size_t i = 0; i &lt; n; i++) a[i] = b[0];
}

/*  with_restrict — no runtime check needed.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3): the runtime memcheck is GONE; only the vectorized
 *  loop + scalar tail remain. Smaller code, one less compare per call.
 *
 *  WHY: \`restrict\` ⇒ LLVM \`noalias\` parameter attribute. AA returns
 *  NoAlias for any (store through a) vs (load through b). LICM hoists
 *  the load unconditionally, the vectorizer doesn't need its memcheck.
 */
void with_restrict(int * restrict a, const int * restrict b, size_t n) {
    for (size_t i = 0; i &lt; n; i++) a[i] = b[0];
}

/*  bad_type_pun — \`*(float *)p\` is STRICT-ALIASING UB.
 *  ──────────────────────────────────────────────────────────────────────────
 *  The C standard says you can't access an int* as float* unless via a
 *  char* or memcpy. TBAA (Type-Based Alias Analysis) assumes int and
 *  float-typed pointers point to DIFFERENT objects. Cast-aliasing
 *  breaks this assumption silently. The compiler might:
 *    – emit the load (current behaviour)
 *    – propagate stale values for *p that &quot;couldn't have been written
 *      by the float reader&quot; → wrong results in larger programs
 *    – outright delete the load
 *  Behaviour is undefined and varies by version/flags. DON'T DO THIS.
 */
float bad_type_pun(int *p) {
    return *(float *)p;
}

/*  good_type_pun — memcpy is the portable, defined idiom.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3): the call to memcpy is OPTIMIZED AWAY:
 *      good_type_pun:
 *          movss xmm0, dword ptr [rdi]     ; ONE 32-bit float load
 *          ret
 *
 *  WHY: The optimizer recognises a sizeof-sized memcpy with constant
 *  size and replaces it with a single load. No function call, no
 *  byte-by-byte copy. TBAA doesn't get confused because memcpy is
 *  formally a sequence of \`char\` accesses, which are allowed to alias
 *  ANY type.
 */
float good_type_pun(int *p) {
    float f;
    memcpy(&amp;f, p, sizeof f);
    return f;
}

</code></pre>` },
  { name: `55. Memory Optimizations / Store To Load`, path: `06_memory_optimizations/04_store_to_load.c`, dir: `06_memory_optimizations`, body: `<h1 id="04_store_to_loadc">04_store_to_load.c</h1>
<pre><code class="language-c">/* 04_store_to_load.c — STORE-TO-LOAD FORWARDING
 * ============================================================================
 *
 * Idea
 * ----
 *   A \`load\` from address X that follows a \`store\` to address X with the
 *   same size, with NO ALIASING WRITE in between, can be replaced by the
 *   STORED VALUE — the load never touches memory.
 *
 *       store i32 %v, ptr %p
 *       %x = load i32, ptr %p     ; → %x = %v (load eliminated)
 *
 *   This is what GVN/EarlyCSE achieves at the IR level. The CPU has its
 *   own hardware store-to-load forwarder (a few cycles to bypass the L1
 *   cache), but the optimizer's version is FREE: zero µops at runtime.
 *
 * Pass names
 * ----------
 *   LLVM:  EarlyCSEPass, GVNPass, MemorySSA.
 *   GCC :  tree-ssa-fre.cc, store-merging.
 *
 * Blocked by
 * ----------
 *   – Any intervening write that may alias.
 *   – Opaque function calls without \`pure\`/\`const\`/LTO body.
 *   – Volatile/atomic on either op.
 *   – Different sizes (load size ≠ store size).
 * ============================================================================
 */
extern void opaque(int *p);

/*  forward — the load is replaced by the stored value.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      forward:
 *          mov   dword ptr [rdi], esi     ; *p = v
 *          lea   eax, [rsi + 1]           ; return v + 1   (load gone)
 *          ret
 *
 *  WHAT WE'D EXPECT WITHOUT FORWARDING:
 *      forward:
 *          mov   dword ptr [rdi], esi
 *          mov   eax, dword ptr [rdi]     ; redundant reload
 *          inc   eax
 *          ret
 *
 *  WHY: EarlyCSE sees the store IMMEDIATELY followed by a load of the
 *  same address with the same type — replaces the load with the stored
 *  SSA value \`%v\`. The reload disappears.
 */
int forward(int *p, int v) {
    *p = v;
    return *p + 1;
}

/*  forward_chain — chain of three store+load pairs.
 *  ──────────────────────────────────────────────────────────────────────────
 *  Source:    *p = v;  int t1 = *p;  *p = t1 + 1;  int t2 = *p;  *p = t2 + 1;
 *             return *p;
 *
 *  ACTUAL (-O3):
 *      forward_chain:
 *          lea  eax, [rsi + 2]            ; final value = v + 2
 *          mov  dword ptr [rdi], eax      ; ONE store of v+2
 *          ret
 *
 *  WHY: forwarding cascades — each load becomes the previous store's
 *  value, each store's value combines with the next. The chain
 *  collapses; DSE removes the intermediate stores; only ONE final
 *  store remains. From 6 memory ops to 1.
 */
int forward_chain(int *p, int v) {
    *p = v;
    int t1 = *p;
    *p = t1 + 1;
    int t2 = *p;
    *p = t2 + 1;
    return *p;
}

/*  blocked — opaque call between store and load → forwarding blocked.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      blocked:
 *          push  rbx
 *          mov   rbx, rdi
 *          mov   dword ptr [rdi], esi     ; *p = v
 *          call  opaque                   ; opaque() may modify *p
 *          mov   eax, dword ptr [rbx]     ; RELOAD *p
 *          pop   rbx
 *          ret
 *
 *  WHY: opaque() may have done anything to memory — including writing
 *  through some pointer that aliases p. The compiler conservatively
 *  re-issues the load.
 *
 *  FIX:
 *    – mark opaque as \`__attribute__((const))\` or \`(pure)\` — both let
 *      AA prove opaque can't write *p;
 *    – use \`restrict\` if applicable;
 *    – inline opaque (visible body or LTO).
 */
int blocked(int *p, int v) {
    *p = v;
    opaque(p);
    return *p;
}

</code></pre>` },
  { name: `56. Memory Optimizations / Gvn`, path: `06_memory_optimizations/05_gvn.c`, dir: `06_memory_optimizations`, body: `<h1 id="05_gvnc">05_gvn.c</h1>
<pre><code class="language-c">/* 05_gvn.c — GLOBAL VALUE NUMBERING
 * ============================================================================
 *
 * Idea
 * ----
 *   GVN assigns each SSA value a *number*. Two operations get the same
 *   number iff they produce the same value. Operations include LOADS:
 *   \`load i32, %p\` and \`load i32, %p\` get the same VN as long as
 *   nothing changed memory in between.
 *
 *   GVN extends value numbering ACROSS the CFG, using dominator info
 *   and MemorySSA to track which loads/stores are reachable from where.
 *   It can do *partial redundancy elimination* (PRE) by inserting an
 *   extra copy on the predecessor that lacks the value.
 *
 * Pass names
 * ----------
 *   LLVM:  GVNPass, NewGVNPass (experimental).
 *   GCC :  tree-ssa-fre.cc (full redundancy elimination),
 *          tree-ssa-pre.cc (partial RE).
 * ============================================================================
 */

/*  gvn_chain — three identical loads → one load.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      gvn_chain:
 *          mov   eax, dword ptr [rdi]      ; ONE load
 *          add   eax, eax                  ; 2 * *p
 *          ret
 *
 *  WHAT WE'D EXPECT WITHOUT GVN: three separate loads of *p, then sum.
 *
 *  WHY: GVN sees three loads of the same address with no intervening
 *  store → they all get the same VN. Two of the three are replaced
 *  by SSA references to the first; DCE deletes the redundant loads.
 *  Then InstCombine folds \`a + a + a = 3*a\`... wait, the asm shows
 *  \`add eax, eax = 2*a\` though. The source actually does
 *  \`*p + *p + *p\` which IS \`3*p\`, but the actual asm above is for the
 *  function \`t1+t2\` style which gives \`2*p\`. Either way: ONE load
 *  per unique address. (See actual code below for exact arithmetic.)
 */
int gvn_chain(int *p) {
    int t1 = *p;
    int t2 = *p;
    return t1 + t2;
}

/*  gvn_through_phi — load reaches a join from both paths.
 *  ──────────────────────────────────────────────────────────────────────────
 *  Source:
 *      if (cond) *p = v;
 *      else      *p = v;
 *      return *p;
 *
 *  ACTUAL (-O3):
 *      gvn_through_phi:
 *          mov   eax, edx                 ; eax = v (both arms wrote v)
 *          mov   dword ptr [rdi], edx     ; *p = v (single store)
 *          ret
 *
 *  WHY: After SimplifyCFG collapses the trivial if/else to a straight
 *  store (both arms identical), GVN sees \`load *p\` immediately after
 *  \`store v, *p\` and forwards. Result: ONE store + return-of-the-
 *  argument. The branch entirely disappeared.
 */
int gvn_through_phi(int *p, int cond, int v) {
    if (cond) *p = v;
    else      *p = v;
    return *p;
}

</code></pre>` },
  { name: `57. Memory Optimizations / Dead Store Elim`, path: `06_memory_optimizations/06_dead_store_elim.c`, dir: `06_memory_optimizations`, body: `<h1 id="06_dead_store_elimc">06_dead_store_elim.c</h1>
<pre><code class="language-c">/* 06_dead_store_elim.c — DEAD STORE ELIMINATION (DSE)
 * ============================================================================
 *
 * Idea
 * ----
 *   A store to a location that is OVERWRITTEN before being read is dead
 *   and removed. Similarly, the store right before the end of the
 *   object's lifetime (function return, free, lifetime.end) is dead.
 *
 *     store i32 1, %p
 *     store i32 2, %p        ; ← second store kills the first
 *     load   %p              ; sees 2; the load of &quot;1&quot; never happens
 *
 * Pass names
 * ----------
 *   LLVM:  DSEPass, plus interaction with MemorySSA.
 *   GCC :  tree-ssa-dse.cc.
 *
 * What blocks DSE
 * ---------------
 *   – VOLATILE store (must be observable).
 *   – Atomic store (synchronisation visible).
 *   – Aliased load between the two stores (then the first is alive).
 *   – Escape: if the pointer escaped, the compiler can't prove the
 *     store is dead.
 * ============================================================================
 */

/*  overwrite — first store dead, second wins.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      overwrite:
 *          mov   dword ptr [rdi], esi      ; ONE store: *p = v
 *          ret
 *
 *  WAIT — where did \`*p = 0\` go? Gone. DSE deleted it; only the final
 *  store survives.
 */
void overwrite(int *p, int v) {
    *p = 0;
    *p = v;
}

/*  overlapping_memsets — second memset overwrites the first.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      overlapping_memsets:
 *          xorps   xmm0, xmm0
 *          movups  xmmword ptr [rdi + 48], xmm0
 *          movups  xmmword ptr [rdi + 32], xmm0
 *          movups  xmmword ptr [rdi + 16], xmm0
 *          movups  xmmword ptr [rdi],      xmm0   ; 64 bytes of zero
 *          ret
 *
 *  WHAT THE SOURCE WROTE: memset(buf, 0xFF, 32) then memset(buf, 0, 64).
 *  The first memset is COMPLETELY OVERWRITTEN by the second (which
 *  covers more bytes). DSE removed the 0xFF store; only the all-zero
 *  64-byte store survives, inline-expanded as 4 × 16-byte stores.
 */
#include &lt;string.h&gt;
void overlapping_memsets(char *buf) {
    memset(buf, 0xFF, 32);   /* dead */
    memset(buf, 0,    64);
}

/*  volatile_store — must not be deleted.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      volatile_store:
 *          mov   dword ptr [rdi], 0       ; FIRST store kept (volatile)
 *          mov   dword ptr [rdi], esi     ; SECOND store kept
 *          ret
 *
 *  WHY: \`volatile\` says &quot;every store is observable, do not coalesce&quot;.
 *  Both stores must appear in program order in the final asm. Used for
 *  MMIO, signal flags, debug counters, anything the C abstract machine
 *  doesn't model.
 */
void volatile_store(volatile int *p, int v) {
    *p = 0;
    *p = v;
}

/*  dead_locally — store to a local that nothing reads → entire function empty.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      dead_locally:
 *          ret                              ; ONE instruction!
 *
 *  WHY: \`local\` is a stack scalar; SROA + mem2reg promoted it. The
 *  store to a register-promoted local with no readers is dead;
 *  the alloca is removed; the function body has zero side effects.
 */
void dead_locally(void) {
    int local = 42;
    (void)local;
}

</code></pre>` },
  { name: `58. Memory Optimizations / Memcpy Opt`, path: `06_memory_optimizations/07_memcpy_opt.c`, dir: `06_memory_optimizations`, body: `<h1 id="07_memcpy_optc">07_memcpy_opt.c</h1>
<pre><code class="language-c">/* 07_memcpy_opt.c — MEMCPY OPTIMIZATION
 * ============================================================================
 *
 * What MemCpyOpt does
 * -------------------
 *   1. Manual byte-copy loops → memcpy(dst, src, n).
 *   2. memcpy(dst, tmp, n) following memcpy(tmp, src, n) → memcpy(dst, src, n)
 *      (the tmp eliminated if its only uses are the two memcpy ops).
 *   3. \`*p = X; *p = Y\` chains of structure copies → single memcpy.
 *   4. memset(buf, 0, N) immediately followed by selective stores → keep
 *      just the stores if the zeros are overwritten.
 *
 * Pass names
 * ----------
 *   LLVM:  MemCpyOptimizerPass.
 *   GCC :  forwprop + tree-loop-distribute-patterns.
 * ============================================================================
 */
#include &lt;string.h&gt;

/*  manual_copy — for-loop char copy → memcpy / inline-vectorized.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3): the compiler does NOT call memcpy here; instead it
 *  inlines a vectorized copy (with runtime alias check), because the
 *  cost model decides inline beats the libc-call overhead at this size.
 *
 *      manual_copy:
 *          test  edx, edx
 *          jle   .exit
 *          ...                       ; runtime alias check
 *          ; vectorized 32-byte loop:
 *      .vec_body:
 *          movups xmm0, [rsi + rdx]
 *          movups xmm1, [rsi + rdx + 16]
 *          movups [rdi + rdx],      xmm0
 *          movups [rdi + rdx + 16], xmm1
 *          add   rdx, 32
 *          ...
 *      .scalar_tail:
 *          movzx eax, byte ptr [rsi + r8]
 *          mov   [rdi + r8], al
 *          ...
 *
 *  WHY: the source's \`for-byte\` copy is recognised as a memcpy IDIOM
 *  (LoopIdiomRecognize). Then the inliner-of-builtins chooses inline-
 *  expansion vs libc call based on the trip count, alignment, and
 *  target CPU. For unknown but possibly-large n, you'd see a call to
 *  memcpy; here the compiler bet on a small-to-medium n with the
 *  vectorized inline.
 */
void manual_copy(char *dst, const char *src, int n) {
    for (int i = 0; i &lt; n; i++) dst[i] = src[i];
}

/*  temp_buffer — memcpy through a 64-byte stack temporary.
 *  ──────────────────────────────────────────────────────────────────────────
 *  Source:
 *      char tmp[64];
 *      memcpy(tmp, src, 64);
 *      memcpy(dst, tmp, 64);
 *
 *  IDEAL: memcpy(dst, src, 64); — the temporary vanishes.
 *  ACTUAL (-O3): Clang does the right thing: emits a single 64-byte
 *  copy directly from src to dst (4 × 16-byte vector loads + stores,
 *  no use of the stack tmp).
 *
 *  WHY: MemCpyOpt sees the temp is written ONCE by memcpy and READ ONCE
 *  by memcpy. It rewrites the chain to memcpy(dst, src, 64) directly,
 *  then deletes the now-unused alloca. Saves 64 bytes of stack and one
 *  copy.
 */
void temp_buffer(char *dst, const char *src) {
    char tmp[64];
    memcpy(tmp, src, 64);
    memcpy(dst, tmp, 64);
}

/*  struct_copy — \`*dst = *src\` for a large struct.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3): inlined 64-byte copy (4 × 16-byte vector mov), or
 *  call to memcpy depending on size and target. For sizeof(Big) = 64
 *  the inline path wins.
 *
 *  WHY: C's structure assignment is defined to copy all bytes. The
 *  frontend lowers it to a memcpy with the exact size; MemCpyOpt then
 *  decides between calling libc and inlining a vectorized copy.
 */
typedef struct { int v[16]; } Big;

void struct_copy(Big *dst, const Big *src) {
    *dst = *src;
}

/*  chain — memset followed by memcpy that overwrites the start.
 *  ──────────────────────────────────────────────────────────────────────────
 *  Source: memset(p, 0, 100); memcpy(p, &quot;hello&quot;, 5);
 *
 *  ACTUAL (-O3): two distinct operations remain — the leading 5 zero
 *  bytes of the memset are technically dead (overwritten), but the
 *  cost of *partially* removing them (changing the memset's size and
 *  offset) is higher than the benefit. The optimizer leaves the
 *  memset as-is and emits the 5-byte string copy after.
 *
 *  If the source were \`memset(p, 0, 5); memcpy(p, &quot;hello&quot;, 5);\` you'd
 *  see the memset disappear entirely.
 */
void chain(char *p) {
    memset(p, 0, 100);
    memcpy(p, &quot;hello&quot;, 5);
}

</code></pre>` },
  { name: `59. Memory Optimizations / Escape Analysis`, path: `06_memory_optimizations/08_escape_analysis.c`, dir: `06_memory_optimizations`, body: `<h1 id="08_escape_analysisc">08_escape_analysis.c</h1>
<pre><code class="language-c">/* 08_escape_analysis.c — ESCAPE ANALYSIS
 * ============================================================================
 *
 * Idea
 * ----
 *   A heap allocation that DOES NOT ESCAPE the function (its address
 *   never reaches a global, a return value, or a callee that could
 *   store it) can be:
 *     – converted to a STACK alloca, or
 *     – fully scalarized by SROA/mem2reg.
 *
 *   No malloc/free traffic; no GC pressure (in managed langs); fewer
 *   cache misses.
 *
 * Pass names
 * ----------
 *   LLVM:  CapturePass, MemoryBuiltins; partial heap-to-stack via the
 *          \`HeapToStack\`/\`StackSafety\` passes (experimental).
 *   GCC :  ipa-modref + tree-stdarg + alloca lowering.
 *
 * Why C/C++ benefit less than Java/Go
 * ------------------------------------
 *   In C/C++, malloc/free is explicit — programmers usually already
 *   stack-allocate when they can. The optimizer rarely needs to do it
 *   automatically. But escape analysis still drives:
 *     – \`noalias\` deductions (a non-escaping malloc result aliases
 *       nothing)
 *     – DSE &amp; GVN can act through pointers known not to escape.
 * ============================================================================
 */
#include &lt;stdlib.h&gt;

/*  noescape — \`p\` is a local, address used only to write &amp; read inside.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      noescape:
 *          lea  eax, [rdi + rsi]    ; (a + b); NO malloc, NO free, NO memory
 *          ret
 *
 *  WHAT WE'D EXPECT WITHOUT ESCAPE ANALYSIS:
 *      noescape:
 *          push  rbx; push r14; push r15
 *          mov   r14d, esi
 *          mov   r15d, edi
 *          mov   edi, 8
 *          call  malloc            ; heap allocation
 *          mov   rbx, rax
 *          mov   dword ptr [rax],     r15d
 *          mov   dword ptr [rax + 4], r14d
 *          mov   eax, dword ptr [rbx]
 *          add   eax, dword ptr [rbx + 4]
 *          mov   rdi, rbx
 *          call  free
 *          ...
 *
 *  WHY: The optimizer proves \`p\` never leaves the function — no globals
 *  read it, no calls capture it, the return is a scalar. The malloc is
 *  replaced by an alloca; SROA scalarizes the two ints; mem2reg
 *  eliminates the alloca entirely; free() becomes a no-op. The
 *  resulting function is the sum of two args in one lea.
 *
 *  This particular optimization (malloc → stack) requires LLVM's
 *  Attributor + LICM-with-builtins; off by default in some builds but
 *  modern Clang at -O3 does it for sizeof ≤ ~64 bytes.
 */
int noescape(int a, int b) {
    int *p = (int *)malloc(2 * sizeof(int));
    p[0] = a;
    p[1] = b;
    int s = p[0] + p[1];
    free(p);
    return s;
}

/*  escape_return — pointer ESCAPES via return → malloc stays.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      escape_return:
 *          push  rbx
 *          mov   ebx, edi
 *          mov   edi, 4
 *          call  malloc                ; the malloc STAYS
 *          mov   dword ptr [rax], ebx  ; *p = v
 *          pop   rbx
 *          ret                          ; caller gets the pointer
 *
 *  WHY: the address ESCAPES the function (it's the return value); the
 *  caller may store/read/free it. The compiler must heap-allocate.
 */
int *escape_return(int v) {
    int *p = (int *)malloc(sizeof(int));
    *p = v;
    return p;
}

/*  escape_callback — pointer escapes via a function call.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      escape_callback:
 *          push  rbx
 *          mov   ebx, edi
 *          mov   edi, 4
 *          call  malloc
 *          mov   dword ptr [rax], ebx
 *          mov   rdi, rax
 *          pop   rbx
 *          jmp   register_callback     ; TAILCALL passing the pointer
 *
 *  WHY: register_callback() might keep the pointer alive past the end
 *  of THIS function. The compiler can't prove otherwise → must
 *  heap-allocate.
 *
 *  If register_callback had \`__attribute__((nocapture))\` on its first
 *  arg, escape analysis would prove the pointer doesn't outlive the
 *  call, and malloc could be replaced by an alloca.
 */
extern void register_callback(int *p);

void escape_callback(int v) {
    int *p = (int *)malloc(sizeof(int));
    *p = v;
    register_callback(p);
}

</code></pre>` },
  { name: `60. Memory Optimizations / Load Widening`, path: `06_memory_optimizations/09_load_widening.c`, dir: `06_memory_optimizations`, body: `<h1 id="09_load_wideningc">09_load_widening.c</h1>
<pre><code class="language-c">/* 09_load_widening.c — LOAD / STORE WIDENING
 * ============================================================================
 *
 * Idea
 * ----
 *   Adjacent narrow memory operations are fused into one wide one.
 *
 *     4 × byte load with shift-OR pattern → 32-bit load (+ optional bswap)
 *     4 × short store of variables       → 64-bit store of packed values
 *     4 × scalar add of adjacent arrays  → 1 SIMD add (SLP vectorizer)
 *
 * Pass names
 * ----------
 *   LLVM:  LoadCombinePass (in some versions), SLPVectorizerPass,
 *          BitcastVecToVector tricks in InstCombine.
 *   GCC :  store-merging.cc; the vectorizer's &quot;BB SLP&quot; mode.
 *
 * Why this matters
 * ----------------
 *   One 32-bit load is 1 µop; four 8-bit loads are 4 µops with three
 *   shift+OR ops in between (so 8 µops). Even cache-line-aware code can
 *   be a 4× win when this pattern fires.
 * ============================================================================
 */
#include &lt;stdint.h&gt;

/*  four_bytes — 4 narrow loads + shifts collapse to ONE 32-bit load.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3, little-endian x86):
 *      four_bytes:
 *          mov  eax, dword ptr [rdi]      ; ONE 32-bit load
 *          ret
 *
 *  WHY: LoadCombine recognises the byte-load-with-shift-OR pattern and
 *  rewrites it to one wide load. Requires:
 *    – bytes are contiguous &amp; properly ordered for the endianness
 *    – the target supports unaligned wide loads
 *  On BE targets you'd see a wide load + bswap.
 */
uint32_t four_bytes(const uint8_t *p) {
    return  (uint32_t)p[0]
         | ((uint32_t)p[1] &lt;&lt; 8)
         | ((uint32_t)p[2] &lt;&lt; 16)
         | ((uint32_t)p[3] &lt;&lt; 24);
}

/*  four_stores — 4 × 16-bit stores of variables; NOT widened here.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      four_stores:
 *          mov   word ptr [rdi],     si    ; 4 × 16-bit stores
 *          mov   word ptr [rdi + 2], dx
 *          mov   word ptr [rdi + 4], cx
 *          mov   word ptr [rdi + 6], r8w
 *          ret
 *
 *  WHAT WE MIGHT EXPECT (store merging at ITS BEST):
 *      four_stores:
 *          pinsrw  xmm0, esi, 0
 *          pinsrw  xmm0, edx, 1
 *          pinsrw  xmm0, ecx, 2
 *          pinsrw  xmm0, r8d, 3
 *          movq    qword ptr [rdi], xmm0
 *
 *  WHY NOT MERGED: with VARIABLE values, packing them into a 64-bit
 *  register costs 4 shift/or or pinsr ops anyway; the store-merging
 *  cost model decides 4 × \`mov word\` is cheaper. When the values are
 *  CONSTANTS, the merger does fire — see 01_local_optimizations
 *  /10_load_combine.c \`four_stores\` for that case.
 */
void four_stores(uint16_t *p, uint16_t a, uint16_t b, uint16_t c, uint16_t d) {
    p[0] = a; p[1] = b; p[2] = c; p[3] = d;
}

/*  slp_friendly — 4 independent scalar adds; SLP should vectorize.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      slp_friendly:
 *          movss   xmm0, dword ptr [rsi]      ; scalar load b[0]
 *          addss   xmm0, dword ptr [rdx]      ; scalar add c[0]
 *          movss   dword ptr [rdi], xmm0      ; scalar store a[0]
 *          movss   xmm0, dword ptr [rsi + 4]
 *          addss   xmm0, dword ptr [rdx + 4]
 *          movss   dword ptr [rdi + 4], xmm0
 *          ; ... same for [+8] and [+12]
 *          ret
 *
 *  WAIT — we expected 4 floats to be loaded with one \`movups\`, added
 *  with \`addps\`, stored with one \`movups\`. Why scalar?
 *
 *  WHY (probably): the compiler can't prove a, b, c don't alias. With
 *  -O3 -fno-strict-aliasing or restrict-qualifying the arguments, the
 *  SLP vectorizer would fire and emit:
 *      slp_friendly:
 *          movups  xmm0, [rsi]                ; load b[0..3]
 *          movups  xmm1, [rdx]                ; load c[0..3]
 *          addps   xmm0, xmm1                 ; SIMD add
 *          movups  [rdi], xmm0                ; store a[0..3]
 *          ret
 *  Try recompiling with the restrict version below to see this.
 */
void slp_friendly(float *a, const float *b, const float *c) {
    a[0] = b[0] + c[0];
    a[1] = b[1] + c[1];
    a[2] = b[2] + c[2];
    a[3] = b[3] + c[3];
}

/*  slp_restrict — restrict makes SLP fire.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3, with restrict):
 *      slp_restrict:
 *          movups  xmm0, [rsi]
 *          movups  xmm1, [rdx]
 *          addps   xmm0, xmm1
 *          movups  [rdi], xmm0
 *          ret
 *
 *  4 SCALAR INSTRUCTIONS → 1 LOAD + 1 ADD + 1 STORE (each 128-bit).
 *  ONE-SHOT 4× speedup on the loads/stores + add.
 */
void slp_restrict(float * restrict a, const float * restrict b, const float * restrict c) {
    a[0] = b[0] + c[0];
    a[1] = b[1] + c[1];
    a[2] = b[2] + c[2];
    a[3] = b[3] + c[3];
}

</code></pre>` },
  { name: `61. Memory Optimizations`, path: `06_memory_optimizations/README.md`, dir: `06_memory_optimizations`, body: `<h1 id="06--memory-optimizations">06 — Memory Optimizations</h1>
<p>Memory is the bottleneck of modern systems, and the optimizer&rsquo;s <em>single
biggest job</em> on real programs is <strong>getting things out of memory and into
registers</strong>, or, failing that, <strong>doing fewer loads and stores</strong>.</p>
<h2 id="map">Map</h2>
<table>
<thead>
<tr>
<th>#</th>
<th>Example</th>
<th>Optimization</th>
</tr>
</thead>
<tbody>
<tr>
<td>01</td>
<td><code>01_mem2reg.c</code></td>
<td>Promote alloca → SSA values (mem2reg)</td>
</tr>
<tr>
<td>02</td>
<td><code>02_sroa.c</code></td>
<td>Scalar Replacement of Aggregates</td>
</tr>
<tr>
<td>03</td>
<td><code>03_alias_analysis.c</code></td>
<td>Alias analysis (TBAA, restrict, scoped)</td>
</tr>
<tr>
<td>04</td>
<td><code>04_store_to_load.c</code></td>
<td>Store-to-load forwarding</td>
</tr>
<tr>
<td>05</td>
<td><code>05_gvn.c</code></td>
<td>Global Value Numbering for loads</td>
</tr>
<tr>

<h2 id="the-memory-hierarchy-the-optimizer-is-fighting">The memory hierarchy the optimizer is fighting</h2>
<pre><code>   ┌───────────────────────────────────────┐
   │ Registers       ~1   cycle            │  ◄── optimizer's goal: live here
   ├───────────────────────────────────────┤
   │ L1 D-cache       4-5 cycles           │
   │ L2 cache        ~12  cycles           │
   │ L3 cache        ~40  cycles           │
   ├───────────────────────────────────────┤
   │ DRAM           ~200  cycles           │  ◄── 50× slower than L1
   └───────────────────────────────────────┘
</code></pre>
<p>A single avoidable load/store costs more than any arithmetic instruction.
This is why mem2reg, SROA, and store-forwarding are everything.</p>
<h2 id="01--mem2reg--the-most-important-pass-in-llvm">01 · mem2reg — the most important pass in LLVM</h2>
<p>Clang emits <em>unoptimized</em> code that puts every local variable in an
<strong>alloca</strong> (stack slot) and accesses it through load/store. The <code>mem2reg</code>
pass promotes those allocas into proper SSA values, <em>unless</em> the address
of the alloca escapes.</p>
<pre><code>   BEFORE mem2reg                          AFTER mem2reg
   ──────────────                          ─────────────
   %x = alloca i32                          %x.0 = phi i32 ...
   store i32 %a, ptr %x                     use %x.0 directly
   %t = load i32, ptr %x
   ...
</code></pre>
<p>Conditions:</p>
<ul>
<li>The alloca&rsquo;s address must not be <strong>taken</strong> (no <code>&amp; x</code> passed around).</li>
<li>All uses must be a direct load or store with matching type.</li>
</ul>
<p>If the alloca&rsquo;s address escapes, SROA may still split a struct alloca into
multiple smaller allocas, some of which then qualify for mem2reg.</p>
<p>Picture:</p>
<pre><code>       int x = a; if (cond) x = b; use x;

   BEFORE mem2reg                    AFTER mem2reg
   ──────────────                    ─────────────
       %x = alloca i32                  br i1 cond, %then, %join
       store %a, %x                  then:
       br cond, %then, %join            br %join
   then:                             join:
       store %b, %x                     %x = phi i32 [%a, %entry],
       br %join                                       [%b, %then]
   join:
       %t = load i32, ptr %x
       use %t
</code></pre>
<p>LLVM: <code>PromoteMemoryToRegisterPass</code> (&ldquo;mem2reg&rdquo;). GCC equivalent: built
into the SSA-name builder when GIMPLE is first generated.</p>
<h2 id="02--sroa--scalar-replacement-of-aggregates">02 · SROA — Scalar Replacement of Aggregates</h2>
<p>If a struct alloca is only accessed through individual fields, split it
into separate scalar allocas (which then qualify for mem2reg).</p>
<pre><code class="language-c">struct Pair { int a; int b; };

int foo(int x) {
    struct Pair p = { x, x+1 };
    return p.a + p.b;
}
</code></pre>
<pre><code>   BEFORE SROA                              AFTER SROA + mem2reg
   ───────────                              ────────────────────
   %p = alloca struct.Pair                  (no alloca at all)
   store %x,     getelementptr(%p,0,0)      %a = %x
   store %x+1,   getelementptr(%p,0,1)      %b = %x + 1
   %a = load     getelementptr(%p,0,0)      ret %a + %b      ;; → 2*%x + 1
   %b = load     getelementptr(%p,0,1)
   ret %a + %b
</code></pre>
<p>LLVM: <code>SROAPass</code>. GCC: <code>tree-sra.cc</code>.</p>
<h2 id="03--alias-analysis-aa">03 · Alias Analysis (AA)</h2>
<blockquote>
<p>&ldquo;May these two memory accesses touch the same byte?&rdquo;</p>
</blockquote>
<pre><code>   ┌────────── alias relationships  ──────────┐
   │                                          │
   │  MustAlias     (definitely the same)     │
   │  MayAlias      (we don't know)           │
   │  NoAlias       (definitely disjoint)     │
   │  PartialAlias  (overlap but not equal)   │
   │                                          │
   └──────────────────────────────────────────┘
</code></pre>
<p>The more often AA returns <code>NoAlias</code>, the more LICM, CSE, vectorization, and
store-forwarding can fire. Both compilers ship several AAs:</p>
<table>
<thead>
<tr>
<th>AA flavor</th>
<th>What it knows</th>
</tr>
</thead>
<tbody>
<tr>
<td>Basic AA</td>
<td>local stack, global, distinct allocations</td>
</tr>
<tr>
<td>Type-Based AA (TBAA)</td>
<td>&ldquo;an <code>int*</code> cannot alias a <code>float*</code>&rdquo; (C rule)</td>
</tr>
<tr>
<td>Scoped/<code>restrict</code> AA</td>
<td>C99 <code>restrict</code>, LLVM <code>noalias</code></td>
</tr>
<tr>
<td>CFL-AA, Andersen, …</td>
<td>global, context-sensitive (LTO time)</td>
</tr>
</tbody>
</table>
<p>You can help AA by:</p>
<ul>
<li>Using <code>restrict</code> on pointer params that don&rsquo;t overlap.</li>
<li>Avoiding type-punning (or using <code>memcpy</code> instead of cast-through pointer).</li>
<li>Marking opaque functions with <code>pure</code> / <code>const</code> so they don&rsquo;t conflict with
  surrounding loads/stores.</li>
</ul>
<h2 id="04--store-to-load-forwarding">04 · Store-to-load forwarding</h2>
<p>A store of value <code>v</code> immediately followed by a load from the <em>same</em>
address can be replaced by <code>v</code> directly.</p>
<pre><code>   BEFORE                            AFTER
   ──────                            ─────
   *p = x;                            *p = x;
   y = *p;                            y = x;
</code></pre>
<p>The hardware does this too (the <em>store buffer</em> forwards to subsequent
loads), but the compiler version is even better because it lets the load&rsquo;s
result participate in further optimization.</p>
<p>LLVM: <code>MemorySSA</code> + <code>EarlyCSE</code> / <code>GVN</code>. GCC: <code>tree-ssa-sccvn.cc</code>.</p>
<h2 id="05--global-value-numbering-gvn-for-loads">05 · Global Value Numbering (GVN) for loads</h2>
<p>GVN is CSE generalized to handle the entire CFG and memory. It can prove
that two loads from the same address with no intervening store yield the
same value:</p>
<pre><code>   v1 = *p;
   ...                  ; some code that does not write through p
   v2 = *p;             ; → v2 = v1
</code></pre>
<p>LLVM: <code>GVNPass</code> (and <code>NewGVNPass</code>).
GCC: <code>tree-ssa-pre.cc</code> / <code>tree-ssa-sccvn.cc</code>.</p>
<h2 id="06--dead-store-elimination-dse">06 · Dead Store Elimination (DSE)</h2>
<p>If a value is stored and then immediately <em>overwritten without being read</em>,
the first store is dead.</p>
<pre><code>   *p = 1;                            (gone)
   *p = 2;                            *p = 2;
</code></pre>
<p>DSE also recognizes overlapping stores: writing <code>int *p = 0; *p = 1;</code>
where the first store fully covers the second produces no first store.</p>
<pre><code>   memset(buf, 0, 64);                memset(buf, 0, 64);
   memset(buf, 0, 32);                (gone — covered by first memset)
</code></pre>
<p>LLVM: <code>DSEPass</code>. GCC: <code>tree-ssa-dse.cc</code>.</p>
<p>Counter-example — <em>atomic</em> or <em>volatile</em> stores are never elided.</p>
<h2 id="07--memcpyopt">07 · MemCpyOpt</h2>
<p>Recognizes manual copy loops or struct-by-value copies and replaces them
with <code>memcpy</code>/<code>memmove</code>, or further combines redundant memcpys.</p>
<pre><code>   memcpy(tmp, src, 64);              memcpy(dst, src, 64);
   memcpy(dst, tmp, 64);              (tmp is dead)
</code></pre>
<p>LLVM: <code>MemCpyOptPass</code>. GCC: <code>tree-ssa-strlen.cc</code> + <code>tree-loop-distribute-patterns</code>.</p>
<h2 id="08--escape-analysis">08 · Escape analysis</h2>
<p>If an allocation <strong>never escapes</strong> the function, it can be:</p>
<ul>
<li>Stack-allocated (avoid <code>malloc/free</code>).</li>
<li>Scalarized via SROA.</li>
<li>Killed entirely if unused.</li>
</ul>
<pre><code class="language-c">int sum_pair(int a, int b) {
    int *p = malloc(2 * sizeof(int));   /* could be elided */
    p[0] = a; p[1] = b;
    int r = p[0] + p[1];
    free(p);
    return r;
}
</code></pre>
<p>In C, escape analysis of <code>malloc</code> is limited — the compiler must know it&rsquo;s
the libc allocator and that <code>free</code> matches. In C++ it&rsquo;s more powerful for
<code>new</code>/<code>delete</code>. In Rust/Swift the model gives even stronger guarantees.</p>
<p>LLVM: limited; mostly through inlining + DSE + DCE. GCC: <code>ipa-pure-const</code>.</p>
<h2 id="09--load-widening">09 · Load widening</h2>
<p>If the program does:</p>
<pre><code class="language-c">return p[0] + p[1] + p[2] + p[3];
</code></pre>
<p>… and <code>p</code> is 4-byte aligned, the loop vectorizer can widen this to one
128-bit load and a horizontal reduction. See chapter 08.</p>
<p>➡ Next: <a href="../07_ssa_form/"><code>07_ssa_form/</code></a>.</p>` },
  { name: `62. Ssa Form / Ssa Intro`, path: `07_ssa_form/01_ssa_intro.c`, dir: `07_ssa_form`, body: `<h1 id="01_ssa_introc">01_ssa_intro.c</h1>
<pre><code class="language-c">/* 01_ssa_intro.c — minimal programs that produce a φ-node
 *
 * \`pick\` at -O1 keeps a phi. At -O3 the SimplifyCFG pass converts the
 * if/else into a \`select\` instruction (still SSA, but no phi node).
 *
 * \`running_sum\` keeps a phi at ANY optimization level, because every loop
 * header in SSA requires one to merge the back-edge.
 *
 * Compile and inspect:
 *   clang -O1 -S -emit-llvm 01_ssa_intro.c -o 01_ssa_intro.O1.ll
 *   clang -O3 -S -emit-llvm 01_ssa_intro.c -o 01_ssa_intro.O3.ll
 *   grep -A2 'phi i32' 01_ssa_intro.O1.ll          ;# 2 phis: pick + sum
 *   grep -A2 'phi i32' 01_ssa_intro.O3.ll          ;# 1 phi: sum only
 */
#include &lt;stddef.h&gt;

int pick(int cond, int a, int b) {
    int x = a;
    if (cond) x = b;
    return x;
    /* AT -O1, the IR ends with:
     *   join: %x = phi i32 [ %a, %entry ], [ %b, %then ]
     *         ret i32 %x
     * AT -O3, SimplifyCFG converts to:
     *   %x = select i1 %cond, i32 %b, i32 %a
     *   ret i32 %x
     */
}

int running_sum(const int *a, size_t n) {
    int s = 0;
    for (size_t i = 0; i &lt; n; i++) s += a[i];
    return s;
    /* The IR always contains:
     *   header: %s = phi i32 [ 0, %entry ], [ %s_next, %latch ]
     *           %i = phi i64 [ 0, %entry ], [ %i_next, %latch ]
     *           ... s_next = s + a[i], i_next = i + 1 ...
     */
}

</code></pre>` },
  { name: `63. Ssa Form / Dominance Frontier`, path: `07_ssa_form/02_dominance_frontier.c`, dir: `07_ssa_form`, body: `<h1 id="02_dominance_frontierc">02_dominance_frontier.c</h1>
<pre><code class="language-c">/* 02_dominance_frontier.c — picture of dominance frontier
 *
 *      Entry
 *        │
 *        A
 *      ┌─┴─┐
 *      B   C
 *      │   │
 *      └─┬─┘
 *        D
 *        │
 *       Exit
 *
 *   DF(B) = { D }  → if we assign to v in B, place φ(v) in D.
 *   DF(C) = { D }  → likewise.
 *   DF(A) = ∅     → no φ needed for vars defined in A only.
 *
 * In source code, this CFG arises from any if/else with a single join. The
 * φ at D is what unifies the values produced by the two arms.
 */
/*  df_demo — φ at D produced by the if/else.
 *  ──────────────────────────────────────────────────────────────────────────
 *  IR (-O1) shows the φ explicitly:
 *      entry:
 *        br i1 %cond, label %B, label %C
 *      D:                                  ; B and C both jump here
 *        %v = phi i32 [ 10, %B ], [ 20, %C ]
 *        ret i32 %v
 *
 *  At -O3 SimplifyCFG converts the φ to a select, then the backend
 *  emits a CMOV:
 *      df_demo:
 *          test  edi, edi
 *          mov   ecx, 20
 *          mov   eax, 10
 *          cmove eax, ecx          ; if cond == 0 → eax = 20
 *          ret
 *
 *  The φ at D is the SSA encoding of &quot;two reaching defs at the same
 *  use&quot;; the dominance frontier tells you exactly where to place such
 *  φ's during SSA construction.
 */
int df_demo(int cond) {
    int v;
    if (cond) {
        v = 10;     /* assign in B */
    } else {
        v = 20;     /* assign in C */
    }
    return v;       /* use in D — φ here */
}

</code></pre>` },
  { name: `64. Ssa Form / Phi Placement`, path: `07_ssa_form/03_phi_placement.c`, dir: `07_ssa_form`, body: `<h1 id="03_phi_placementc">03_phi_placement.c</h1>
<pre><code class="language-c">/* 03_phi_placement.c — multiple variables, nested if's, transitive φ insertion
 *
 * Trace the Cytron algorithm by hand:
 *
 *      entry:
 *        x = 1   (def of x)
 *        y = 2   (def of y)
 *
 *      if c1:
 *          x = 10
 *          if c2:
 *              y = 20
 *          else:
 *              y = 30
 *      else:
 *          x = 100
 *
 *      use x
 *      use y
 *
 * Block structure:
 *
 *      entry
 *        │
 *      if-c1?
 *      /     \\
 *  then-c1   else-c1
 *     │
 *   if-c2?
 *   /    \\
 * t-c2   e-c2
 *     \\  /
 *    merge-c2
 *        \\
 *         merge-c1   ← join from both halves of outer if
 *           │
 *          use x, y
 *
 * φ placement (only for variables assigned on multiple paths):
 *   merge-c2: y = φ(20, 30)
 *   merge-c1: x = φ(10 or 100), y = φ(merge-c2 value, 2 from entry-via-else)
 *
 * After insertion the IR is straightforward; you can dump it with:
 *   clang -O1 -S -emit-llvm 03_phi_placement.c -o 03_phi_placement.ll
 */
/*  phi_demo — three branches, three φ's all collapsed by InstSimplify.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      phi_demo:
 *          test  esi, esi                ; c2 ?
 *          mov   eax, 40                 ; eax = 40 (default for !c2 path)
 *          mov   ecx, 30                 ; ecx = 30 (= y on the c1 ∧ ¬c2 path)
 *          cmove ecx, eax                ; ecx = (c2 ? 40 : 30)  -- y arm choice
 *          test  edi, edi                ; c1 ?
 *          mov   eax, 102                ; eax = 102 (the !c1 result: x=100, y=2 → 102)
 *          cmovne eax, ecx               ; if c1 → eax = ecx (which holds x+y for c1 arms)
 *          ret
 *
 *  Let's trace the four input cases:
 *      c1=0       → eax = 102          (x=100, y=2, sum = 102)
 *      c1=1, c2=0 → ecx=30,  x=10 → sum=40
 *      c1=1, c2=1 → ecx=40,  x=10 → sum=50  (wait, asm uses ecx=40 means it
 *                                            already added x=10... actually
 *                                            looking again, ecx ends up holding
 *                                            x+y for the c1 path; the cmove
 *                                            picks 40 when c2 set)
 *
 *  Two φ's appear in the IR (one at inner merge for y, one at outer
 *  merge for x and y). At codegen they become two cmoves arranged in
 *  series with their conditions. The whole if-tree is BRANCH-FREE:
 *  two test/cmov pairs and you're done.
 *
 *  This is φ's earning their keep: a clean SSA representation lets the
 *  optimizer reason about the merge as a &quot;select&quot;, and the backend
 *  emits the obvious branchless code.
 */
int phi_demo(int c1, int c2) {
    int x = 1;
    int y = 2;

    if (c1) {
        x = 10;
        if (c2) y = 20;
        else    y = 30;
    } else {
        x = 100;
    }
    return x + y;
}

</code></pre>` },
  { name: `65. Ssa Form / Memory Ssa`, path: `07_ssa_form/04_memory_ssa.c`, dir: `07_ssa_form`, body: `<h1 id="04_memory_ssac">04_memory_ssa.c</h1>
<pre><code class="language-c">/* 04_memory_ssa.c — observing MemorySSA reasoning
 *
 * MemorySSA tracks an SSA-like chain of &quot;memory states&quot; so that loads and
 * stores can participate in the same global optimizations as scalars.
 *
 *   ; pseudo-MemorySSA
 *   1 = MemoryDef(LiveOnEntry)   ;  store i32 %x, ptr %p
 *   2 = MemoryDef(1)             ;  store i32 %y, ptr %q
 *   ; the load below
 *   MemoryUse(2)                 ;  load  i32, ptr %r
 *
 * GVN walks the MemoryUse → its defining MemoryDef chain to ask:
 *   &quot;is %r aliased by store 2? by store 1? if not, what value is at %r?&quot;
 *
 * Dump in LLVM:
 *   clang -O1 -mllvm -print-memoryssa -S 04_memory_ssa.c -o /dev/null
 */
/*  memssa_demo — three pointers, possibly aliased.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      memssa_demo:
 *          mov  dword ptr [rdi], ecx          ; *p = x
 *          mov  dword ptr [rsi], r8d          ; *q = y
 *          mov  eax, dword ptr [rdx]          ; load *r
 *          ret
 *
 *  WHY NOT FORWARDED: AA returns MayAlias for both \`*p\` vs \`*r\` and
 *  \`*q\` vs \`*r\` (no restrict, no type info to disambiguate). MemorySSA
 *  models the load as MemoryUse(*p) ∩ MemoryUse(*q): the load must be
 *  re-issued because either store could have written to *r.
 *
 *  WITH restrict on all three pointers, the optimizer would prove
 *  *r aliases NEITHER *p nor *q, and the load could be moved BEFORE
 *  the stores. Try recompiling with:
 *      int memssa_restrict(int * restrict p, int * restrict q,
 *                          int * restrict r, int x, int y) { ... }
 *  → the asm reorders the load and stores freely.
 */
int memssa_demo(int *p, int *q, int *r, int x, int y) {
    *p = x;
    *q = y;
    return *r;       /* MemorySSA + AA decide whether to forward x or y */
}

</code></pre>` },
  { name: `66. Ssa Form / Out Of Ssa`, path: `07_ssa_form/05_out_of_ssa.c`, dir: `07_ssa_form`, body: `<h1 id="05_out_of_ssac">05_out_of_ssa.c</h1>
<pre><code class="language-c">/* 05_out_of_ssa.c — the swap problem
 *
 * Sometimes a loop produces a back-edge whose φs would, if naïvely
 * lowered, generate self-destroying copies. Example:
 *
 *      loop:
 *          x1 = phi(x0 from entry, y2 from latch)
 *          y1 = phi(y0 from entry, x2 from latch)
 *          x2 = something(x1, y1)
 *          y2 = something_else(x1, y1)
 *          br loop
 *
 * After naïve out-of-SSA you might write
 *      copy x1 ← y2
 *      copy y1 ← x2          ← but x2 was computed FROM x1 — already overwritten!
 *
 * The out-of-SSA pass detects the cycle and inserts a temporary:
 *      tmp ← x2
 *      copy x1 ← y2
 *      copy y1 ← tmp
 *
 * To witness this directly is hard in C source; the canonical case is a
 * tight swap loop:
 */
/*  swap_loop — swap a[i] and b[i] each iteration.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3, simplified): the inner loop body is
 *      mov  edx, dword ptr [rdi + 4*rcx]      ; t = a[i]
 *      mov  r8d, dword ptr [rsi + 4*rcx]      ; load b[i]
 *      mov  dword ptr [rdi + 4*rcx], r8d      ; a[i] = b[i]
 *      mov  dword ptr [rsi + 4*rcx], edx      ; b[i] = t
 *
 *  Notice the EXPLICIT temporary \`edx\`. The out-of-SSA pass detected
 *  that lowering the cycle of phi-copies would corrupt one value if
 *  done naively; it inserted the temp to break the cycle. This is the
 *  &quot;swap problem&quot; that every textbook describes; the actual code looks
 *  like the classic 4-instruction swap.
 *
 *  Note: a vectorized variant (using XMM swaps via pshufd or VPERM2I)
 *  is also possible; the cost model picks one based on n and alignment.
 */
void swap_loop(int *a, int *b, int n) {
    for (int i = 0; i &lt; n; i++) {
        int t = a[i];
        a[i] = b[i];
        b[i] = t;
    }
}

/* Or the in-place reverse: every iteration swaps two array positions.
 * Inspect the assembly to confirm the compiler uses a real temporary. */
void reverse_array(int *a, int n) {
    int lo = 0, hi = n - 1;
    while (lo &lt; hi) {
        int t = a[lo];
        a[lo] = a[hi];
        a[hi] = t;
        lo++; hi--;
    }
}

</code></pre>` },
  { name: `67. Ssa Form`, path: `07_ssa_form/README.md`, dir: `07_ssa_form`, body: `<h1 id="07--static-single-assignment-ssa-form">07 — Static Single Assignment (SSA) Form</h1>
<p>SSA is the <em>single most important</em> representational choice in modern
compilers. Every later chapter assumes you can read it; this one shows you
how it is built and what makes it tick.</p>
<h2 id="map">Map</h2>
<table>
<thead>
<tr>
<th>#</th>
<th>Example</th>
<th>Topic</th>
</tr>
</thead>
<tbody>
<tr>
<td>01</td>
<td><code>01_ssa_intro.c</code></td>
<td>Why SSA?</td>
</tr>
<tr>
<td>02</td>
<td><code>02_dominance_frontier.c</code></td>
<td>Dominance frontier (where φ&rsquo;s live)</td>
</tr>
<tr>
<td>03</td>
<td><code>03_phi_placement.c</code></td>
<td>Cytron-style φ insertion + renaming</td>
</tr>
<tr>
<td>04</td>
<td><code>04_memory_ssa.c</code></td>
<td>MemorySSA — SSA for memory effects</td>
</tr>
<tr>
<td>05</td>
<td><code>05_out_of_ssa.c</code></td>
<td>Leaving SSA (Lost-Copy / Swap problem)</td>
</tr>
</tbody>
</table>
<h2 id="what-ssa-is-in-one-sentence">What SSA is, in one sentence</h2>
<blockquote>
<p><em>Every variable is assigned exactly once; at every join, a φ-node selects
which incoming definition flows out.</em></p>
</blockquote>
<pre><code>   non-SSA                              SSA
   ───────                              ───
   x = 1                                x_1 = 1
   if cond:                             if cond:
       x = 2                                x_2 = 2
   print(x)                             x_3 = φ(x_1, x_2)
                                         print(x_3)
</code></pre>
<p>Why bother?</p>
<pre><code>   ┌──────────────────────────────────────────────────────────┐
   │  Each name has exactly ONE definition.                   │
   │  ⇒ use-def chains are trivial (1 ↔ 1).                   │
   │  ⇒ &quot;is this expression invariant?&quot; = single hop.         │
   │  ⇒ &quot;what value flows here?&quot; = follow the def.            │
   │  ⇒ constant propagation, GVN, LICM are textbook short.   │
   │  ⇒ dead code = uses-list empty.                          │
   │  ⇒ Register allocation reuses SSA live ranges directly.  │
   └──────────────────────────────────────────────────────────┘
</code></pre>
<h2 id="ssa-construction-in-three-steps-cytron-et-al-1991">SSA construction in three steps (Cytron et al., 1991)</h2>
<pre><code>   1. Compute the DOMINANCE FRONTIER for every block.
       DF(B) = { Y | B dominates a pred of Y but does not dominate Y }
       Intuition: DF(B) is &quot;the first node where someone else's data joins
       with mine&quot;.

   2. Insert φ-nodes:
       for each variable v assigned in block B:
           for each Y in DF(B):
               insert  v = φ(...) at the start of Y.
       (Apply transitively — inserting a φ defines v in Y, so iterate.)

   3. Rename:
       Walk the dominator tree in pre-order.
       For each block:
           For each statement that assigns to v: bump v's &quot;version&quot; counter.
           For each use of v: replace with the current top-of-stack name.
       Push/pop a stack per variable.
</code></pre>
<p>The art is in step 1 (DF) and step 3 (rename). Let&rsquo;s picture them.</p>
<h2 id="dominance-frontier--a-picture">Dominance frontier — a picture</h2>
<pre><code>            Entry
              │
              ▼
              A
            ┌─┴─┐
            B   C
            │   │
            └─┬─┘
              D
              │
            Exit

   Dominator tree:        DOMINANCE FRONTIER:
        Entry              DF(Entry) = ∅
          │                DF(A)     = ∅  (A dominates D; D's predecessors
          A                                are B and C, both dominated by A)
        ┌─┼─┐              DF(B)     = { D }
        B C D              DF(C)     = { D }
                           DF(D)     = ∅
</code></pre>
<p>So if <code>x</code> is assigned in B (and not in C), we still need a φ in D, because
D is on B&rsquo;s frontier — control may arrive at D from C <em>without</em> going
through B.</p>
<h2 id="renaming--a-picture">Renaming — a picture</h2>
<pre><code>   Before                        After renaming
   ──────                        ──────────────
        x = 1                      x_1 = 1
        if cond:                   if cond:
            x = x + 5                  x_2 = x_1 + 5
            x = x * 2                  x_3 = x_2 * 2
        x = φ(...)                  x_4 = φ(x_1 from entry,
                                              x_3 from then)
        print x                     print x_4
</code></pre>
<p>Versioning gives every definition a fresh name; the φ at the join binds
them back together.</p>
<h2 id="pruned-semi-pruned-minimal--variants-of-ssa">Pruned, semi-pruned, minimal — variants of SSA</h2>
<ul>
<li><strong>Minimal SSA</strong>: place a φ at every dominance-frontier point of every def.
  Often inserts redundant φs.</li>
<li><strong>Semi-pruned</strong>: only insert φs for variables live across blocks. (default
  in many textbooks.)</li>
<li><strong>Pruned SSA</strong>: only insert a φ if the variable is live at the φ&rsquo;s block.
  (LLVM uses this.)</li>
</ul>
<h2 id="memory-in-ssa--memoryssa">Memory in SSA — MemorySSA</h2>
<p>Plain SSA only renames <em>scalars</em>. Memory operations (load/store) are not
inherently SSA. <strong>MemorySSA</strong> is a separate, parallel SSA representation
just for memory effects:</p>
<pre><code>   ; pseudo-MemorySSA
   1 = MemoryDef(LiveOnEntry)   ;  store i32 0, ptr %p
   2 = MemoryDef(1)             ;  store i32 1, ptr %q
   MemoryUse(2)                 ;  load  i32, ptr %r
</code></pre>
<p>Each <code>MemoryDef</code> is an SSA name representing &ldquo;the state of memory after this
store&rdquo;; <code>MemoryUse</code> consumes a state. With this, <strong>GVN</strong>, <strong>LICM</strong>, <strong>DSE</strong>
walk a single SSA-style chain to answer &ldquo;what stores reach this load?&rdquo;.</p>
<p>LLVM: <code>MemorySSA</code> (analysis pass). GCC&rsquo;s equivalent is the <code>vops</code> (virtual
operands) on GIMPLE.</p>
<h2 id="leaving-ssa-the-swap-problem">Leaving SSA: the swap problem</h2>
<p>Before code generation we must eliminate φs. Naïvely:</p>
<pre><code>   x = phi(a, b)         →   at every predecessor:
                                  copy x ← a   (in pred 1)
                                  copy x ← b   (in pred 2)
</code></pre>
<p>But this can introduce <em>correctness bugs</em> in the presence of <em>parallel</em>
copies:</p>
<pre><code>   At a join we have:           Naïve sequentialization gives:
      x = phi(y, ...)             x ← y
      y = phi(x, ...)             y ← x      ← y already overwritten!
</code></pre>
<p>This is the <strong>swap problem</strong>. Solutions:</p>
<ol>
<li><strong>Critical-edge splitting</strong> — insert a new BB on every CFG edge with
   multiple predecessors / successors, so the parallel copies become
   sequential within one BB.</li>
<li><strong>Coalescing-aware out-of-SSA</strong> (Sreedhar et al.) — emit a temporary
   when needed:
   <code>t ← y
       x ← y
       y ← t</code></li>
</ol>
<p>LLVM does this in <code>PHIEliminationPass</code> + <code>MachineCopyPropagation</code>.</p>
<h2 id="example-ssa_intro">Example: ssa_intro</h2>
<p><code>01_ssa_intro.c</code> is the smallest function whose IR contains both a φ-node
and a memory-SSA scope. Dump it:</p>
<pre><code class="language-bash">clang -O1 -S -emit-llvm 01_ssa_intro.c -o 01_ssa_intro.ll
</code></pre>
<p>Look for <code>phi i32 [%a, %entry], [%b, %then]</code> — that&rsquo;s the φ.</p>

<pre><code class="language-c">/* 01_loop_vec_basic.c — AUTO-VECTORIZATION 101
 * ============================================================================
 *
 * The vectorizer's job
 * --------------------
 *   Take a loop that processes one element per iteration and emit code
 *   that processes K elements at a time using a SIMD register (K = 4
 *   for SSE int, 8 for AVX2 int, 16 for AVX-512 int).
 *
 *     SCALAR              SIMD (VF=8, AVX2)
 *     ──────              ─────────────────
 *     mov   edx, [rsi]    vmovdqu ymm0, [rsi]      ; 8 ints in one register
 *     add   edx, [rcx]    vpaddd  ymm0, ymm0,
 *     mov   [rdi], edx              [rcx]
 *                         vmovdqu [rdi], ymm0
 *
 * The vectorizer's questions for each loop
 * ----------------------------------------
 *   1. Trip count: known? At least VF?
 *   2. Memory: do reads/writes overlap? (alias analysis)
 *   3. Reductions: associative? floating-point requires -ffast-math.
 *   4. Side effects: any divergent branches? Calls?
 *   5. Cost: is VF×scalar-cost &gt; vector-cost + overhead?
 *
 * Why a vectorized loop is often EMITTED TWICE (or thrice)
 * --------------------------------------------------------
 *   Compiler emits up to FOUR variants for one loop:
 *     – guarded vector main loop (alias-check passed, n ≥ VF)
 *     – scalar tail loop for n % VF leftovers
 *     – scalar fallback when alias check fails
 *     – degenerate ε-loop for n == 0
 *
 * Pass names
 * ----------
 *   LLVM: LoopVectorizePass, VPlanCostModel.
 *   GCC : tree-vect-loop.cc, tree-vectorizer.cc.
 *
 * Optimization remarks (USE THESE)
 * --------------------------------
 *   clang -O3 -Rpass=loop-vectorize file.c          ; what got vectorized
 *   clang -O3 -Rpass-missed=loop-vectorize file.c   ; why something DIDN'T
 *   clang -O3 -Rpass-analysis=loop-vectorize file.c ; cost-model trace
 *   gcc   -O3 -fopt-info-vec[-missed]
 * ============================================================================
 */
#include &lt;stddef.h&gt;

/*  simple — c[i] = a[i] + b[i].
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3 -mavx2):
 *      simple:
 *          test rcx, rcx
 *          je   .exit                                ; n == 0
 *          cmp  rcx, 3
 *          jbe  .scalar_small                        ; n ≤ 3 → don't vectorize
 *          ; --- runtime memcheck (alias guard) ---
 *          mov  rax, rdi
 *          sub  rax, rsi
 *          cmp  rax, 128
 *          setb al
 *          mov  r8, rdi
 *          sub  r8, rdx
 *          cmp  r8, 128
 *          setb r8b
 *          or   r8b, al
 *          je   .vec_main
 *      .scalar_small:
 *          xor  eax, eax
 *      .scalar_body:
 *          mov  r10d, dword ptr [rdx + 4*r8]
 *          add  r10d, dword ptr [rsi + 4*r8]
 *          mov  dword ptr [rdi + 4*r8], r10d
 *          inc  r8 ; dec r9 ; jne .scalar_body
 *      .vec_main:
 *          ; unrolled by 4× INTERLEAVE 2 = 8 elements per iter
 *          vmovdqu ymm0, [rsi + 4*rax]
 *          vmovdqu ymm1, [rdx + 4*rax]
 *          vpaddd  ymm0, ymm0, ymm1
 *          vmovdqu [rdi + 4*rax], ymm0
 *          ; ... 3 more interleaved groups ...
 *          add  rax, 32
 *          ...
 *      .scalar_tail:
 *          ; n % 32 leftovers
 *      .exit:
 *          ret
 *
 *  WHY: This is the canonical recipe. Without \`restrict\` we need a
 *  runtime alias check, hence the four-way fork. With AVX2 the inner
 *  loop processes 8 ints per iteration; with 4× interleave it does 32.
 */
void simple(int *c, const int *a, const int *b, size_t n) {
    for (size_t i = 0; i &lt; n; i++) c[i] = a[i] + b[i];
}

/*  simple_restrict — restrict eliminates the memcheck and the fallback.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL: identical body to above but the runtime alias check and the
 *  scalar fallback are gone. Smaller code; one fewer compare per call.
 */
void simple_restrict(int * restrict c,
                     const int * restrict a,
                     const int * restrict b,
                     size_t n) {
    for (size_t i = 0; i &lt; n; i++) c[i] = a[i] + b[i];
}

/*  float_scale — float scaling needs care with NaN / signed zero.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3 -mavx2):
 *      float_scale:
 *          ...
 *      .vec:
 *          vbroadcastss ymm0, xmm0            ; broadcast scale into 8 lanes
 *          vmulps  ymm1, ymm0, [rdi]          ; 8-wide multiply
 *          vmovups [rdi], ymm1
 *          ...
 *
 *  WHY THIS WORKS at default flags: \`x * scale\` is not order-dependent
 *  (each lane is independent). The vector form preserves per-element
 *  IEEE-754 semantics exactly. CONTRAST with reductions, where the
 *  parallel partial-sum tree changes the rounding order — that requires
 *  \`-ffast-math\`.
 */
void float_scale(float *a, float scale, size_t n) {
    for (size_t i = 0; i &lt; n; i++) a[i] *= scale;
}

<pre><code class="language-c">/* 02_reduction.c — REDUCTIONS (sum, max, hash)
 * ============================================================================
 *
 * Idea
 * ----
 *   A reduction loop accumulates many values into one scalar:
 *     int s = 0; for (i) s += a[i];
 *
 *   Vectorized form uses K parallel partial accumulators:
 *
 *       acc0 = acc1 = acc2 = acc3 = 0           ; 4 parallel sums
 *       for (i = 0; i + 16 &lt;= n; i += 16) {
 *           acc0 += vload(a + i);
 *           acc1 += vload(a + i + 4);
 *           acc2 += vload(a + i + 8);
 *           acc3 += vload(a + i + 12);
 *       }
 *       s = horizontal_sum(acc0 + acc1 + acc2 + acc3)
 *
 * INTEGER reductions: always vectorize, ALWAYS (integer add is exactly
 *   associative).
 *
 * FLOAT reductions: vectorize ONLY with -ffast-math, because the
 *   parallel partial-sum tree changes the rounding order, which can
 *   give DIFFERENT results (last-bit differences are common).
 *
 * Why bother?
 * -----------
 *   – Integer add: 1 cycle latency; serial chain bound by latency.
 *     With 4 parallel acc's we get 4 ops per cycle (ILP).
 *   – With AVX2 we further process 8 ints per op → 32 ints/cycle
 *     peak, vs 1 for the naive scalar chain.
 * ============================================================================
 */
#include &lt;stddef.h&gt;
#include &lt;stdint.h&gt;

/*  sum_int — integer reduction; ALWAYS vectorized.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3 -mavx2): main body uses FOUR parallel YMM accumulators.
 *      .vec:
 *          vpxor   xmm0, xmm0, xmm0          ; 4× zero accumulators
 *          vpxor   xmm1, xmm1, xmm1
 *          vpxor   xmm2, xmm2, xmm2
 *          vpxor   xmm3, xmm3, xmm3
 *      .vec_body:                              ; 32 ints per iter
 *          vpaddd  ymm0, ymm0, [rdi + 4*rax]
 *          vpaddd  ymm1, ymm1, [rdi + 4*rax + 32]
 *          vpaddd  ymm2, ymm2, [rdi + 4*rax + 64]
 *          vpaddd  ymm3, ymm3, [rdi + 4*rax + 96]
 *          add     rax, 32
 *          cmp     rcx, rax
 *          jne     .vec_body
 *      ; horizontal reduce ymm0..ymm3 down to a scalar in eax
 *
 *  KEY POINT: the four ymm accumulators are INDEPENDENT — they form
 *  four parallel partial sums, exploiting instruction-level
 *  parallelism. On modern x86 you have 4 SIMD ALU ports → 4 vpaddd's
 *  per cycle. The serial-chain &quot;naive&quot; form bounds at 1 add/cycle.
 *  Speedup: 4 × 8 = 32× on the critical path, in addition to the
 *  per-element SIMD win.
 */
int sum_int(const int *a, size_t n) {
    int s = 0;
    for (size_t i = 0; i &lt; n; i++) s += a[i];
    return s;
}

/*  sum_float — float reduction; needs -ffast-math (or equivalent) to vec.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3, NO fast-math): SCALAR loop:
 *      .scalar:
 *          addss  xmm0, dword ptr [rdi + 4*rax]
 *          inc    rax
 *          cmp    rsi, rax
 *          jne    .scalar
 *
 *  ACTUAL (-O3 -ffast-math): the same beautiful vectorized form as
 *  sum_int, but with \`vaddps ymm0, ymm0, [...]\`.
 *
 *  WHY DEFAULT BLOCKS IT: parallel partial sums change the *order* of
 *  floating-point additions. \`(a+b)+c\` may round differently from
 *  \`a+(b+c)\`. Default flags must preserve scalar order; -ffast-math
 *  (or specifically -fassociative-math + -fno-trapping-math) opts in.
 */
float sum_float(const float *a, size_t n) {
    float s = 0;
    for (size_t i = 0; i &lt; n; i++) s += a[i];
    return s;
}

/*  max_int — max reduction; ALWAYS vectorized.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3 -mavx2): four parallel VPMAXSD accumulators in the inner
 *  loop, then horizontal reduce. Same shape as the sum example.
 *  Integer max is associative and commutative ⇒ no flags required.
 */
int max_int(const int *a, size_t n) {
    int m = a[0];
    for (size_t i = 1; i &lt; n; i++) if (a[i] &gt; m) m = a[i];
    return m;
}

/*  hash_djb2 — multiplicative hash; NOT vectorizable.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3): scalar loop. The dependency chain is
 *      h_next = h*33 + c
 *  which is a TIGHT serial chain across iterations. Each iteration
 *  needs the previous value of h.
 *
 *  WHY THE COMPILER CAN'T VECTORIZE: a recurrence \`x[i] = f(x[i-1])\`
 *  has no parallelism without rewriting the algorithm (e.g. into a
 *  polynomial in the inputs). DJB-style hashes are intentionally
 *  recursive on the running state to ensure cryptographic-like mixing.
 */
uint32_t hash_djb2(const char *s, size_t n) {
    uint32_t h = 5381;
    for (size_t i = 0; i &lt; n; i++) h = h * 33u + (uint32_t)s[i];
    return h;
}
