<pre><code class="language-c">/* 10_load_combine.c — LOAD/STORE COMBINING &amp; MEMSET/MEMCPY RECOGNITION
 * ============================================================================
 *
 * Several passes participate
 * --------------------------
 *   – LLVM Load/Store Vectorizer: fuse adjacent narrow loads/stores into
 *     one wide load/store.
 *   – LoopIdiomRecognize: turn zero-fill / copy loops into memset / memcpy.
 *   – MemCpyOpt: collapse chains of memcpy/memset; eliminate redundant
 *     copies through stack temporaries.
 *   – Backend store-merging (GCC: \`store-merging\` pass).
 *
 * Why it matters
 * --------------
 *   Loops of small stores have ENORMOUS overhead from the loop control
 *   and per-element work. Replacing them with vectorized stores or a
 *   tuned \`memset\`/\`memcpy\` is a 4-16× speedup on real workloads.
 * ============================================================================
 */
#include &lt;stdint.h&gt;
#include &lt;string.h&gt;

/*  word_from_bytes — four bytes shifted/OR'd → one 32-bit load.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3, x86-64 little-endian):
 *      word_from_bytes:
 *          mov  eax, dword ptr [rdi]      ; ONE 32-bit load
 *          ret
 *
 *  WHAT THE NAÏVE COMPILER WOULD EMIT:
 *      movzx eax, byte ptr [rdi]
 *      movzx ecx, byte ptr [rdi + 1]
 *      shl   ecx, 8
 *      or    eax, ecx
 *      movzx ecx, byte ptr [rdi + 2]
 *      shl   ecx, 16
 *      or    eax, ecx
 *      movzx ecx, byte ptr [rdi + 3]
 *      shl   ecx, 24
 *      or    eax, ecx
 *      ret
 *
 *  WHY: LLVM's load-combine pass spots the disjoint-byte assembly pattern
 *  and replaces it with one wide load. The legality conditions are:
 *    (a) bytes are contiguous in memory
 *    (b) target supports unaligned 32-bit loads (true on x86)
 *    (c) endianness is known (LE → no bswap, BE → wide load + bswap)
 */
uint32_t word_from_bytes(const uint8_t *p) {
    return  (uint32_t)p[0]
         | ((uint32_t)p[1] &lt;&lt; 8)
         | ((uint32_t)p[2] &lt;&lt; 16)
         | ((uint32_t)p[3] &lt;&lt; 24);
}

/*  qword_from_bytes — same idea with a loop, eight bytes → 64-bit load.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      qword_from_bytes:
 *          mov  rax, qword ptr [rdi]      ; ONE 64-bit load
 *          ret
 *
 *  WHY: Loop is fully unrolled (8 iterations, constant trip count), the
 *  same load-combine pass then collapses the 8 byte loads into one
 *  64-bit load.
 */
uint64_t qword_from_bytes(const uint8_t *p) {
    uint64_t v = 0;
    for (int i = 0; i &lt; 8; i++) v |= (uint64_t)p[i] &lt;&lt; (i * 8);
    return v;
}

/*  zero_fill — for-loop of 64 zero stores → 4×16-byte vector stores.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3, x86-64 with SSE2):
 *      zero_fill:
 *          xorps   xmm0, xmm0                       ; xmm0 = 0
 *          movups  xmmword ptr [rdi + 48], xmm0
 *          movups  xmmword ptr [rdi + 32], xmm0
 *          movups  xmmword ptr [rdi + 16], xmm0
 *          movups  xmmword ptr [rdi      ], xmm0
 *          ret
 *
 *  WHAT YOU MIGHT EXPECT: a \`call memset\` instead. With AVX-512 we'd
 *  see one ZMM store instead.
 *
 *  WHY: The body fits in a tiny constant number of vector ops, so the
 *  compiler unrolls it inline rather than calling memset. The choice
 *  depends on \`--param max-store-merging-store-size\` and the equivalent
 *  cost model in LLVM. For larger n the compiler defers to memset.
 */
void zero_fill(uint8_t *buf) {
    for (int i = 0; i &lt; 64; i++) buf[i] = 0;
}

/*  fill_const — constant non-zero fill.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      .LCPI3_0:
 *          .byte 0xAB, 0xAB, ..., 0xAB        ; 16-byte rodata constant
 *      fill_const:
 *          movaps  xmm0, xmmword ptr [rip + LCPI3_0]
 *          movups  xmmword ptr [rdi + 16], xmm0
 *          movups  xmmword ptr [rdi      ], xmm0
 *          ret
 *
 *  WHY: 0xAB is splatted across 16 bytes ONCE in read-only data, then
 *  used as the source for two 16-byte unaligned stores. Compared to a
 *  loop of 32 \`mov byte\`, this saves ~30 µops.
 */
void fill_const(uint8_t *buf) {
    for (int i = 0; i &lt; 32; i++) buf[i] = 0xAB;
}

/*  four_stores — four 16-bit constant stores fused into one 64-bit store.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      four_stores:
 *          movabs  rax, 0xDEF09ABC56781234   ; 64-bit immediate
 *          mov     qword ptr [rdi], rax       ; ONE 64-bit store
 *          ret
 *
 *  WHY: Adjacent stores of compile-time constants get *merged* by the
 *  store-merging pass into a single wider store of the combined
 *  constant. The 4 × 16-bit halves become one 64-bit literal.
 */
void four_stores(uint16_t *p) {
    p[0] = 0x1234;
    p[1] = 0x5678;
    p[2] = 0x9ABC;
    p[3] = 0xDEF0;
}

/*  copy_loop — small fixed-count copy → fully unrolled OR replaced with
 *              memcpy depending on size and target.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3) for the 64-byte version: a chain of 8-byte loads/stores
 *  (or vector ops with AVX). For larger n you typically see \`call memcpy\`.
 *
 *  WHY: The cost model considers (n, alignment, target). At n=64 the
 *  compiler decides inline lowering is faster than the memcpy call
 *  overhead. At n=1024 it calls memcpy. The exact threshold is
 *  --param memcpy-loop-unroll-iterations in GCC.
 */
void copy_loop(uint8_t *dst, const uint8_t *src) {
    for (int i = 0; i &lt; 64; i++) dst[i] = src[i];
}

<p>&ldquo;Local&rdquo; = within a <strong>single basic block</strong>, or at most within a single
function with simple analysis. These are the cheapest passes and the ones
you must recognize on sight when reading assembly.</p>
</blockquote>

</tr>

<td>Bit-level idiom recognition</td>
</tr>
<tr>
<td>10</td>
<td><code>10_load_combine.c</code></td>
<td>Adjacent load/store combining</td>
</tr>
</tbody>
</table>
<h2 id="how-local-is-local">How &ldquo;local&rdquo; is local?</h2>
<pre><code>                    ┌─────────────────────────┐
                    │   single basic block    │   ← classical &quot;local&quot; opts
                    └────────────┬────────────┘
                                 │ widen scope
                    ┌────────────▼────────────┐
                    │ extended basic block    │   ← LLVM's InstCombine fits here:
                    │ (BB plus single-pred    │     it walks up def chains across
                    │ predecessors)           │     trivially-safe boundaries
                    └────────────┬────────────┘
                                 │
                    ┌────────────▼────────────┐
                    │ whole function (CFG)    │   ← &quot;global&quot; optimization, chapter 04+
                    └─────────────────────────┘
</code></pre>
<h2 id="01--constant-folding">01 · Constant folding</h2>
<p><strong>Definition.</strong> Evaluate any expression whose operands are <em>known constants</em>
at compile time. The compiler replaces the expression with its constant
result.</p>
<pre><code>   y = 3 * 4 + 1;             ───►   y = 13;
   if (sizeof(int) &gt; 0) ...   ───►   if (true) ...
</code></pre>
<h3 id="diagram--what-the-optimizer-sees">Diagram — what the optimizer sees</h3>
<pre><code>   BEFORE                              AFTER
   ───────                            ───────
        +                              13
       / \\                            (a constant node;
      *   1                            the whole tree is gone)
     / \\
    3   4
</code></pre>
<p>In SSA / LLVM IR:</p>
<pre><code class="language-llvm">; before
%t = mul i32 3, 4
%y = add i32 %t, 1
; after the InstSimplify pass
%y = i32 13
</code></pre>
<h3 id="code">Code</h3>
<p>See <code>01_const_fold.c</code>.</p>
<pre><code class="language-bash">make 01_const_fold.asm
grep -E '^\\s*(mov|imul|add)' 01_const_fold.asm
</code></pre>
<p>You will see literally <code>mov eax, 13</code> at <code>-O1</code> and above.</p>
<h3 id="where-it-lives">Where it lives</h3>
<ul>
<li><strong>LLVM</strong>: <code>InstSimplify</code>, <code>ConstantFold</code>, <code>SCCP</code> (sparse conditional constant
  propagation does folding + propagation together).</li>
<li><strong>GCC</strong>: <code>fold-const.cc</code>, the GIMPLE pass <code>forwprop</code> (forward propagation).</li>
</ul>
<h3 id="pitfalls">Pitfalls</h3>
<ul>
<li><strong>Floating-point</strong> folding requires <code>-ffast-math</code> for results that change
  the rounding behaviour (e.g. reassociating <code>(a + b) + c</code>).</li>
<li><strong>Volatile</strong> operands are never folded.</li>
<li>Folding of <code>1 &lt;&lt; 64</code> (UB) is allowed but typically suppressed under
  <code>-fsanitize=undefined</code>.</li>
</ul>
<hr />
<h2 id="02--constant--copy-propagation">02 · Constant &amp; Copy Propagation</h2>
<p><strong>Constant propagation</strong> replaces uses of a name by its known constant value.
<strong>Copy propagation</strong> replaces uses of a copy <code>b = a</code> by <code>a</code> itself. SSA makes
both trivial because each name has exactly one definition.</p>
<pre><code>   BEFORE                       AFTER constant prop      AFTER copy prop
   ───────                      ──────────────────       ──────────────────
   a = 5                        a = 5                    a = 5
   b = a + 2                    b = 7                    b = 7
   c = b * 3                    c = 21                   c = 21
   d = c                        d = 21                   d = 21   (or omitted)
</code></pre>
<h3 id="diagram--ssa-makes-it-a-single-hash-table-walk">Diagram — SSA makes it a single hash-table walk</h3>
<pre><code>   def %a = 5
   use %a in %b = add %a, 2     ─► substitute, fold → %b = 7
   use %b in %c = mul %b, 3     ─► substitute, fold → %c = 21
</code></pre>
<p>In LLVM, this is performed by <strong>SCCP</strong> (Sparse Conditional Constant
Propagation) and <strong>InstCombine</strong>. SCCP is <em>conditional</em> because it tracks
which edges in the CFG are <em>reachable</em>; a branch that proves to be never-taken
is removed.</p>
<h3 id="where-it-lives_1">Where it lives</h3>
<ul>
<li><strong>LLVM</strong>: <code>SCCPPass</code>, <code>IPSCCPPass</code> (interprocedural), <code>InstCombinePass</code>.</li>
<li><strong>GCC</strong>: <code>tree-ssa-ccp.cc</code> (conditional constant propagation),
  <code>tree-ssa-copy.cc</code> (copy propagation).</li>
</ul>
<hr />
<h2 id="03--common-subexpression-elimination-cse">03 · Common Subexpression Elimination (CSE)</h2>
<p>If the same expression <code>e1</code> is computed twice and <em>neither operand changed</em>
between the two evaluations, compute it once and reuse the result.</p>
<pre><code>   BEFORE                                 AFTER
   ───────                                ─────
   t1 = a*b + 5;                          tmp = a*b + 5;
   ...                                    t1  = tmp;
   t2 = a*b + 5;                          t2  = tmp;
</code></pre>
<h3 id="diagram--value-numbering">Diagram — value numbering</h3>
<p>CSE is one instance of <strong>value numbering</strong>. Every value gets a number;
expressions that hash to the same number are interchangeable.</p>
<pre><code>   value table
   ┌───────────────┬────┐
   │ const 5       │ v1 │
   │ load a        │ v2 │
   │ load b        │ v3 │
   │ mul v2 v3     │ v4 │
   │ add v4 v1     │ v5 │   ← any later expression hashing to (add v4 v1)
   └───────────────┴────┘     is replaced by v5.
</code></pre>
<h3 id="where-it-lives_2">Where it lives</h3>
<ul>
<li><strong>LLVM</strong>: <code>EarlyCSE</code>, then global <code>GVN</code> (Global Value Numbering) which is
  CSE across the whole CFG.</li>
<li><strong>GCC</strong>: <code>tree-ssa-pre.cc</code> (Partial Redundancy Elimination subsumes CSE),
  <code>tree-ssa-dom.cc</code> (dominator-based CSE).</li>
</ul>
<h3 id="pitfalls_1">Pitfalls</h3>
<ul>
<li>A function call between the two uses with <strong>unknown side effects</strong> kills
  the redundancy. Marking functions <code>__attribute__((pure))</code> / <code>const</code> (GCC)
  or <code>readnone</code> / <code>readonly</code> (LLVM) tells the compiler the call is safe to
  elide.</li>
</ul>
<hr />
<h2 id="04--dead-code-elimination">04 · Dead Code Elimination</h2>
<p>If an instruction&rsquo;s result is <strong>never used</strong> <em>and</em> the instruction has no
side effects, remove it. <strong>Aggressive DCE (ADCE)</strong> is the dual: assume every
instruction is dead, then mark live anything that affects program output, and
delete the rest.</p>
<pre><code>   BEFORE                            AFTER
   ───────                          ───────
   a = expensive_thing();           // gone
   b = compute();                   b = compute();
   return b;                        return b;
</code></pre>
<h3 id="diagram--liveness-sweep">Diagram — liveness sweep</h3>
<pre><code>            ┌────────┐
            │ ret b  │ ◄── live (program output)
            └────┬───┘
                 │ uses b
                 ▼
            ┌────────┐
            │ b = ...│ ◄── live
            └────────┘
            ┌─────────────────────┐
            │ a = expensive_thing │ ◄── nothing uses it; no side effects
            │                     │     → DEAD, removed.
            └─────────────────────┘
</code></pre>
<h3 id="where-it-lives_3">Where it lives</h3>
<ul>
<li><strong>LLVM</strong>: <code>DCEPass</code>, <code>ADCEPass</code>, <code>BDCEPass</code> (bit-tracking DCE for masked-out
  bits).</li>
<li><strong>GCC</strong>: <code>tree-ssa-dce.cc</code>.</li>
</ul>
<h3 id="pitfalls_2">Pitfalls</h3>
<ul>
<li>An apparently-dead store can be <strong>observable</strong> through <code>volatile</code>, <code>atomic</code>,
  signal handlers, longjmp, or <code>setjmp</code>. The compiler errs on the side of
  keeping it.</li>
</ul>
<hr />
<h2 id="05--algebraic-simplification">05 · Algebraic simplification</h2>
<p>Replace expressions by mathematically-equivalent but cheaper forms.</p>
<pre><code>   x + 0          ───► x
   x * 1          ───► x
   x * 0          ───► 0          (for integers; FP needs careful)
   x - x          ───► 0          (UB-aware for FP NaN)
   x &amp; 0          ───► 0
   x | 0          ───► x
   x ^ x          ───► 0
   (x &lt;&lt; a) &lt;&lt; b  ───► x &lt;&lt; (a+b) (under nsw/nuw)
   !!x            ───► x ≠ 0      (boolean idiom)
</code></pre>
<h3 id="pitfalls--ieee-754-is-not-algebra">Pitfalls — IEEE-754 is not algebra</h3>
<p>For <code>float</code>/<code>double</code> the compiler will <em>not</em> perform <code>x + 0 → x</code> unless you
opt in:</p>
<pre><code>   x + (-0.0)   is x        (always, by IEEE)
   x + 0.0      is x        ONLY if you can prove x is not −0.0
                            (because (−0.0) + 0.0 == +0.0)
</code></pre>
<p>That&rsquo;s why aggressive FP simplification needs <code>-ffast-math</code> (GCC/Clang) or
<code>-ffinite-math-only</code>, <code>-fno-signed-zeros</code>, etc.</p>
<hr />
<h2 id="06--strength-reduction">06 · Strength reduction</h2>
<p>Replace <strong>expensive</strong> operations by <strong>cheaper</strong> equivalent ones.</p>
<pre><code>   x * 2               ───►  x &lt;&lt; 1
   x * 8               ───►  x &lt;&lt; 3
   x / 2  (unsigned)   ───►  x &gt;&gt; 1
   x % 8  (unsigned)   ───►  x &amp; 7
   x * 9               ───►  (x &lt;&lt; 3) + x        (lea on x86: lea eax,[rax*8+rax])
   x * 10              ───►  (x &lt;&lt; 3) + (x &lt;&lt; 1)
   x * 7               ───►  (x &lt;&lt; 3) - x
</code></pre>
<p>For <strong>division by a constant</strong>, both compilers replace <code>x / c</code> by a
multiplication by a magic constant and a shift (Granlund &amp; Montgomery 1994).
You&rsquo;ll see code like:</p>
<pre><code class="language-asm">   ; x / 10, unsigned 32-bit
   mov edx, 3435973837     ; 0xCCCCCCCD = ceil(2^33 / 10)
   imul rax, rdx
   shr  rax, 35
</code></pre>
<h3 id="loop-level-strength-reduction-chapter-02">Loop-level strength reduction (chapter 02)</h3>
<p>Inside loops, <strong>induction variables</strong> like <code>arr[i*4]</code> get strength-reduced to
pointer increments:</p>
<pre><code>   for (i=0;i&lt;n;i++) sum += arr[i*4];
                 │
                 ▼
   p = arr;
   for (i=0;i&lt;n;i++) { sum += *p; p += 4; }
</code></pre>
<p>See <code>02_loop_optimizations/</code>.</p>
<hr />
<h2 id="07--peephole--instruction-combining">07 · Peephole / instruction combining</h2>
<p>A peephole optimization looks at a <strong>small window</strong> (2–4 instructions) and
recognizes a better sequence. LLVM&rsquo;s <code>InstCombine</code> is the canonical
implementation: a thousand rewrite rules applied to a fixed point.</p>
<p>Examples:</p>
<pre><code>   lea  rax, [rdi + 0]                ───►  mov rax, rdi
   add  eax, 1                        ───►  inc eax        (size only, often slower)
   cmp  eax, 0                        ───►  test eax, eax
   xor  eax, eax  /  mov eax, 0       ───►  xor eax, eax   (smaller, breaks dep)
   mov  rcx, rax  /  shr rcx, 32      ───►  mov ecx, eax   (zero-extends already)
</code></pre>
<p>The most important LLVM peephole rule:</p>
<pre><code>   (x &amp; C1) &lt;&lt; C2   ─►   (x &lt;&lt; C2) &amp; (C1 &lt;&lt; C2)   if no overflow
</code></pre>
<p>This drives many subsequent simplifications.</p>
<hr />
<h2 id="08--branch-simplification">08 · Branch simplification</h2>
<p>Constant condition or trivially-true / false → remove the branch.</p>
<pre><code class="language-c">if (1)  X; else Y;   ───►   X;
if (0)  X; else Y;   ───►   Y;
if (p)  return 1;
        return 0;    ───►   return !!p;
</code></pre>
<p>The cleanup is performed by <strong>SimplifyCFG</strong> in LLVM and <code>cleanup_cfg</code> in GCC.
See <code>08_branch_simpl.c</code>.</p>
<pre><code>   BEFORE                                AFTER
   ───────                              ───────
       BB1                                BB1
        │ if 1                            │
        ├────────►BB2 (X)                 ▼
        └────────►BB3 (Y)                BB2 (X)
                    └─►BB4                 └─►BB4
</code></pre>
<hr />
<h2 id="09--bit-level-idiom-recognition">09 · Bit-level idiom recognition</h2>
<p>Both compilers recognize hand-rolled bit tricks and turn them into single
machine instructions:</p>
<table>
<thead>
<tr>
<th>Source idiom</th>
<th>Lowered to</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>x &amp; -x</code></td>
<td>&ldquo;isolate lowest set bit&rdquo; (<code>BLSI</code>)</td>
</tr>
<tr>
<td><code>x &amp; (x - 1)</code></td>
<td>&ldquo;clear lowest set bit&rdquo; (<code>BLSR</code>)</td>
</tr>
<tr>
<td><code>(x ^ (x-1)) + 1) &gt;&gt; 1</code></td>
<td>depends on backend</td>
</tr>
<tr>
<td><code>popcount(x)</code> loop</td>
<td><code>POPCNT</code> (with <code>-mpopcnt</code>)</td>
</tr>
<tr>
<td>count trailing zeros loop</td>
<td><code>TZCNT</code> / <code>BSF</code></td>
</tr>
<tr>
<td><code>(uint64_t)hi &lt;&lt; 32 \\| lo</code></td>
<td>single 64-bit load on x86</td>
</tr>
<tr>
<td><code>byte-swap</code> pattern</td>
<td><code>BSWAP</code></td>
</tr>
<tr>
<td>memcpy-style byte loop</td>
<td><code>REP MOVSB</code> or vectorized</td>
</tr>
</tbody>
</table>
<p>See <code>09_bit_tricks.c</code> for source you can compile and inspect.</p>
<hr />
<h2 id="10--load--store-combining">10 · Load / store combining</h2>
<p>Adjacent loads of <code>uint8_t a[4]</code> that are then shifted and OR&rsquo;d into a
<code>uint32_t</code> get combined into a <strong>single 32-bit load</strong> (subject to alignment
and aliasing). This is one of the most under-appreciated transformations
because it removes whole loops.</p>
<pre><code class="language-c">uint32_t v = a[0] | (a[1] &lt;&lt; 8) | (a[2] &lt;&lt; 16) | (a[3] &lt;&lt; 24);
</code></pre>
<pre><code class="language-asm">   ; -O3, x86-64 (assuming sufficient alignment)
   mov   eax, DWORD PTR [rdi]
</code></pre>
<p>See <code>10_load_combine.c</code>.</p>
<p>LLVM passes: <code>Load/Store Vectorizer</code>, <code>MemCpyOpt</code>.
GCC: <code>store-merging</code>, <code>tree-ssa-strlen.cc</code>.</p>

<pre><code class="language-c">/* 01_licm.c — LOOP-INVARIANT CODE MOTION
 * ============================================================================
 *
 * What it is
 * ----------
 *   Any computation whose operands don't depend on the loop's induction
 *   variable AND that has no side effects is moved into the loop's
 *   *preheader* — executed exactly once instead of N times.
 *
 *   Picture:
 *                ┌──────────────┐
 *                │  preheader   │ ◄── t = x*y + k   (HOISTED HERE)
 *                └──────┬───────┘
 *                       ▼
 *              ┌──── header  ──────┐
 *              │ φ i               │
 *              │ cmp i, n          │
 *              │ br exit           │
 *              └──┬────────────┬───┘
 *           body  │            │ exit
 *                 ▼            ▼
 *           a[i] = t*a[i]    [exit BB]
 *                 │
 *                 ▼
 *              latch (i++)
 *                 └──► header
 *
 * Pass names
 * ----------
 *   LLVM:  LICMPass; uses MemorySSA for loads/stores.
 *   GCC :  tree-ssa-loop-im.cc (Invariant Motion).
 *
 * Legality
 * --------
 *   – Operands defined outside the loop.
 *   – No side effects (\`!hasSideEffects()\`).
 *   – Speculatable: hoisting it past the loop guard must not crash. A load
 *     from a possibly-null pointer is NOT speculatable; division by a
 *     possibly-zero divisor is NOT speculatable.
 * ============================================================================
 */
#include &lt;stddef.h&gt;

/*  licm_hoist — hoist a 3-instruction expression out of the loop.
 *  ──────────────────────────────────────────────────────────────────────────
 *  WHAT WE'D EXPECT WITHOUT LICM:
 *      ; body: re-compute x*y+k each iter
 *      .loop:
 *          mov   eax, dword ptr [rdi + 4*rcx]
 *          mov   ebx, edx       ; x
 *          imul  ebx, esi       ; x*y          ← every iteration
 *          add   ebx, r8d       ; +k           ← every iteration
 *          imul  eax, ebx
 *          mov   dword ptr [rdi + 4*rcx], eax
 *          inc   rcx
 *          cmp   rcx, rsi
 *          jl    .loop
 *
 *  ACTUAL (-O3, abbreviated; full vectorization on):
 *      licm_hoist:
 *          test  rsi, rsi
 *          je    .exit
 *          imul  ecx, edx                      ; ←─┐
 *          add   ecx, r8d                      ; ←─┴── HOISTED into preheader
 *                                              ;       (executed ONCE)
 *          cmp   rsi, 8
 *          jae   .vec_loop                     ;  vectorized main loop
 *          ...
 *      .vec_loop:
 *          movdqu xmm1, [rdi + 4*rdx]
 *          movdqu xmm2, [rdi + 4*rdx + 16]
 *          pmulld xmm1, xmm0                   ; xmm0 is \`t\` broadcast
 *          pmulld xmm2, xmm0
 *          movdqu [rdi + 4*rdx], xmm1
 *          movdqu [rdi + 4*rdx + 16], xmm2
 *          add   rdx, 8
 *          cmp   rax, rdx
 *          jne   .vec_loop
 *
 *  WHY: LICM walks the loop body, asks for each instruction
 *       &quot;are all your operands loop-invariant? are you side-effect free
 *        and speculatable?&quot; If yes, splice into the preheader. Then LICM
 *  is given a clean body which the vectorizer can SIMD-ify; without
 *  hoisting, the per-iter recomputation would PREVENT vectorization
 *  because the body would contain non-vectorizable serial operations.
 */
void licm_hoist(int *a, size_t n, int x, int y, int k) {
    for (size_t i = 0; i &lt; n; i++) {
        a[i] = a[i] * (x * y + k);
    }
}

/*  licm_load — memory LICM with \`restrict\`.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      licm_load:
 *          test  rdx, rdx
 *          je    .exit
 *          mov   eax, dword ptr [rsi]   ; ←── LOAD b[0] HOISTED into preheader
 *          ...
 *      .vec_loop:
 *          movdqu xmm1, [rdi + 4*rsi]
 *          paddd  xmm1, xmm0            ; xmm0 = broadcast(b[0])
 *          movdqu [rdi + 4*rsi], xmm1
 *          ...
 *
 *  WHY: \`restrict\` ⇒ noalias. Alias Analysis returns NoAlias between
 *  \`*b\` (the hoisted load) and any store through \`*a\`. With that, the
 *  load is loop-invariant — its memory is provably not written by the
 *  loop body — and LICM is free to lift it.
 */
void licm_load(int * restrict a, const int * restrict b, size_t n) {
    for (size_t i = 0; i &lt; n; i++) {
        a[i] += b[0];
    }
}

/*  licm_blocked — same function MINUS restrict, watch what happens.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3): the compiler emits a *runtime alias check* and TWO loops:
 *
 *      licm_blocked:
 *          ; runtime memcheck: does a[0..n] overlap b[0..1]?
 *          lea   rax, [rdi + 4*rdx]
 *          lea   rcx, [rsi + 4]
 *          cmp   rdi, rcx
 *          setb  cl                     ; a-start &lt; b-end?
 *          cmp   rsi, rax
 *          setb  al                     ; b-start &lt; a-end?
 *          test  al, cl                 ; both true → overlap
 *          jne   .scalar_path           ; aliased → fall back to scalar
 *          ; non-aliased fast path:
 *          mov   eax, dword ptr [rsi]   ; load b[0] HOISTED (vectorized too)
 *          ...
 *      .scalar_path:
 *          ; reload b[0] inside the loop (no hoist) because aliasing is possible
 *          ...
 *
 *  WHY: Without \`restrict\` the compiler can't prove no-alias at compile
 *  time. Instead it *versions* the loop (chapter 02 #12): a runtime
 *  pointer comparison picks the fast path when the pointers don't
 *  overlap. The fast path is identical to \`licm_load\` above; the slow
 *  path has the load INSIDE the loop body.
 */
void licm_blocked(int *a, const int *b, size_t n) {
    for (size_t i = 0; i &lt; n; i++) {
        a[i] += b[0];
    }
}

/*  licm_div_unsafe — a divide that CANNOT be speculated.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3): \`1000 / d\` is computed INSIDE the loop, every iteration.
 *
 *  WHY: If we hoisted \`1000/d\` into the preheader and \`d == 0\`, the
 *  preheader would trigger a SIGFPE that the original program would NOT
 *  have raised when \`n == 0\` (because the body would never execute).
 *  LICM refuses to hoist potentially-trapping operations past the loop's
 *  trip-count test.
 */
void licm_div_unsafe(int *a, size_t n, int d) {
    for (size_t i = 0; i &lt; n; i++) {
        a[i] = a[i] + 1000 / d;
    }
}

/*  licm_div_safe — guard makes the divide speculatable; hoist proceeds.
 *  ──────────────────────────────────────────────────────────────────────────
 *  Manual hoist works too — but here we just gate with \`if (d == 0) return\`.
 *  Now the compiler KNOWS d is non-zero when the divide executes; the
 *  divide is hoisted into the preheader and the loop becomes pure
 *  add-by-constant, which then vectorizes.
 */
void licm_div_safe(int *a, size_t n, int d) {
    if (d == 0) return;
    int inv = 1000 / d;
    for (size_t i = 0; i &lt; n; i++) {
        a[i] = a[i] + inv;
    }
}

<pre><code class="language-c">/* 02_unroll.c — LOOP UNROLLING (full + partial)
 * ============================================================================
 *
 * Two flavours
 * ------------
 *   FULL unroll       trip count is a small known constant; the loop is
 *                     completely replaced by its straight-line expansion.
 *
 *   PARTIAL unroll    trip count unknown or large; replicate body N times,
 *                     keep a scalar epilogue for \`n % N\` leftovers.
 *
 * Why
 * ---
 *   – Removes loop-control overhead (one cmp+jcc per N iterations).
 *   – Exposes ILP (independent ops on different unrolled iterations
 *     dispatch in parallel on a wide OoO core).
 *   – Enables vectorization: 4 independent scalar iterations become one
 *     4-wide SIMD iteration.
 *
 * Pass names
 * ----------
 *   LLVM:  LoopUnrollPass (full + partial). Cost model in TTI.
 *   GCC :  tree-loop-unroll.cc; --param max-unroll-times bounds factor.
 *
 * Pragmas
 * -------
 *   #pragma GCC unroll N          (GCC)
 *   #pragma clang loop unroll_count(N)
 *   #pragma clang loop unroll(disable|enable|full)
 * ============================================================================
 */
#include &lt;stddef.h&gt;

/*  full_unroll — trip count is the constant 4 → the loop DISAPPEARS.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      .LCPI0_0:
 *          .long 0, 7, 14, 21               ; precomputed i*7 for i=0..3
 *      full_unroll:
 *          movaps  xmm0, xmmword ptr [rip + LCPI0_0]
 *          movups  xmmword ptr [rdi], xmm0   ; ONE 16-byte store, NO loop
 *          ret
 *
 *  WHAT WE'D NAIVELY EXPECT: 4 scalar stores \`mov [rdi+4*i], 7*i\`.
 *
 *  WHY: Three things happened in sequence.
 *    1. LoopUnroll saw trip count = 4 and replaced the loop with four
 *       straight-line statements \`a[0]=0; a[1]=7; a[2]=14; a[3]=21\`.
 *    2. The SLP-vectorizer noticed 4 contiguous adjacent constant stores
 *       and folded them into one 16-byte vector store.
 *    3. The 4 constants were materialized in \`.rodata\`; the runtime cost
 *       is now one cache-friendly load + one store.
 */
void full_unroll(int *a) {
    for (int i = 0; i &lt; 4; i++) {
        a[i] = i * 7;
    }
}

/*  partial_unroll — unknown trip count → main vector loop + scalar tail.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3, simplified):
 *      partial_unroll:
 *          test  rcx, rcx
 *          je    .exit                              ; n == 0
 *          ; runtime alias check between a/b, a/c (memcheck)
 *          ...
 *          ja    .vector_loop                       ; fast path
 *      .scalar_loop:                                ; fallback (small n or alias)
 *          mov   r10d, [rdx + 4*r8]
 *          add   r10d, [rsi + 4*r8]
 *          mov   [rdi + 4*r8], r10d
 *          inc   r8
 *          dec   r9
 *          jne   .scalar_loop
 *      .vector_loop:                                ; chunks of 4 (or 8) elements
 *          ; vectorized add of 4 ints at a time, then maybe 4 more (interleave 2)
 *          ...
 *
 *  WHY: With pointers that *might* alias, the optimizer:
 *    1. Emits a runtime memcheck guard.
 *    2. On the &quot;no alias&quot; branch, unrolls + vectorizes the loop body by
 *       factor 4 (SSE) or 8 (AVX2) with interleave 2.
 *    3. Emits a scalar epilogue for \`n % VF\` leftovers.
 *    4. Emits a *scalar* version of the whole loop for when memcheck
 *       fails or n is small (cost model says vector overhead &gt; savings).
 */
void partial_unroll(int *a, const int *b, const int *c, size_t n) {
    for (size_t i = 0; i &lt; n; i++) {
        a[i] = b[i] + c[i];
    }
}

/*  unroll_4 — pragma overrides the cost model and forces factor 4.
 *  ──────────────────────────────────────────────────────────────────────────
 *  Use sparingly. The compiler's heuristic is usually right; pragmas
 *  shine when YOU know something the cost model doesn't (e.g. the loop
 *  is on the critical path of a benchmark whose body is too small to
 *  trigger the heuristic).
 */
void unroll_4(int *a, const int *b, size_t n) {
#if defined(__clang__)
#  pragma clang loop unroll_count(4)
#elif defined(__GNUC__)
#  pragma GCC unroll 4
#endif
    for (size_t i = 0; i &lt; n; i++) {
        a[i] = b[i] * 2;
    }
}

/*  unroll_disabled — pragma forces NO unrolling.
 *  ──────────────────────────────────────────────────────────────────────────
 *  The resulting loop will look like 3 instructions in the body and a
 *  single branch back to the top. Often slower than the default; useful
 *  for code-size constrained builds or to keep the i-cache footprint
 *  small in a function that is only sporadically hot.
 */
void unroll_disabled(int *a, const int *b, size_t n) {
#if defined(__clang__)
#  pragma clang loop unroll(disable)
#elif defined(__GNUC__)
#  pragma GCC unroll 1
#endif
    for (size_t i = 0; i &lt; n; i++) {
        a[i] = b[i] * 2;
    }
}

/*  reduce — sum-of-array reduction.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3) is something like (sketch):
 *      reduce:
 *          test  rsi, rsi
 *          je    .ret_zero
 *          ; preheader: zero 4 vector accumulators
 *          pxor  xmm0, xmm0
 *          pxor  xmm1, xmm1
 *          pxor  xmm2, xmm2
 *          pxor  xmm3, xmm3
 *      .vec:
 *          paddd xmm0, xmmword ptr [rdi]        ; 4 independent accumulators
 *          paddd xmm1, xmmword ptr [rdi + 16]    ; → exposes ILP
 *          paddd xmm2, xmmword ptr [rdi + 32]
 *          paddd xmm3, xmmword ptr [rdi + 48]
 *          add   rdi, 64
 *          ...
 *          ; horizontal reduce xmm0..xmm3 into eax at the end
 *
 *  WHY: Integer + is associative, so the vectorizer is free to use four
 *  parallel partial sums (PARTIAL UNROLL by 4 with INTERLEAVE). That
 *  cuts the dependency chain length from N down to N/4 and makes the
 *  loop bound only by load bandwidth, not by the add's 1-cycle latency.
 */
int reduce(const int *a, size_t n) {
    int sum = 0;
    for (size_t i = 0; i &lt; n; i++) sum += a[i];
    return sum;
}

<pre><code class="language-c">/* 03_peel.c — LOOP PEELING
 * ============================================================================
 *
 * Idea
 * ----
 *   Peel \`k\` iterations off the front (or back) of a loop. The peeled
 *   iterations execute outside the loop; the main loop then iterates
 *   from k.
 *
 * Why
 * ---
 *   – The first (or last) iteration may have a *different* value of
 *     some variable that constant-folds away in subsequent iterations.
 *   – The vectorizer peels until the pointer is properly aligned.
 *   – The unroller may peel to fix a non-multiple trip count.
 *
 * Pass names
 * ----------
 *   LLVM:  LoopPeelPass (and the vectorizer's own runtime peel).
 *   GCC :  -fpeel-loops, --param max-peeled-insns.
 *
 * Knobs
 * -----
 *   #pragma clang loop peel_count(N)
 *   -fpeel-loops, --param min-iters-for-peel
 * ============================================================================
 */
#include &lt;stddef.h&gt;

/*  peelable — running-sum / scan loop with a phi initialised to 0.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      peelable:
 *          test  rdx, rdx
 *          je    .exit
 *          mov   eax, edx
 *          and   eax, 3                    ; tail count
 *          cmp   rdx, 4
 *          jae   .unroll4                  ; main unrolled loop (factor 4)
 *          ...
 *      .unroll4:                            ; HEADER: 4 iters of fused scan
 *          and   rdx, -4
 *          xor   r8d,  r8d                  ; i = 0
 *          xor   ecx, ecx                   ; prev = 0
 *      .body:
 *          add   ecx, dword ptr [rsi + 4*r8       ] ; prev += b[i]
 *          mov   dword ptr [rdi + 4*r8       ], ecx ; a[i] = prev
 *          add   ecx, dword ptr [rsi + 4*r8 +  4]   ; prev += b[i+1]
 *          mov   dword ptr [rdi + 4*r8 +  4], ecx
 *          add   ecx, dword ptr [rsi + 4*r8 +  8]
 *          mov   dword ptr [rdi + 4*r8 +  8], ecx
 *          add   ecx, dword ptr [rsi + 4*r8 + 12]
 *          mov   dword ptr [rdi + 4*r8 + 12], ecx
 *          add   r8, 4
 *          cmp   rdx, r8
 *          jne   .body
 *      .tail:                               ; scalar epilogue for n % 4
 *          ; ...
 *
 *  WHY: The LLVM cost model decided NOT to formally &quot;peel&quot; here, instead
 *  unrolling by 4 + emitting a scalar epilogue. But the *concept* of
 *  peeling is what allows the first iteration's \`prev=0\` to fold away in
 *  cases where the loop body would otherwise contain a conditional on
 *  whether we're past the cold-start iteration. In this particular
 *  example the back-edge phi already has a known init value so the body
 *  needs no special case.
 */
void peelable(int *a, const int *b, size_t n) {
    int prev = 0;
    for (size_t i = 0; i &lt; n; i++) {
        a[i] = prev + b[i];
        prev = a[i];
    }
}

/*  align_then_vector — vectorizer-driven runtime peel for alignment.
 *  ──────────────────────────────────────────────────────────────────────────
 *  When the compiler can't prove \`a\` and \`b\` are aligned, it can emit a
 *  *runtime peel*: scalar iterations until the pointer reaches alignment,
 *  then a vector main loop with aligned loads/stores, then a scalar tail.
 *
 *  The Intel asm conceptually looks like:
 *      align_then_vector:
 *          ; n == 0 early-out
 *          ; compute mis-alignment k = (16 - (a &amp; 15)) / 4
 *          .scalar_peel:                ; 0..3 iters until a is 16-byte aligned
 *              addss xmm0, [rsi]
 *              movss [rdi], xmm0
 *              add   rdi, 4 ; add rsi, 4 ; dec k ; jnz .scalar_peel
 *          .vec_aligned_main:
 *              movaps xmm0, [rsi]
 *              addps  xmm0, [rdi]
 *              movaps [rdi], xmm0
 *              ; ... repeat for n/4 ...
 *          .scalar_tail:                ; 0..3 iters at the end
 *              ; ...
 *
 *  Modern Intel/AMD make unaligned movups nearly as fast as aligned,
 *  so this peel is often skipped at -O3 unless the cost model thinks
 *  the savings are non-trivial.
 */
void align_then_vector(float *a, const float *b, size_t n) {
    for (size_t i = 0; i &lt; n; i++) {
        a[i] = a[i] + b[i];
    }
}

</code></pre>` },
  { name: `17. Loop Optimizations / Unswitch`, path: `02_loop_optimizations/04_unswitch.c`, dir: `02_loop_optimizations`, body: `<h1 id="04_unswitchc">04_unswitch.c</h1>
<pre><code class="language-c">/* 04_unswitch.c — LOOP UNSWITCHING
 * ============================================================================
 *
 * Idea
 * ----
 *   A branch INSIDE a loop whose condition is *loop-invariant* is moved
 *   OUTSIDE the loop. The loop is duplicated, once per outcome.
 *
 *     BEFORE                                  AFTER
 *     ──────                                  ─────
 *     for (i=0;i&lt;n;i++) {                     if (mode) {
 *       if (mode)  body_A(i);                   for (i=0;i&lt;n;i++) body_A(i);
 *       else       body_B(i);                  } else {
 *     }                                          for (i=0;i&lt;n;i++) body_B(i);
 *                                              }
 *
 * Cost / benefit
 * --------------
 *   COST    code-size doubles.
 *   BENEFIT each loop body has zero per-iteration branch overhead AND
 *           can be optimized independently (vectorized, unrolled).
 *
 * Pass names
 * ----------
 *   LLVM:  SimpleLoopUnswitchPass (new), LoopUnswitchPass (legacy).
 *   GCC :  tree-ssa-loop-unswitch.cc.
 *
 * Knobs (LLVM)
 * ------------
 *   -mllvm -unswitch-threshold=N           default ~100
 * ============================================================================
 */
#include &lt;stddef.h&gt;

/*  unswitchable — \`mode\` is loop-invariant; the if is hoisted out.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3, simplified):
 *      unswitchable:
 *          test  rdx, rdx
 *          je    .exit
 *          test  ecx, ecx                  ; check mode ONCE up front
 *          je    .mode_zero
 *          ; --- mode != 0: vectorized &quot;a[i] = b[i] * 2&quot; loop ---
 *      .mode_nonzero_vec:
 *          movdqu xmm0, [rsi + 4*rcx]
 *          movdqu xmm1, [rsi + 4*rcx + 16]
 *          paddd  xmm0, xmm0                ; *2 by adding to self
 *          paddd  xmm1, xmm1
 *          movdqu [rdi + 4*rcx],      xmm0
 *          movdqu [rdi + 4*rcx + 16], xmm1
 *          add    rcx, 8
 *          ...
 *      .mode_zero:
 *          ; --- mode == 0: vectorized &quot;a[i] = b[i] + 5&quot; loop ---
 *          ; (separate loop body, no branch inside)
 *
 *  WHAT WE'D EXPECT WITHOUT UNSWITCHING:
 *      .loop:
 *          mov  eax, [rsi + 4*rcx]
 *          test ecx, ecx
 *          je   .else
 *          shl  eax, 1              ; *2
 *          jmp  .store
 *      .else:
 *          add  eax, 5
 *      .store:
 *          mov  [rdi + 4*rcx], eax
 *          inc  rcx
 *          cmp  rcx, rdx
 *          jl   .loop
 *
 *  WHY: With the branch inside the body, the vectorizer can't easily
 *  SIMD-ify because the two arms are different ops. After unswitching
 *  each loop is pure straight-line vectorizable code; both halves run
 *  at the maximum SIMD width.
 */
void unswitchable(int *a, const int *b, size_t n, int mode) {
    for (size_t i = 0; i &lt; n; i++) {
        if (mode)
            a[i] = b[i] * 2;
        else
            a[i] = b[i] + 5;
    }
}

/*  unswitch_via_flag — invariant condition lives in a separate variable.
 *  ──────────────────────────────────────────────────────────────────────────
 *  Same outcome as \`unswitchable\` above. The compiler hoists the load
 *  \`*opt\` into the preheader (LICM), reduces it to a 0/1 flag, then
 *  unswitches the loop on that flag.
 *
 *  Note: with \`restrict\` or a load that AA proves invariant, this is
 *  reliable. Without those guarantees, the load might be re-issued and
 *  unswitching may not fire (the compiler can't prove the condition is
 *  truly loop-invariant).
 */
void unswitch_via_flag(int *a, const int *b, size_t n, const int *opt) {
    int flag = (*opt != 0);
    for (size_t i = 0; i &lt; n; i++) {
        if (flag)
            a[i] = b[i] * 2;
        else
            a[i] = b[i] + 5;
    }
}

</code></pre>` },
  { name: `18. Loop Optimizations / Fusion`, path: `02_loop_optimizations/05_fusion.c`, dir: `02_loop_optimizations`, body: `<h1 id="05_fusionc">05_fusion.c</h1>
<pre><code class="language-c">/* 05_fusion.c — LOOP FUSION (jamming)
 * ============================================================================
 *
 * Idea
 * ----
 *   Two adjacent loops with the same trip count and compatible
 *   dependencies become one. Halves the loop overhead and improves cache
 *   locality (a[i] written by loop 1 is still in the L1 when loop 2
 *   reads it).
 *
 *     BEFORE                                  AFTER
 *     ──────                                  ─────
 *     for (i=0;i&lt;n;i++) a[i] = b[i] + 1;       for (i=0;i&lt;n;i++) {
 *     for (i=0;i&lt;n;i++) c[i] = a[i] * 2;          int t = b[i] + 1;
 *                                                  a[i] = t;
 *                                                  c[i] = t * 2;     ; or 2*(b[i]+1)
 *                                              }
 *
 * Legality
 * --------
 *   – Same loop bounds.
 *   – For every iteration i in the fused loop, all reads in \`loop2(i)\`
 *     of values produced by loop1 must read iteration-i's value, NOT
 *     iteration-(i±k)'s value.
 *
 * Pass names
 * ----------
 *   LLVM:  LoopFusePass  (experimental; -mllvm -enable-loop-fusion).
 *   GCC :  tree-ssa-loop-distribute.cc handles both fusion and fission.
 * ============================================================================
 */
#include &lt;stddef.h&gt;

/*  fusable_pair — IDEAL candidate.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3) note: LLVM does NOT currently fuse this by default
 *  (fusion is conservative; the cost model often vectorizes each loop
 *  independently). The asm shows TWO vector loops emitted:
 *
 *      .loop1_vec:                              ; a[i] = b[i] + 1
 *          movdqu xmm1, [rdx + 4*r8]
 *          movdqu xmm2, [rdx + 4*r8 + 16]
 *          psubd  xmm1, xmm0                    ; subtract -1 (which is +1)
 *          psubd  xmm2, xmm0                     ; (xmm0 = -1 broadcast)
 *          movdqu [rdi + 4*r8],      xmm1
 *          movdqu [rdi + 4*r8 + 16], xmm2
 *          ...
 *      .loop2_vec:                              ; c[i] = a[i] * 2
 *          ...
 *
 *  WHAT IDEAL FUSION WOULD PRODUCE:
 *      .fused_loop:
 *          movdqu xmm1, [rdx + 4*r8]            ; load b[i:i+4]
 *          psubd  xmm1, xmm0                    ; +1
 *          movdqu [rdi + 4*r8], xmm1            ; store a[i:i+4]
 *          paddd  xmm2, xmm1, xmm1              ; t * 2
 *          movdqu [rcx + 4*r8], xmm2            ; store c[i:i+4]
 *          ...
 *      WIN: ONE pass over the index range, the a[i] write/read pair
 *      stays in L1, two loops of overhead become one.
 *
 *  Apply the fusion manually if the heuristic doesn't fire:
 *      for (size_t i = 0; i &lt; n; i++) {
 *          int t = b[i] + 1;
 *          a[i] = t;
 *          c[i] = t * 2;
 *      }
 */
void fusable_pair(int *a, int *c, const int *b, size_t n) {
    for (size_t i = 0; i &lt; n; i++) a[i] = b[i] + 1;
    for (size_t i = 0; i &lt; n; i++) c[i] = a[i] * 2;
}

/*  not_fusable — illegal because loop2 reads a[i+1], not a[i].
 *  ──────────────────────────────────────────────────────────────────────────
 *  Trying to fuse this would read a[i+1] BEFORE loop 1 has written it,
 *  changing program semantics. The pass quickly rejects the candidate
 *  via dependence analysis on the array subscript.
 */
void not_fusable(int *a, int *c, const int *b, size_t n) {
    for (size_t i = 0; i &lt; n; i++)     a[i] = b[i] + 1;
    for (size_t i = 0; i + 1 &lt; n; i++) c[i] = a[i + 1] * 2;
}

</code></pre>` },
  { name: `19. Loop Optimizations / Fission`, path: `02_loop_optimizations/06_fission.c`, dir: `02_loop_optimizations`, body: `<h1 id="06_fissionc">06_fission.c</h1>
<pre><code class="language-c">/* 06_fission.c — LOOP FISSION (distribution)
 * ============================================================================
 *
 * Idea
 * ----
 *   The dual of fusion. Split ONE loop with multiple statements into
 *   MULTIPLE loops, each with a single statement. Useful when:
 *     – one statement vectorizes and another doesn't → split out the
 *       vectorizable half;
 *     – the working set busts cache but each half fits;
 *     – you want to parallelize or offload just the heavy half.
 *
 * Pass names
 * ----------
 *   LLVM:  LoopDistributePass (in the default pipeline at -O2/3).
 *   GCC :  tree-loop-distribution.cc.
 * ============================================================================
 */
#include &lt;stddef.h&gt;
#include &lt;stdint.h&gt;

/*  mixed_loop — first statement vectorizable, second serial reduction.
 *  ──────────────────────────────────────────────────────────────────────────
 *  Source:
 *      for (size_t i = 0; i &lt; n; i++) {
 *          a[i] = b[i] + 1;                      // vectorizable
 *          hash = (hash * 31u) ^ (uint32_t)a[i]; // serial chain on hash
 *      }
 *
 *  IDEAL TRANSFORM (loop fission):
 *      for (size_t i = 0; i &lt; n; i++) a[i] = b[i] + 1;      // vectorize
 *      for (size_t i = 0; i &lt; n; i++) hash = hash*31 ^ a[i]; // serial
 *
 *  ACTUAL (-O3): Clang does NOT distribute by default here. The asm
 *  shows ONE unrolled-by-2 loop where the multiply chain on \`hash\` is
 *  the critical path:
 *      mov  r9d, [rsi + 4*rcx]
 *      inc  r9d                          ; b[i]+1
 *      mov  [rdi + 4*rcx], r9d            ; store a[i]
 *      mov  r10d, eax                     ; hash
 *      shl  r10d, 5                       ; hash * 32
 *      sub  r10d, eax                     ; hash * 31
 *      xor  r10d, r9d                     ; XOR with a[i]
 *      ... (next iteration interleaved)
 *
 *  WHY no fission: LLVM's LoopDistribute requires *no* dependence
 *  between the proposed sub-loops; here \`hash\` is read in iteration i
 *  and written in iteration i (then read again in iteration i+1), which
 *  the analyser conservatively rejects.
 *
 *  How to coerce it: manually split the loops; or hide the reduction
 *  behind \`#pragma clang loop distribute(enable)\`.
 */
uint32_t mixed_loop(int *a, const int *b, size_t n) {
    uint32_t hash = 0xdeadbeef;
    for (size_t i = 0; i &lt; n; i++) {
        a[i] = b[i] + 1;
        hash = (hash * 31u) ^ (uint32_t)a[i];
    }
    return hash;
}

</code></pre>` },
  { name: `20. Loop Optimizations / Interchange`, path: `02_loop_optimizations/07_interchange.c`, dir: `02_loop_optimizations`, body: `<h1 id="07_interchangec">07_interchange.c</h1>
<pre><code class="language-c">/* 07_interchange.c — LOOP INTERCHANGE
 * ============================================================================
 *
 * Why
 * ---
 *   C arrays are stored ROW-MAJOR: A[i][0], A[i][1], …, A[i][N-1] are
 *   contiguous; A[0][j], A[1][j], … are N*sizeof(T) bytes apart.
 *
 *   Striding by COLUMNS in the inner loop means the cache pulls in 64
 *   bytes (one cache line) of which you use ~4. Stride-by-rows uses all
 *   of it.
 *
 *     A[i][j] memory layout:                  cache line (64 B / 16 ints)
 *     ┌──────────────────────────────────┐    ┌──────────────────────────┐
 *     │ A[0][0] A[0][1] A[0][2] ...      │    │ 16 contiguous A[0][...]  │
 *     │ A[1][0] A[1][1] A[1][2] ...      │    └──────────────────────────┘
 *     │ A[2][0] A[2][1] A[2][2] ...      │
 *     └──────────────────────────────────┘
 *
 * Pass names
 * ----------
 *   LLVM:  LoopInterchangePass (off by default in older versions; needs
 *          -mllvm -enable-loopinterchange in some toolchains).
 *   GCC :  graphite-interchange.cc (-floop-nest-optimize).
 * ============================================================================
 */
#include &lt;stddef.h&gt;

#define N 1024

/*  bad_order — INNER loop strides by N elements.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3): the compiler DID NOT interchange. Look at the inner-
 *  loop body:
 *      mov  [rdi + r8 - 12288], r9d              ; stride 4096 between
 *      mov  [rdi + r8 -  8192], r10d              ; consecutive stores
 *      mov  [rdi + r8 -  4096], r10d
 *      mov  [rdi + r8        ], r10d
 *      add  r8, 16384                             ; += 16 KB per inner iter
 *
 *  That's right — every inner iteration advances by 16 KB, touching a
 *  fresh cache line each time. Memory bandwidth bound.
 *
 *  WHY NOT INTERCHANGE: LoopInterchange is off by default at -O3 in
 *  LLVM (cost-model heuristic conservative; risks of regression on
 *  small N). With \`-mllvm -enable-loopinterchange\` it would swap the
 *  two loops, restoring stride-1 access.
 */
void bad_order(int A[N][N]) {
    for (int j = 0; j &lt; N; j++) {
        for (int i = 0; i &lt; N; i++) {
            A[i][j] = i * j;
        }
    }
}

/*  good_order — already the right order.
 *  ──────────────────────────────────────────────────────────────────────────
 *  Inner loop strides by 4 bytes. The vectorizer LOVES this and SIMD-
 *  ifies the inner loop trivially.
 *
 *  Lesson: choose the right loop order yourself. The compiler will
 *  rarely save you.
 */
void good_order(int A[N][N]) {
    for (int i = 0; i &lt; N; i++) {
        for (int j = 0; j &lt; N; j++) {
            A[i][j] = i * j;
        }
    }
}

/*  transpose_naive — has BAD access pattern in one matrix no matter what.
 *  ──────────────────────────────────────────────────────────────────────────
 *  Inherent to matrix transpose: one matrix is stride-1, the other is
 *  stride-N. Tiling (block transpose) is the standard fix:
 *
 *      for (int ii = 0; ii &lt; N; ii += T)
 *        for (int jj = 0; jj &lt; N; jj += T)
 *          for (int i = ii; i &lt; ii + T; i++)
 *            for (int j = jj; j &lt; jj + T; j++)
 *              dst[j][i] = src[i][j];
 *
 *  Inside a T×T tile both src and dst stay in L1. The compiler's
 *  polyhedral framework (Polly / Graphite) does this; the in-tree
 *  -O3 pipeline does NOT.
 */
void transpose_naive(int dst[N][N], const int src[N][N]) {
    for (int i = 0; i &lt; N; i++)
        for (int j = 0; j &lt; N; j++)
            dst[j][i] = src[i][j];
}

</code></pre>` },
  { name: `21. Loop Optimizations / Tiling`, path: `02_loop_optimizations/08_tiling.c`, dir: `02_loop_optimizations`, body: `<h1 id="08_tilingc">08_tiling.c</h1>
<pre><code class="language-c">/* 08_tiling.c — LOOP TILING / BLOCKING
 * ============================================================================
 *
 * Why
 * ---
 *   Matrix multiplication is the canonical example: the working set is
 *   O(N²) per matrix but you only touch O(T²) elements of B per inner
 *   pass when blocked. With T=32, each tile is 32×32×8 B = 8 KB → fits
 *   easily in L1 D-cache.
 *
 *   Reuse per element BEFORE tiling:    ~1
 *   Reuse per element AFTER tiling:     ~T
 *   For T = 32, that's a 32× drop in DRAM traffic.
 *
 *     Big A * B = C tile layout:
 *     ┌──┬──┬──┬──┐  *  ┌──┬──┬──┬──┐  =  ┌──┬──┬──┬──┐
 *     │  │  │  │  │     │  │  │  │  │     │T │T │T │T │
 *     ├──┼──┼──┼──┤     ├──┼──┼──┼──┤     ├──┼──┼──┼──┤
 *     │  │  │  │  │     │  │  │  │  │     │T │T │T │T │  ← compute one
 *     ├──┼──┼──┼──┤     ├──┼──┼──┼──┤     ├──┼──┼──┼──┤    C-tile fully
 *     │  │  │  │  │     │  │  │  │  │     │T │T │T │T │    before moving
 *     └──┴──┴──┴──┘     └──┴──┴──┴──┘     └──┴──┴──┴──┘    on
 *
 * Where it lives
 * --------------
 *   Off by default in both -O3 pipelines. Need:
 *     LLVM:  -mllvm -polly  (out-of-tree but in many distros)
 *     GCC :  -floop-nest-optimize -fgraphite-identity
 *   Otherwise hand-tile.
 * ============================================================================
 */

#define N 512
#define T 32

/*  matmul_naive — the textbook triple loop.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3): the inner k-loop vectorizes nicely (innermost stride-1
 *  on A and stride-N on B), but the B accesses thrash the cache for
 *  large N. Naïve performance on a modern x86: a few GFLOPS — about an
 *  ORDER OF MAGNITUDE less than the same machine can do via BLAS.
 */
void matmul_naive(double C[N][N], const double A[N][N], const double B[N][N]) {
    for (int i = 0; i &lt; N; i++)
        for (int j = 0; j &lt; N; j++) {
            double s = 0;
            for (int k = 0; k &lt; N; k++)
                s += A[i][k] * B[k][j];
            C[i][j] = s;
        }
}

/*  matmul_tiled — six-deep nest hand-blocked.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3): the inner i/j/k triple still vectorizes; the outer
 *  ii/jj/kk triple bounds the tile size that lives in L1. On a typical
 *  desktop x86, this version is 2-4× faster than \`matmul_naive\` for
 *  N=512.
 *
 *  WHAT YOU MIGHT EXPECT WITHOUT TILING: compiler auto-tiling. It
 *  rarely happens because:
 *    – The cost model has too many free variables (cache size, etc.).
 *    – Wrong tiling can make code SLOWER (e.g. T=1 is just naïve again).
 *    – Existing tools (Polly, Graphite) compute tile sizes from the
 *      target's cache parameters but are still off by default.
 *
 *  The lesson: for math kernels, tile by hand and let the compiler
 *  vectorize the inner loops. (Or better: use a BLAS library.)
 */
void matmul_tiled(double C[N][N], const double A[N][N], const double B[N][N]) {
    for (int i = 0; i &lt; N; i++)
        for (int j = 0; j &lt; N; j++)
            C[i][j] = 0.0;

    for (int ii = 0; ii &lt; N; ii += T)
        for (int jj = 0; jj &lt; N; jj += T)
            for (int kk = 0; kk &lt; N; kk += T)
                for (int i = ii; i &lt; ii + T; i++)
                    for (int j = jj; j &lt; jj + T; j++) {
                        double s = C[i][j];
                        for (int k = kk; k &lt; kk + T; k++)
                            s += A[i][k] * B[k][j];
                        C[i][j] = s;
                    }
}

</code></pre>` },
  { name: `22. Loop Optimizations / Iv Simplification`, path: `02_loop_optimizations/09_iv_simplification.c`, dir: `02_loop_optimizations`, body: `<h1 id="09_iv_simplificationc">09_iv_simplification.c</h1>
<pre><code class="language-c">/* 09_iv_simplification.c — INDUCTION VARIABLE OPTIMIZATION
 * ============================================================================
 *
 * Idea
 * ----
 *   An *induction variable* (IV) of a loop is a value whose change per
 *   iteration is constant (modulo the trip count). Examples:
 *     i in \`for (i=0;i&lt;n;i++)\`        (step +1)
 *     p in \`for (p=a;p&lt;a+n;p++) ...\`  (step +sizeof(*p))
 *
 *   IVOPT (LLVM's IndVarSimplifyPass, GCC's ivopts) does:
 *     1. CANONICALIZE   reduce to a single i64 counter where possible
 *     2. STRENGTH REDUCE  replace \`a[i*c]\` with a pointer that steps by c
 *     3. LFTR              rewrite the exit test in terms of the new IV
 *     4. ELIMINATE         drop redundant IVs (one pointer drives two arrays)
 *
 * Modeled by Scalar Evolution (SCEV) / GCC tree-scalar-evolution.cc, a
 * closed-form description of \`value(i) = base + i * step\`.
 * ============================================================================
 */
#include &lt;stddef.h&gt;

/*  sum_strided — \`a[i*4 + 8]\` becomes a pointer increment of 16.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3) main loop body (4-way unrolled, base offset already
 *  added):
 *      .vec:
 *          add  eax, [r8 - 48]
 *          add  eax, [r8 - 32]
 *          add  eax, [r8 - 16]
 *          add  eax, [r8       ]
 *          add  rdx, 4
 *          add  r8,  64            ; pointer step = 4 iters * 16 bytes
 *          cmp  rsi, rdx
 *          jne  .vec
 *
 *  WHAT WE'D EXPECT WITHOUT IVOPT: each iteration computes
 *  \`r8 = a + i*16 + 32\`, requiring an extra multiply per iter.
 *
 *  WHY: IVOPT recognises the linear address pattern via SCEV. It
 *  rewrites the loop in terms of a single pointer p that starts at
 *  \`a + 8 * sizeof(int) = a + 32\` and increments by 16 each iter. No
 *  multiply in the body; just an \`add r8, 16\`. (After unrolling x4,
 *  the increment is +64.)
 */
int sum_strided(const int *a, size_t n) {
    int s = 0;
    for (size_t i = 0; i &lt; n; i++) s += a[i * 4 + 8];
    return s;
}

/*  dual_index — two parallel index computations collapse.
 *  ──────────────────────────────────────────────────────────────────────────
 *  After IVOPT both \`a[i*2]\` and \`b[i*2+1]\` collapse to two pointers
 *  that each step by 8 (= 2 * sizeof(int)) per iteration. No multiply,
 *  no separate index counter — the loop closes back on the END of one
 *  of the pointers.
 */
void dual_index(int *a, int *b, size_t n) {
    for (size_t i = 0; i &lt; n; i++) {
        a[i * 2]     = (int)i;
        b[i * 2 + 1] = (int)i * 3;
    }
}

/*  sum_with_check — redundant bound check removed by range analysis.
 *  ──────────────────────────────────────────────────────────────────────────
 *  Source has \`if (i &lt; n) s += a[i];\` inside a loop bounded by \`i &lt; n\`.
 *  Trivially redundant. SCEV proves \`i &lt; n\` is loop-invariant (always
 *  true within the loop), and the inner \`if\` collapses → straight-line
 *  accumulator loop.
 *
 *  ACTUAL (-O3): identical asm to a plain sum loop. The wasted check
 *  is GONE.
 */
int sum_with_check(const int *a, size_t n) {
    int s = 0;
    for (size_t i = 0; i &lt; n; i++) {
        if (i &lt; n) s += a[i];
    }
    return s;
}

</code></pre>` },
  { name: `23. Loop Optimizations / Rerolling`, path: `02_loop_optimizations/10_rerolling.c`, dir: `02_loop_optimizations`, body: `<h1 id="10_rerollingc">10_rerolling.c</h1>
<pre><code class="language-c">/* 10_rerolling.c — LOOP REROLLING
 * ============================================================================
 *
 * Idea
 * ----
 *   The OPPOSITE of unrolling. If source code is already (hand-)
 *   unrolled, sometimes the optimizer prefers a clean loop. LoopReroll
 *   detects the pattern and rebuilds the loop, then later the vectorizer
 *   may SIMD-ify it.
 *
 *   In practice modern compilers SLP-vectorize unrolled straight-line
 *   code directly, so explicit rerolling fires rarely. The example
 *   below is what you DO see: the SLP vectorizer recognised four
 *   independent loads + adds and fused them into one wide SIMD reduce.
 *
 * Pass names
 * ----------
 *   LLVM:  LoopRerollPass; also SLPVectorizerPass for the straight-line
 *          case.
 *   GCC :  rerolling is not a separate pass; SLP handles most cases.
 * ============================================================================
 */

/*  unrolled4 — a hand-unrolled 4-element sum.
 *  ──────────────────────────────────────────────────────────────────────────
 *  Source: return a[0] + a[1] + a[2] + a[3];
 *
 *  NAIVE EXPECTED (-O3, no SLP):
 *      mov  eax, [rdi]
 *      add  eax, [rdi + 4]
 *      add  eax, [rdi + 8]
 *      add  eax, [rdi + 12]
 *      ret
 *
 *  ACTUAL (-O3):
 *      unrolled4:
 *          movdqu xmm0, xmmword ptr [rdi]    ; load all 4 ints at once
 *          pshufd xmm1, xmm0, 0xEE           ; [a2,a3,a2,a3] (high half)
 *          paddd  xmm1, xmm0                 ; [a0+a2, a1+a3, ...]
 *          pshufd xmm0, xmm1, 0x55           ; broadcast lane 1
 *          paddd  xmm0, xmm1                 ; lane0 += lane1
 *          movd   eax, xmm0                  ; extract lane 0
 *          ret
 *
 *  WHY: SLP-vectorizer noticed 4 adjacent contiguous loads + an
 *  associative reduction tree, fused them into one 128-bit load, and
 *  used SSE shuffle/add for the horizontal reduce. Fewer total µops
 *  *and* shorter critical path than the scalar chain.
 */
int unrolled4(const int *a) {
    return a[0] + a[1] + a[2] + a[3];
}

/*  unrolled8 — same idea, 8 elements; two 16-byte loads then reduce.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      unrolled8:
 *          movdqu xmm0, [rdi]
 *          movdqu xmm1, [rdi + 16]
 *          paddd  xmm1, xmm0                  ; element-wise sum of the
 *                                              ; two halves
 *          pshufd xmm0, xmm1, 0xEE            ; horizontal reduce as above
 *          paddd  xmm0, xmm1
 *          pshufd xmm1, xmm0, 0x55
 *          paddd  xmm1, xmm0
 *          movd   eax, xmm1
 *          ret
 */
int unrolled8(const int *a) {
    return a[0] + a[1] + a[2] + a[3]
         + a[4] + a[5] + a[6] + a[7];
}

/*  store_unrolled — four identical stores → broadcast + single vector store.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      store_unrolled:
 *          movd   xmm0, esi                  ; xmm0 = [v, 0, 0, 0]
 *          pshufd xmm0, xmm0, 0              ; xmm0 = [v, v, v, v]
 *          movdqu xmmword ptr [rdi], xmm0     ; ONE 16-byte store
 *          ret
 *
 *  WHY: Storing the same value to 4 adjacent slots is a broadcast +
 *  vector-store pattern. SLP recognises it and emits the three-
 *  instruction sequence above instead of four mov-stores.
 */
void store_unrolled(int *a, int v) {
    a[0] = v;
    a[1] = v;
    a[2] = v;
    a[3] = v;
}

</code></pre>` },
  { name: `24. Loop Optimizations / Idiom Recognition`, path: `02_loop_optimizations/11_idiom_recognition.c`, dir: `02_loop_optimizations`, body: `<h1 id="11_idiom_recognitionc">11_idiom_recognition.c</h1>
<pre><code class="language-c">/* 11_idiom_recognition.c — LOOP IDIOM RECOGNITION
 * ============================================================================
 *
 * Idea
 * ----
 *   The compiler matches a *whole loop* against known patterns and
 *   replaces it with a single library call or hardware instruction.
 *
 *   loop pattern                              replaced by
 *   ────────────────────────────────          ───────────────────────────
 *   for(i=0;i&lt;n;i++) p[i] = 0;                memset(p, 0, n)
 *   for(i=0;i&lt;n;i++) p[i] = c;                memset(p, c, n)        (byte c only)
 *   for(i=0;i&lt;n;i++) d[i] = s[i];             memcpy(d, s, n)
 *   while (*s) s++;                            strlen(s)
 *   for(...) c += (x&gt;&gt;i)&amp;1;                    __builtin_popcount(x)
 *   sum 0..n-1                                 n*(n-1)/2 (closed-form via SCEV)
 *
 * Pass names
 * ----------
 *   LLVM:  LoopIdiomRecognizePass.
 *   GCC :  tree-loop-distribute-patterns.cc + builtins recognition.
 *
 * When it FAILS
 * -------------
 *   – \`-ffreestanding\` or \`-fno-builtin-memset\` removes the assumption
 *     that the libc functions exist.
 *   – Loops with non-trivial side effects in the body.
 *   – Loops where the trip-count is not a known SCEV expression.
 * ============================================================================
 */
#include &lt;stddef.h&gt;
#include &lt;stdint.h&gt;

/*  zero_buf — recognised as memset(p, 0, n).
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3, on macOS x86):
 *      zero_buf:
 *          test  rsi, rsi
 *          jne   ___bzero            ; TAIL CALL to libc bzero(p, n)
 *          ret
 *
 *  Linux glibc target instead tail-calls to memset@PLT.
 *
 *  WHAT WE'D EXPECT WITHOUT IDIOM RECOGNITION: a hand-vectorized loop,
 *  fine for small n but never as fast as libc's hand-tuned memset which
 *  uses non-temporal stores past the L3 cache for large n.
 */
void zero_buf(uint8_t *p, size_t n) {
    for (size_t i = 0; i &lt; n; i++) p[i] = 0;
}

/*  fill_buf — recognised as memset(p, c, n).
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      fill_buf:
 *          test  rsi, rsi
 *          je    .ret
 *          mov   rax, rsi             ; argument shuffling for memset signature
 *          movzx esi, dl
 *          mov   rdx, rax
 *          jmp   _memset              ; TAIL CALL
 *      .ret: ret
 *
 *  Note the argument shuffle: source has signature (p, n, c) but memset
 *  wants (p, c, n). The compiler arranges them in the right SysV-ABI
 *  registers and jumps.
 */
void fill_buf(uint8_t *p, size_t n, uint8_t c) {
    for (size_t i = 0; i &lt; n; i++) p[i] = c;
}

/*  copy_buf — recognised as memcpy(d, s, n).
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3): NOT lowered to a memcpy call here. The reason is that
 *  the compiler chose to vectorize inline (large enough body, alignment
 *  guards inserted) because the cost model thought inline was cheaper
 *  than the function-call overhead.
 *
 *  If you call this with large n, calling memcpy directly is usually
 *  faster than letting the compiler inline-vectorize, because libc's
 *  memcpy uses rep movsq + non-temporal stores tuned to the L3 size.
 */
void copy_buf(uint8_t *d, const uint8_t *s, size_t n) {
    for (size_t i = 0; i &lt; n; i++) d[i] = s[i];
}

/*  mystrlen — recognised as strlen.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3): tail-calls libc strlen on most platforms. On baseline
 *  x86-64 you may instead see an inline loop using \`pcmpeqb\` to scan 16
 *  bytes at a time for the null terminator.
 *
 *  WHY: glibc's strlen uses SSE4.2's \`pcmpistri\` and is faster than any
 *  byte-at-a-time loop the compiler would inline.
 */
size_t mystrlen(const char *s) {
    const char *p = s;
    while (*p) p++;
    return (size_t)(p - s);
}

/*  sum_arith — sum 0..n-1 → closed form via SCEV.
 *  ──────────────────────────────────────────────────────────────────────────
 *  EXPECTED (without SCEV): a vectorized loop of \`add ecx, ebx; inc ebx\`.
 *
 *  ACTUAL (-O3): a few instructions implementing \`n*(n-1)/2\`:
 *      sum_arith:
 *          test  edi, edi
 *          je    .ret_zero
 *          lea   eax, [rdi - 1]       ; n - 1
 *          imul  rax, rdi              ; n * (n-1)
 *          shr   rax                   ; / 2
 *          ; ... (mov to return reg)
 *
 *  WHY: SCEV gives a closed-form description \`value(i) = i\` for the
 *  loop counter; the sum becomes \`Σi=0..n-1 i = n(n-1)/2\`. The compiler
 *  drops the loop entirely. Constant-time vs O(n).
 */
unsigned sum_arith(unsigned n) {
    unsigned s = 0;
    for (unsigned i = 0; i &lt; n; i++) s += i;
    return s;
}

</code></pre>` },
  { name: `25. Loop Optimizations / Versioning`, path: `02_loop_optimizations/12_versioning.c`, dir: `02_loop_optimizations`, body: `<h1 id="12_versioningc">12_versioning.c</h1>
<pre><code class="language-c">/* 12_versioning.c — LOOP VERSIONING
 * ============================================================================
 *
 * Idea
 * ----
 *   When the compiler cannot statically prove a property required by an
 *   optimization (no-alias, alignment, finite n, ...), it can emit a
 *   *runtime guard* and produce TWO versions of the loop: the optimized
 *   one taken when the guard succeeds, and a safe fallback otherwise.
 *
 *   The cost is code size (two loops) and one runtime test.
 *   The benefit is the optimized loop fires whenever the guard passes,
 *   which is usually almost always.
 *
 * Common applications
 * -------------------
 *   – Memcheck guards for the vectorizer (no overlap → safe to SIMD).
 *   – Alignment-versioning (peel until aligned vs. unaligned loop).
 *   – Trip-count specialisation (small n → scalar, large n → vector).
 * ============================================================================
 */
#include &lt;stddef.h&gt;

/*  add_arrays — pointers MIGHT alias.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3): the compiler emits THREE paths:
 *
 *      add_arrays:
 *          test  rcx, rcx
 *          je    .exit              ; n == 0
 *          cmp   rcx, 12
 *          jb    .scalar_small      ; n &lt; 12 → not worth vectorizing
 *
 *          ; --- Memcheck guard for vectorized fast path ---
 *          mov   rax, rdi
 *          sub   rax, rsi
 *          cmp   rax, 32            ; abs(a - b) &lt; 32 ?
 *          setb  al
 *          mov   r8,  rdi
 *          sub   r8,  rdx
 *          cmp   r8,  32            ; abs(a - c) &lt; 32 ?
 *          setb  r8b
 *          or    r8b, al
 *          je    .vec_safe          ; both far apart → safe to vectorize
 *
 *      .scalar_small:               ; small n OR aliased
 *          xor   eax, eax
 *      .scalar_body:
 *          mov   r10d, [rdx + 4*r8]
 *          add   r10d, [rsi + 4*r8]
 *          mov   [rdi + 4*r8], r10d
 *          inc   r8
 *          dec   r9
 *          jne   .scalar_body
 *          ; ...
 *
 *      .vec_safe:                   ; vectorized body using SSE
 *          ; ... 4-way packed adds ...
 *
 *  WHY: The optimizer can't prove \`a\`, \`b\`, \`c\` are disjoint. Instead
 *  of conservatively scalarizing, it emits a runtime memcheck that
 *  picks the vectorized path most of the time (real callers rarely
 *  pass aliasing pointers).
 */
void add_arrays(int *a, const int *b, const int *c, size_t n) {
    for (size_t i = 0; i &lt; n; i++) a[i] = b[i] + c[i];
}

/*  add_arrays_restrict — restrict eliminates the runtime check.
 *  ──────────────────────────────────────────────────────────────────────────
 *  Same source body as above. The asm omits the memcheck branch
 *  entirely; the compiler emits a single vector loop + scalar
 *  epilogue. Smaller code, one fewer compare per call.
 */
void add_arrays_restrict(int * restrict a,
                         const int * restrict b,
                         const int * restrict c,
                         size_t n) {
    for (size_t i = 0; i &lt; n; i++) a[i] = b[i] + c[i];
}

/*  aligned_or_not — vectorizer's alignment versioning.
 *  ──────────────────────────────────────────────────────────────────────────
 *  Depending on the cost model, the compiler may emit:
 *    – a scalar prologue that handles misaligned head iterations,
 *    – an aligned vector loop body,
 *    – a scalar epilogue for the tail.
 *
 *  On modern Intel/AMD the unaligned \`movups\`/\`vmovdqu\` is essentially
 *  free for naturally-aligned data, so the prologue is often skipped.
 *  Older CPUs (pre-Nehalem) penalised unaligned loads, hence the
 *  conservative scheme.
 */
void aligned_or_not(float *a, const float *b, size_t n) {
    for (size_t i = 0; i &lt; n; i++) a[i] = a[i] + b[i];
}

</code></pre>` },

<p>Loops are where programs spend their time, and where the optimizer earns its
keep. This chapter walks through the loop transformations every serious
performance engineer should be able to <em>recognize in assembly</em>.</p>
<h2 id="map">Map</h2>

</tr>

<td><code>12_versioning.c</code></td>
<td>Loop versioning (alias/alignment runtime checks)</td>
