<pre><code class="language-c">/* 03_slp.c — STRAIGHT-LINE-CODE VECTORIZATION (SLP)
 * ============================================================================
 *
 * Idea
 * ----
 *   The loop vectorizer handles vector OPs across iterations of a loop.
 *   The SLP (Superword-Level Parallelism) vectorizer does the same for
 *   straight-line code: it finds groups of independent scalar ops on
 *   adjacent memory locations and fuses them into one SIMD op.
 *
 *     a[0] = b[0] + c[0];
 *     a[1] = b[1] + c[1];           ─►  movaps + addps + movaps
 *     a[2] = b[2] + c[2];                (3 instructions vs 12)
 *     a[3] = b[3] + c[3];
 *
 * Pass names
 * ----------
 *   LLVM: SLPVectorizerPass; VectorCombine handles smaller patterns.
 *   GCC : tree-vect-slp.cc.
 *
 * Why it pays off
 * ---------------
 *   – Straight-line code has no loop overhead, so the gain from the
 *     SIMD op is pure speed.
 *   – Often enables further fusion: a vectorized \`mul\` + \`add\` can
 *     become a single FMA.
 * ============================================================================
 */
#include &lt;stddef.h&gt;

/*  slp4 — 4 adjacent scalar adds; NEEDS restrict to fire.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3 -mavx2, NO restrict): SCALAR adds emitted, four separate
 *  \`vaddss\` + \`vmovss\` triples. SLP DID NOT FIRE.
 *
 *      slp4:
 *          vmovss xmm0, [rsi]
 *          vaddss xmm0, xmm0, [rdx]
 *          vmovss [rdi], xmm0
 *          ; ... three more ...
 *
 *  WHY: without restrict, the compiler can't prove \`a\`, \`b\`, \`c\` are
 *  disjoint; emitting a 16-byte vector load could read past the end of
 *  a partial overlap. Conservative scalar code.
 */
void slp4(float *a, const float *b, const float *c) {
    a[0] = b[0] + c[0];
    a[1] = b[1] + c[1];
    a[2] = b[2] + c[2];
    a[3] = b[3] + c[3];
}

/*  slp4_restrict — same body but with restrict; SLP fires.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3 -mavx2, with restrict):
 *      slp4_restrict:
 *          vmovups  xmm0, [rsi]         ; load b[0..3]
 *          vaddps   xmm0, xmm0, [rdx]    ; SIMD add c[0..3]
 *          vmovups  [rdi], xmm0          ; store a[0..3]
 *          ret
 *
 *  Three vector instructions instead of 4 × 3 = 12 scalar. ~4× fewer
 *  µops; ~4× less load/store throughput pressure.
 */
void slp4_restrict(float * restrict a,
                   const float * restrict b,
                   const float * restrict c) {
    a[0] = b[0] + c[0];
    a[1] = b[1] + c[1];
    a[2] = b[2] + c[2];
    a[3] = b[3] + c[3];
}

/*  add — operator on two short vectors via clang ext_vector_type.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3 -mavx2):
 *      add:
 *          vaddps  xmm0, xmm0, xmm2   ; lanes 0..3 of x + y
 *          vaddps  xmm1, xmm1, xmm3   ; lanes 4..7 of x + y
 *          ret
 *
 *  WHY: \`float __attribute__((ext_vector_type(8)))\` directly maps to a
 *  pair of XMM/YMM regs. Operators are intrinsic; no auto-vectorizer
 *  needed.
 */
typedef float vf8 __attribute__((ext_vector_type(8)));
vf8 add(vf8 x, vf8 y) { return x + y; }

/*  scale4 — scale 4 adjacent floats by a constant in a SIMD-friendly way.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3 -mavx2):
 *      scale4:
 *          vbroadcastss xmm0, xmm0        ; broadcast scale into 4 lanes
 *          vmulps       xmm0, xmm0, [rdi] ; element-wise multiply
 *          vmovups      [rdi], xmm0       ; store back
 *          ret
 *
 *  WHY: SLP sees 4 adjacent scalar \`a[i] *= scale\`. It packs them into
 *  one vmulps; the constant scale is broadcast to all 4 lanes.
 */
void scale4(float *a, float scale) {
    a[0] *= scale;
    a[1] *= scale;
    a[2] *= scale;
    a[3] *= scale;
}

</code></pre>` },
  { name: `71. Vectorization / Masked`, path: `08_vectorization/04_masked.c`, dir: `08_vectorization`, body: `<h1 id="04_maskedc">04_masked.c</h1>
<pre><code class="language-c">/* 04_masked.c — MASKED VECTORIZATION (conditionals inside loop bodies)
 * ============================================================================
 *
 * Idea
 * ----
 *   \`if (cond[i]) ...\` inside a vectorized loop becomes a PREDICATED
 *   SIMD operation. A mask register selects which lanes are &quot;alive&quot;;
 *   inactive lanes are bypassed.
 *
 *   AVX-512 / SVE / RISC-V V: native masked load/store/op instructions.
 *   AVX2:        vpmaskmovd / vmaskmovps (masked store), or
 *                a &quot;load-blend-store&quot; pair (read old, blend, write).
 *
 *   The mask is built from the per-lane comparison: \`vpcmpgtd ymm_mask,
 *   ymm_a, ymm_zero\` produces -1 in lanes where a &gt; 0, 0 elsewhere.
 *
 * Why masking matters
 * -------------------
 *   Without it, a loop with \`if\` couldn't be vectorized (different
 *   lanes would do different things). Masking lets ALL lanes execute,
 *   but only the right ones COMMIT — preserving correctness while
 *   keeping the full SIMD throughput on the common-true case.
 * ============================================================================
 */
#include &lt;stddef.h&gt;

/*  clip_to_zero — set negative elements to 0.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3 -mavx2):
 *      .vec:
 *          vmovdqu  ymm1, [rcx + 4*rdx - 96]    ; load 8 ints
 *          vpmaskmovd [rcx + 4*rdx - 96], ymm1, ymm0  ; mask-store with mask=ymm1
 *          ; ... repeated for 4 unrolled chunks ...
 *
 *  WHY: For &quot;set negative to 0&quot;, the result is \`max(a[i], 0)\`. The
 *  compiler computes both versions (a[i] and 0) and uses a mask
 *  (a[i] &lt; 0) to pick. \`vpmaskmovd\` writes only the lanes where the
 *  mask is set (here: where the original was negative, the lane gets
 *  zero). Beautiful.
 *
 *  With AVX-512 you'd see \`vpmaxsd\` directly — even simpler.
 */
void clip_to_zero(int *a, size_t n) {
    for (size_t i = 0; i &lt; n; i++) {
        if (a[i] &lt; 0) a[i] = 0;
    }
}

/*  scale_positive — multiply only positive elements.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3 -mavx2): the loop:
 *      .vec:
 *          vmovups ymm1, [rdi]                  ; load 8 floats
 *          vbroadcastss ymm2, xmm0               ; scale (broadcast scalar)
 *          vmulps  ymm3, ymm1, ymm2              ; SIMD multiply
 *          vcmpgtps ymm_mask, ymm1, ymm_zero     ; mask = (a[i] &gt; 0)
 *          vblendvps ymm_out, ymm1, ymm3, ymm_mask  ; blend: use scaled if mask
 *          vmovups [rdi], ymm_out                ; store
 *
 *  Both \`a[i]\` and \`a[i]*s\` are computed for all 8 lanes; the blend
 *  selects which to write back. No branch in the inner loop.
 */
void scale_positive(float *a, size_t n, float s) {
    for (size_t i = 0; i &lt; n; i++) {
        if (a[i] &gt; 0.0f) a[i] *= s;
    }
}

/*  split — write to one of two arrays based on sign.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3 -mavx2): two masked stores per iteration:
 *      vmovups       ymm0, [rdi + 4*rax]            ; load in[i:i+8]
 *      vcmpgtps      ymm_mask_pos, ymm0, ymm_zero    ; mask = (in &gt; 0)
 *      vmaskmovps    [rsi + 4*rax], ymm_mask_pos, ymm0 ; pos[i] = in[i] if mask
 *      vmaskmovps    [rdx + 4*rax], ymm_neg_mask, ymm0 ; neg[i] = in[i] otherwise
 *
 *  WHY: Two output arrays + a per-lane condition. AVX2's masked store
 *  is the right tool. Each lane's data goes to exactly one of the two
 *  arrays.
 */
void split(const float *in, float *pos, float *neg, size_t n) {
    for (size_t i = 0; i &lt; n; i++) {
        if (in[i] &gt; 0.0f) pos[i] = in[i];
        else              neg[i] = in[i];
    }
}

  { name: `72. Vectorization / Alignment`, path: `08_vectorization/05_alignment.c`, dir: `08_vectorization`, body: `<h1 id="05_alignmentc">05_alignment.c</h1>
<pre><code class="language-c">/* 05_alignment.c — ALIGNMENT, PEELING, AND RUNTIME CHECKS
 * ============================================================================
 *
 * Why alignment matters
 * ---------------------
 *   – Aligned loads (\`vmovaps\`) require the address to be naturally
 *     aligned to the vector width; misaligned segfaults on older CPUs.
 *   – Unaligned loads (\`vmovups\`) ALWAYS work; on Sandy Bridge and
 *     later they have the same throughput as aligned, so the difference
 *     is essentially zero on modern x86.
 *   – On older CPUs (pre-Nehalem, in-order ARM, etc.) misaligned loads
 *     can be 2-4× slower.
 *
 * What the optimizer does
 * -----------------------
 *   1. If alignment is known (global with \`__attribute__((aligned))\`,
 *      \`__builtin_assume_aligned\`, alloc'd via aligned_alloc) → emit
 *      aligned loads directly.
 *   2. If alignment is unknown → emit unaligned loads (modern targets)
 *      OR emit a scalar peel + aligned main + scalar tail (old targets,
 *      or cost-model says alignment matters).
 *
 * Pass names
 * ----------
 *   LLVM: LoopVectorize handles peeling; Alignment Tracker prop.
 *   GCC : tree-vect-loop-manip.cc (peeling).
 * ============================================================================
 */
#include &lt;stddef.h&gt;
#include &lt;stdlib.h&gt;

/*  aligned_unknown — \`a\` could be anything; loop uses UNALIGNED loads.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3 -mavx2):
 *      .vec_body:
 *          vmovups  ymm1, [rdi + 4*rcx]            ; UNALIGNED
 *          vmovups  ymm2, [rdi + 4*rcx + 32]
 *          vmovups  ymm3, [rdi + 4*rcx + 64]
 *          vmovups  ymm4, [rdi + 4*rcx + 96]
 *          vaddps   ymm1, ymm1, ymm1                ; *2
 *          vaddps   ymm1, ymm1, ymm0                ; +1.0 (ymm0 broadcast)
 *          ; ... three more ...
 *          add      rcx, 32
 *
 *  WHY UNALIGNED IS FINE: on a modern x86 the cost of \`vmovups\` ≈
 *  \`vmovaps\` for naturally-aligned data. The compiler skips the
 *  alignment peel because the cost model says it's not worth it.
 */
void aligned_unknown(float *a, size_t n) {
    for (size_t i = 0; i &lt; n; i++) a[i] = a[i] * 2.0f + 1.0f;
}

/*  aligned_64 — \`__builtin_assume_aligned\` promises 64-byte alignment.
 *  ──────────────────────────────────────────────────────────────────────────
 *  Behaviorally identical to \`aligned_unknown\` on modern x86 (the
 *  hardware doesn't care), but on AVX-512 and on some ARM cores the
 *  compiler will emit ALIGNED loads (\`vmovaps\` / \`ldr q ...\` with the
 *  aligned indicator), which are 1-cycle faster on the latency-bound
 *  edge cases.
 *
 *  TROUBLE: if \`a\` is NOT actually 64-byte aligned, the program will
 *  SIGSEGV. \`__builtin_assume_aligned\` is a PROMISE, not a check.
 */
void aligned_64(float *a, size_t n) {
    a = __builtin_assume_aligned(a, 64);
    for (size_t i = 0; i &lt; n; i++) a[i] = a[i] * 2.0f + 1.0f;
}

/*  touch_global — global with attribute((aligned(64))); aligned loads emitted.
 *  ──────────────────────────────────────────────────────────────────────────
 *  G is placed at a 64-byte boundary by the linker. The compiler knows
 *  the alignment at compile time and emits aligned vector ops without
 *  any runtime check or peel.
 */
__attribute__((aligned(64))) float G[1024];

void touch_global(size_t n) {
    for (size_t i = 0; i &lt; n; i++) G[i] = G[i] * 2.0f + 1.0f;
}

/*  make_aligned — allocate from the heap with guaranteed alignment.
 *  ──────────────────────────────────────────────────────────────────────────
 *  \`aligned_alloc(64, n)\` returns a pointer guaranteed to be 64-byte
 *  aligned. Use this when allocating buffers for SIMD work. The C11
 *  standard requires the size to be a multiple of the alignment;
 *  posix_memalign() is the slightly-easier-to-use alternative.
 */
float *make_aligned(size_t n) {
    return (float *)aligned_alloc(64, n * sizeof(float));
}

</code></pre>` },

<pre><code class="language-c">/* 06_blockers.c — WHAT STOPS THE VECTORIZER, AND HOW TO FIX IT
 * ============================================================================
 *
 * For each pattern: the failing reason and the fix.
 *
 * Diagnose with the optimizer remarks:
 *   clang -O3 -Rpass-missed=loop-vectorize \\
 *             -Rpass-analysis=loop-vectorize \\
 *             -c 06_blockers.c -o /dev/null
 *   gcc   -O3 -fopt-info-vec-missed -c 06_blockers.c -o /dev/null
 * ============================================================================
 */
#include &lt;stddef.h&gt;
#include &lt;math.h&gt;

/*  (1) carried — \`a[i] = a[i-1] + 1\` is a serial recurrence.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3): the inner loop is unrolled but NOT vectorized:
 *      .body:
 *          lea  esi, [rax + rdx]
 *          inc  esi
 *          mov  [rdi + 4*rdx + 4], esi
 *          ; ... more scalar iterations ...
 *
 *  WHY: SCEV recognises that \`a[i] = a[0] + i\`, which is a closed form.
 *  The compiler unrolls but every store still depends on the previous.
 *
 *  FIX: rewrite the algorithm to be parallel:
 *      int v = a[0];
 *      for (i=1;i&lt;n;i++) a[i] = v + i;
 *  Now \`i\` is the IV; the writes are independent → vectorizable.
 */
void carried(int *a, size_t n) {
    for (size_t i = 1; i &lt; n; i++) a[i] = a[i - 1] + 1;
}

/*  (2) indirect — \`a[idx[i]]\` requires a gather instruction.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3 -mavx2): might emit \`vpgatherdd\` if cost model allows;
 *  more often emits a scalar loop because gather is expensive (slow on
 *  Intel pre-AVX-512, ~10-20 cycles for 8 lanes).
 *
 *  ACTUAL (-O3 -mavx512f): cleaner gather path.
 *
 *  FIX: if \`idx\` is sortable, sort the access pattern and use a stride.
 *  If you control the layout, use SOA (struct-of-arrays) to make the
 *  inner access stride-1.
 */
void indirect(int *out, const int *in, const int *idx, size_t n) {
    for (size_t i = 0; i &lt; n; i++) out[i] = in[idx[i]];
}

/*  (3) find_first — early exit prevents vectorization.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3): scalar loop with a conditional \`je .return\`. The
 *  vectorizer needs a single-exit shape and can't tolerate the
 *  data-dependent break.
 *
 *  FIX 1: use a vectorized intrinsic-based search (memchr for bytes).
 *  FIX 2: process the whole array, then find the first match via a
 *  separate reduction step (acceptable when n is small).
 */
int find_first(const int *a, size_t n, int v) {
    for (size_t i = 0; i &lt; n; i++) if (a[i] == v) return (int)i;
    return -1;
}

/*  (4) opaque_in_body — unknown call blocks vectorization.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3): scalar loop with \`call opaque\` each iteration.
 *
 *  FIX: declare opaque \`__attribute__((const))\` (no memory access).
 *  Then the body is \`a[i] = const_func(a[i])\`. The vectorizer still
 *  can't vectorize calls in general (no SIMD ABI), but at least it
 *  CSEs / fuses the surrounding code.
 *
 *  BETTER FIX: inline the function (visible body or LTO).
 *  ALTERNATIVE: write a vector version with \`__attribute__((target(&quot;avx2&quot;)))\`
 *  and use \`#pragma omp simd\` or intrinsics.
 */
extern int opaque(int);
void opaque_in_body(int *a, size_t n) {
    for (size_t i = 0; i &lt; n; i++) a[i] = opaque(a[i]);
}

/*  (5) may_alias — no restrict → runtime memcheck + dual loops.
 *  ──────────────────────────────────────────────────────────────────────────
 *  See 02_loop_optimizations/12_versioning.c. The fix is to add
 *  \`restrict\` to the pointer parameters.
 */
void may_alias(int *a, const int *b, const int *c, size_t n) {
    for (size_t i = 0; i &lt; n; i++) a[i] = b[i] + c[i];
}

/*  (6) reduce_float — fp reduction needs -ffast-math to vectorize.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3): scalar \`addss\` chain.
 *  ACTUAL (-O3 -ffast-math): full 4-accumulator \`vaddps\` vectorized
 *  reduction (see 02_reduction.c).
 *
 *  FIX: -ffast-math, or per-loop:
 *      #pragma omp simd reduction(+:s)
 *  enables associative-add for THIS loop only.
 */
float reduce_float(const float *a, size_t n) {
    float s = 0.0f;
    for (size_t i = 0; i &lt; n; i++) s += a[i];
    return s;
}

/*  (7) math_in_body — sinf() doesn't have a vector implementation.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3): scalar \`call sinf\` each iteration.
 *
 *  FIX: use a SIMD math library:
 *    gcc:   -mveclibabi=svml  -lmvec  (uses Intel SVML)
 *           -fopenmp-simd     (libm uses _ZGVbN4v_sinf etc.)
 *    clang: -fveclib=libmvec  (or =SVML, =SLEEF depending on link target)
 *  With one of these, the vectorizer rewrites the call to a SIMD-math
 *  helper that processes 4 or 8 floats per call.
 */
void math_in_body(float *a, size_t n) {
    for (size_t i = 0; i &lt; n; i++) a[i] = sinf(a[i]);
}

  { name: `74. Vectorization / Intrinsics`, path: `08_vectorization/07_intrinsics.c`, dir: `08_vectorization`, body: `<h1 id="07_intrinsicsc">07_intrinsics.c</h1>
<pre><code class="language-c">/* 07_intrinsics.c — hand-written vectors
 *
 * Two portable-ish ways to write vectors in pure C without target-specific
 * intrinsics:
 *
 *   1. GCC/Clang \`vector_size\` attribute
 *      - looks like ordinary C, uses +, -, *, comparisons, etc.
 *      - lowered to whichever ISA the compiler is targeting
 *
 *   2. clang's \`ext_vector_type\` + Swizzle members (Apple-style).
 *
 * For the ISA-specific case (Intel intrinsics), use &lt;immintrin.h&gt;. The
 * trade-off: portable code is easier to read; intrinsics give you exact
 * control over which instructions execute.
 */
#include &lt;stddef.h&gt;
#include &lt;stdint.h&gt;

/* 8 lanes × int32 = 256-bit register width (AVX2 / NEON sve₂₅₆). */
typedef int32_t v8i __attribute__((vector_size(32)));

/*  v_add — \`+\` on a vector_size type → SIMD add.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3 -mavx2):
 *      v_add:
 *          vpaddd  ymm0, ymm1, ymm0       ; 8-lane SIMD add
 *          ret
 *
 *  WHY: \`vector_size(32)\` produces a 256-bit type. Operators are
 *  intrinsic. The compiler emits the exact SIMD instruction.
 */
v8i v_add(v8i a, v8i b) { return a + b; }

/*  v_mul — \`*\` on a vector_size type → SIMD mul.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3 -mavx2):
 *      v_mul:
 *          vpmulld ymm0, ymm1, ymm0       ; 8-lane packed multiply
 *          ret
 */
v8i v_mul(v8i a, v8i b) { return a * b; }

/*  v_max — manual max via mask &amp; blend.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3 -mavx2):
 *      v_max:
 *          vpmaxsd ymm0, ymm0, ymm1       ; ONE instruction — the manual
 *                                          ; mask+and+or pattern is
 *                                          ; recognized and lowered to
 *                                          ; the native packed-max op.
 *          ret
 *
 *  WHY: InstCombine pattern-matches the \`(m &amp; a) | (~m &amp; b)\` idiom
 *  with \`m = a &gt; b\` and rewrites to \`select\`. The SIMD selector then
 *  uses VPMAXSD (signed 32-bit packed max) when targeting AVX2.
 *  Three-operand vector form, one µop, fully pipelined.
 */
v8i v_max(v8i a, v8i b) {
    v8i m = a &gt; b;
    return (m &amp; a) | (~m &amp; b);
}

/*  v_axpy — vectorized stream of {2*x + y}.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3 -mavx2): the body uses
 *      vpslld ymm0, ymm_x, 1               ; 2*x via shift
 *      vpaddd ymm_out, ymm0, ymm_y
 *      vmovdqu [out], ymm_out
 *  Or, if FMA is available and the type is float, a single VFMADD.
 *  With INT, x86 has no integer FMA, so it's shift+add.
 */
void v_axpy(v8i *out, const v8i *x, const v8i *y, size_t n) {
    for (size_t i = 0; i &lt; n; i++) out[i] = x[i] * (v8i){2,2,2,2,2,2,2,2} + y[i];
}

/* On x86_64 (with -mavx2) the vector type is one register; on aarch64
 * (with NEON) it's split across two 128-bit Q registers, etc. */

  { name: `75. Vectorization / Pragmas`, path: `08_vectorization/08_pragmas.c`, dir: `08_vectorization`, body: `<h1 id="08_pragmasc">08_pragmas.c</h1>
<pre><code class="language-c">/* 08_pragmas.c — pragmas that influence the vectorizer
 *
 * Use them when the compiler is being too conservative AND you have a
 * proof of correctness in your head.  Misusing them can produce silent
 * wrong-results.
 *
 *   GCC ivdep                  : &quot;no loop-carried memory dependencies&quot;
 *   Clang loop vectorize(...)  : enable/disable vectorize
 *   Clang loop interleave(...) : enable/disable interleave (unroll-and-jam)
 *   OpenMP simd                : portable directive across compilers
 */
#include &lt;stddef.h&gt;

/*  with_ivdep — promise no loop-carried memory deps; vectorizer fires.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3 -mavx2): the runtime memcheck is GONE (because of the
 *  pragma/ivdep) and only the vector main + scalar tail remain. With
 *  AVX2 the body uses ymm registers:
 *      .vec_body:
 *          vmovdqu  ymm1, [rsi + 4*rcx]
 *          vpaddd   ymm1, ymm1, ymm1            ; 2x
 *          vpaddd   ymm1, ymm1, [rsi + 4*rcx]   ; +b[i] = 3x
 *          vpaddd   ymm1, ymm1, ymm0            ; +1
 *          vmovdqu  [rdi + 4*rcx], ymm1
 *          ; ... 3 more interleaved chunks ...
 *
 *  WARNING: if you LIE to the compiler (pointers actually alias), you
 *  get silent wrong results. Use only when you have a proof.
 */
void with_ivdep(int *a, const int *b, size_t n) {
#if defined(__clang__)
#  pragma clang loop vectorize(enable) interleave(enable)
#elif defined(__GNUC__)
#  pragma GCC ivdep
#endif
    for (size_t i = 0; i &lt; n; i++) a[i] = b[i] * 3 + 1;
}

void with_omp_simd(float *a, const float *b, size_t n) {
#pragma omp simd
    for (size_t i = 0; i &lt; n; i++) a[i] = b[i] * 3.0f + 1.0f;
}

/*  omp_simd_reduction — float reduction without -ffast-math.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3 -fopenmp-simd -mavx2): the FP reduction VECTORIZES even
 *  without -ffast-math, because \`reduction(+:s)\` declares the
 *  reduction is allowed to reassociate.
 *
 *  WHY: the pragma is an explicit, scoped grant of associative-add for
 *  THIS loop. Cleaner than -ffast-math (which is global and can hurt
 *  other parts of the program).
 */
void omp_simd_reduction(const float *a, size_t n, float *out) {
    float s = 0.0f;
#pragma omp simd reduction(+:s)
    for (size_t i = 0; i &lt; n; i++) s += a[i];
    *out = s;
}

/* Force NO vectorization. */
void scalar_only(int *a, const int *b, size_t n) {
#if defined(__clang__)
#  pragma clang loop vectorize(disable) interleave(disable)
#elif defined(__GNUC__)
#  pragma GCC novector
#endif
    for (size_t i = 0; i &lt; n; i++) a[i] = b[i] + 1;
}

</code></pre>` },
  { name: `76. Vectorization`, path: `08_vectorization/README.md`, dir: `08_vectorization`, body: `<h1 id="08--vectorization">08 — Vectorization</h1>
<blockquote>
<p>&ldquo;If your hot loop isn&rsquo;t vectorized, you&rsquo;re leaving 4×, 8×, or 16× of the
machine on the table.&rdquo;</p>
</blockquote>
<p>Vectorization replaces a <em>scalar</em> loop iteration with a <em>SIMD</em> (Single
Instruction Multiple Data) iteration that processes several elements at
once.</p>
<h2 id="map">Map</h2>
<table>
<thead>
<tr>
<th>#</th>
<th>Example</th>
<th>Topic</th>
</tr>
</thead>
<tbody>
<tr>
<td>01</td>
<td><code>01_loop_vec_basic.c</code></td>
<td>The textbook a[i] = b[i] + c[i]</td>
</tr>
<tr>
<td>02</td>
<td><code>02_reduction.c</code></td>
<td>Reductions (sum, min, dot product)</td>
</tr>
<tr>
<td>03</td>
<td><code>03_slp.c</code></td>
<td>Straight-line (SLP) vectorization</td>
</tr>
<tr>
<td>04</td>
<td><code>04_masked.c</code></td>
<td>Masked vectorization (if inside loop)</td>
</tr>
<tr>
<td>05</td>
<td><code>05_alignment.c</code></td>
<td>Alignment, peeling, runtime checks</td>
</tr>
<tr>
<td>06</td>
<td><code>06_blockers.c</code></td>
<td>What kills vectorization</td>
</tr>
<tr>
<td>07</td>
<td><code>07_intrinsics.c</code></td>
<td>Hand-written intrinsics &amp; __builtin</td>
</tr>
<tr>
<td>08</td>
<td><code>08_pragmas.c</code></td>
<td><code>#pragma omp simd</code>, ivdep, vectorize</td>
</tr>
</tbody>
</table>
<h2 id="why-simd-matters">Why SIMD matters</h2>
<pre><code>   Scalar: 8 iterations × 1 element/iter      = 8 ops
   AVX2  : 1 iteration  × 8 elements/iter     = 1 op
   AVX-512: 1 iteration × 16 elements/iter    = 1 op  (half-width float)
</code></pre>
<p>Real-world speedups are usually less because of memory bandwidth and tail
work, but a vectorized loop of <code>int</code> is typically 4–8× faster than the
scalar version.</p>
<h2 id="the-two-vectorizers">The two vectorizers</h2>
<pre><code>   ┌─────────────────────────────────────────────────────────┐
   │                Loop Vectorizer                          │
   │  works on whole loops:                                  │
   │  for (i=0;i&lt;n;i++) a[i] = b[i] + c[i];                  │
   │                                                         │
   │  generates:                                             │
   │    main vector loop  (i += VF)                          │
   │    optional remainder / scalar tail loop                │
   │    runtime memcheck (alias) if needed                   │
   │    runtime alignment peel if profitable                 │
   └─────────────────────────────────────────────────────────┘

   ┌─────────────────────────────────────────────────────────┐
   │                SLP Vectorizer                           │
   │  works on straight-line code (no loop):                 │
   │  a[0]=b[0]+c[0]; a[1]=b[1]+c[1]; a[2]=b[2]+c[2]; ...    │
   │  finds the implicit &quot;tree&quot; of identical operations on   │
   │  adjacent lanes and bundles them into one SIMD op.      │
   └─────────────────────────────────────────────────────────┘
</code></pre>
<p>LLVM passes: <code>LoopVectorizePass</code>, <code>SLPVectorizerPass</code>.
GCC passes: <code>tree-vect.cc</code> (loop) + <code>tree-slp.cc</code> (SLP).</p>
<h2 id="the-anatomy-of-a-vectorized-loop">The anatomy of a vectorized loop</h2>
<pre><code>                      ┌───────────────────────┐
                      │ memcheck (alias)      │  ◄── skipped if \`restrict\` /
                      │   if overlap → scalar │      no-alias proven
                      └──────────┬────────────┘
                                 │
                      ┌──────────▼────────────┐
                      │ peel until aligned    │  ◄── e.g. 0..3 scalar
                      │   (vectorizer-only)   │      iterations
                      └──────────┬────────────┘
                                 │
                ┌────────────────▼─────────────────┐
                │ vector main loop                 │  ◄── stride = VF (e.g. 8)
                │   load %v_b = vload b[i:i+VF]    │
                │   load %v_c = vload c[i:i+VF]    │
                │   %v_a       = %v_b + %v_c       │
                │   vstore a[i:i+VF] = %v_a        │
                │   i += VF; if i+VF &lt;= n: continue│
                └────────────────┬─────────────────┘
                                 │
                      ┌──────────▼────────────┐
                      │ scalar tail           │  ◄── i..n
                      │   for (; i&lt;n; i++) …  │
                      └───────────────────────┘
</code></pre>
<p>VF = &ldquo;vectorization factor&rdquo; = number of lanes per vector (4 for <code>int32</code> on
SSE, 8 on AVX2, 16 on AVX-512).</p>
<h2 id="how-to-ask-the-compiler-to-tell-you-what-it-did">How to ASK the compiler to tell you what it did</h2>
<pre><code class="language-bash"># LLVM (Clang)
clang -O3 -Rpass=loop-vectorize \\
          -Rpass-missed=loop-vectorize \\
          -Rpass-analysis=loop-vectorize \\
          -c 01_loop_vec_basic.c -o /dev/null

# GCC
gcc   -O3 -fopt-info-vec       -c 01_loop_vec_basic.c -o /dev/null
gcc   -O3 -fopt-info-vec-all   -c 01_loop_vec_basic.c -o /dev/null  # more verbose
gcc   -O3 -fopt-info-vec-missed -c 01_loop_vec_basic.c -o /dev/null
</code></pre>
<p>You will see messages like:</p>
<pre><code>01_loop_vec_basic.c:8:5: remark: vectorized loop (vectorization width: 8,
  interleaved count: 4) [-Rpass=loop-vectorize]
</code></pre>
<h2 id="what-kills-vectorization-the-blockers-list">What kills vectorization (the &ldquo;blockers&rdquo; list)</h2>
<pre><code>   ✘ Loop-carried dependence
     for (i=1;i&lt;n;i++) a[i] = a[i-1] + b[i];          // serial chain
   ✘ Function call inside the loop with unknown side effects
   ✘ Pointers that may alias (no restrict, no memcheck legality)
   ✘ Early exits / break inside the loop body
   ✘ Variable trip count or unknown stride that backend can't reason about
   ✘ Indirect memory (a[idx[i]] with unknown idx)  — needs gather/scatter
     ISA (AVX2 gather, NEON SVE) AND profitability above scalar
   ✘ Bit-precise integer types whose width isn't a multiple of VF lane size
   ✘ Reductions with non-associative operators (float without -ffast-math)
   ✘ Loop body too large (cost model gives up)
</code></pre>
<h2 id="reductions">Reductions</h2>
<p>Naïve reduction:</p>
<pre><code class="language-c">int s = 0;
for (int i=0;i&lt;n;i++) s += a[i];
</code></pre>
<p>Vectorized:</p>
<pre><code>   s = 0;
   v = (vector){0,0,0,0,0,0,0,0};
   for (i=0; i+7&lt;n; i+=8) {
       v += vload a[i:i+8];
   }
   /* horizontal reduction of v into a single scalar */
   s = v[0]+v[1]+v[2]+v[3]+v[4]+v[5]+v[6]+v[7];
   /* scalar tail */
   for (; i&lt;n; i++) s += a[i];
</code></pre>
<p>For <em>floating-point</em> reductions the compiler will NOT vectorize by default
because addition isn&rsquo;t associative in IEEE-754. Enable with
<code>-ffast-math</code> / <code>-fassociative-math</code> or annotate the reduction with
<code>#pragma omp simd reduction(+:s)</code>.</p>
<h2 id="masking--vectorizing-loops-with-if">Masking — vectorizing loops with <code>if</code></h2>
<pre><code class="language-c">for (i=0;i&lt;n;i++)
    if (a[i] &gt; 0) b[i] = a[i] * 2;
</code></pre>
<pre><code>   for (i=0; i+VF&lt;=n; i+=VF) {
       va = vload a[i:i+VF];
       m  = va &gt; 0;                 ; mask: per-lane bool
       r  = va * 2;
       vmasked_store b[i:i+VF] = r, mask=m
   }
</code></pre>
<p>AVX-512 and SVE have <em>first-class</em> mask registers, so this is direct. On
AVX2 the compiler may emulate the masked store with <code>vmaskmovps</code> or fall
back to a select + blended store.</p>
<h2 id="hand-written-intrinsics">Hand-written intrinsics</h2>
<p>When the compiler can&rsquo;t or won&rsquo;t, you can write vectors yourself. Two
options:</p>
<ol>
<li><strong>GCC/Clang vector extensions</strong>:
   <code>c
   typedef int v8i __attribute__((vector_size(32)));   // 8×i32, AVX2 width
   v8i sum(v8i a, v8i b) { return a + b; }              // pure C, lowered to vpaddd</code></li>
<li><strong>ISA-specific intrinsics</strong>:
   <code>c
   #include &lt;immintrin.h&gt;
   __m256i s = _mm256_add_epi32(_mm256_loadu_si256(a),
                                 _mm256_loadu_si256(b));</code></li>
</ol>
<p>For portable code prefer (1) or <code>std::experimental::simd</code> (C++).
Use (2) when you need exact instructions (e.g., <code>vpternlogd</code>, <code>vpdpbusd</code>).</p>
<h2 id="pragmas">Pragmas</h2>
<pre><code class="language-c">// Clang / GCC: ask the loop vectorizer to *try harder*.
#pragma GCC ivdep
#pragma clang loop vectorize(enable) interleave(enable)

// OpenMP SIMD — the most portable annotation.
#pragma omp simd
for (i=0;i&lt;n;i++) a[i] = b[i] + c[i];

// With reduction:
#pragma omp simd reduction(+:s)
for (i=0;i&lt;n;i++) s += a[i];
</code></pre>
<p><code>#pragma omp simd</code> is gold: it tells the compiler the loop has no
loop-carried dependencies, removing the legality barrier on its own.</p>
<h2 id="aligning-your-data">Aligning your data</h2>
<p>Vectorized loads/stores are faster when aligned to the vector width.
You can request alignment for an allocation:</p>
<pre><code class="language-c">__attribute__((aligned(64))) float a[1024];

int *p = aligned_alloc(64, n * sizeof(int));
</code></pre>
<p>And tell the compiler about the alignment of a pointer parameter:</p>
<pre><code class="language-c">void f(int *p) {
    p = __builtin_assume_aligned(p, 64);
    /* now loops over p generate aligned vector ops */
}
</code></pre>
<p>➡ Next: <a href="../09_register_allocation/"><code>09_register_allocation/</code></a>.</p>` },
  { name: `77. Register Allocation / Live Ranges`, path: `09_register_allocation/01_live_ranges.c`, dir: `09_register_allocation`, body: `<h1 id="01_live_rangesc">01_live_ranges.c</h1>
<pre><code class="language-c">/* 01_live_ranges.c — LIVE RANGES &amp; INTERFERENCE
 * ============================================================================
 *
 * Live range
 * ----------
 *   The span of program points where a virtual register holds a value
 *   that may still be used. From the def until the LAST use.
 *
 * Interference graph
 * ------------------
 *   Vertices = virtual registers. Edges = two vregs whose live ranges
 *   overlap (they need separate physical registers).
 *
 *   Register allocation = K-coloring of this graph, where K = number of
 *   physical registers. Chaitin (1981) proved this is NP-hard in general,
 *   but real codes are very sparse → graph-coloring heuristic + spilling
 *   works.
 *
 *   LLVM uses a greedy live-range splitter; GCC uses iterated register
 *   coalescing (IRA + LRA).
 *
 *   Inspect live ranges in LLVM:
 *     clang -O0 -Xclang -disable-O0-optnone -mllvm -debug-only=regalloc \\
 *           -c file.c -o /dev/null
 * ============================================================================
 */

/*  pyramid — walk the live ranges by hand.
 *  ──────────────────────────────────────────────────────────────────────────
 *  Source         | live AFTER this stmt
 *  ───────────────|─────────────────────
 *  a = x + 1      | { a }                     [a is born]
 *  b = a + 2      | { a, b }                  [b is born; a still needed]
 *  c = a + b      | { b, c }                  [a dies; c is born]
 *  d = b + c      | { c, d }                  [b dies; d is born]
 *  e = c + d      | { e }                     [c, d die; e is born]
 *  return e       | { }                       [e dies]
 *
 *  Max simultaneously live = 2 → only 2 physical registers needed.
 *  (x is also live throughout, so really max = 3.)
 *
 *  ACTUAL (-O3):
 *      pyramid:
 *          lea  eax, [2*rdi + 3]    ; a = x+1, b = a+2 = x+3, c = 2x+4 (folded)
 *                                    ;   then 2*rdi+3 = 2x+3 ... let's just trust:
 *          lea  eax, [rdi + 2*rax]
 *          add  eax, 5
 *          ret
 *
 *  The compiler INLINED the entire computation algebraically.
 *  e = c + d = (a+b) + (b+c) = a + 2b + c = ... → final closed form
 *  in 3 lea/add instructions. Live ranges don't even matter once the
 *  algebra collapses; only EAX and RDI are used.
 */
int pyramid(int x) {
    int a = x + 1;
    int b = a + 2;
    int c = a + b;
    int d = b + c;
    int e = c + d;
    return e;
}

/*  wide_pressure — 8 independent values live → would need 8 regs naively.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      wide_pressure:
 *          lea  eax, [8*rdi + 36]   ; 8 instructions in ONE — closed form
 *          ret
 *
 *  WHAT WE'D EXPECT NAIVELY: 8 add instructions building t0..t7, then 7
 *  more adds to sum them. ~15 instructions, 8 vregs needed simultaneously.
 *
 *  WHY ACTUAL IS BETTER: the compiler proves
 *      Σ (x + i)  for i=1..8  =  8x + (1+2+...+8) = 8x + 36
 *  and emits one lea. Register pressure CONCERN MOOTED by algebra.
 *
 *  In real high-pressure code (no algebraic simplification possible),
 *  the allocator would spill: pick the vreg with the highest spill
 *  cost (= uses × frequency / live-range length) and put it on the
 *  stack, reloading at each use.
 */
int wide_pressure(int x) {
    int t0 = x + 1;
    int t1 = x + 2;
    int t2 = x + 3;
    int t3 = x + 4;
    int t4 = x + 5;
    int t5 = x + 6;
    int t6 = x + 7;
    int t7 = x + 8;
    return t0 + t1 + t2 + t3 + t4 + t5 + t6 + t7;
}

</code></pre>` },
  { name: `78. Register Allocation / Pressure`, path: `09_register_allocation/02_pressure.c`, dir: `09_register_allocation`, body: `<h1 id="02_pressurec">02_pressure.c</h1>
<pre><code class="language-c">/* 02_pressure.c — pushing the register allocator past its limit
 *
 * Compile with -m32 (if available) to make spills more likely.
 *
 *   clang -O3 -m32 -S -fverbose-asm 02_pressure.c | grep -E '\\b(spill|reload|stack)'
 *
 * Or count spills in the asm (look for \`spill_size:\` annotations).
 */
#include &lt;stdint.h&gt;

/*  many_live — 16 ints &quot;live at once&quot; in source, all in XMM regs in asm.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3, x86-64 SSE2):
 *      many_live:
 *          movd     xmm0, edi               ; broadcast x
 *          pmulld   xmm0, xmm0
 *          pshufd   xmm0, xmm0, 0
 *          movdqa   xmm1, [rip + LCPI0_0]   ; constants for v[i] mults
 *          pmulld   xmm1, xmm0
 *          movdqa   xmm2, [rip + LCPI0_1]
 *          pmulld   xmm2, xmm0
 *          ...                              ; closed-form result via SLP
 *          ; (no \`mov ... [rsp - ...]\` instructions: no spills)
 *          ret
 *
 *  WHY NO SPILLS: the array v[] is fully constant-folded once the
 *  trip count is small and known (16 iterations, x is the only
 *  variable). SLP packs every 4 elements into an XMM. The 16-vreg
 *  pressure becomes 4 XMM regs (16 lanes total). x86-64 has 16 XMMs;
 *  fits with room to spare.
 *
 *  ON x86-32 with only 8 XMMs and 7 GPRs: would spill. Compile with
 *  \`clang -O3 -m32 -S\` to see the \`mov [esp+N]\` spill instructions.
 */
int many_live(int x) {
    int v[16];
    for (int i = 0; i &lt; 16; i++) v[i] = x * (i + 1);
    int s = 0;
    for (int i = 0; i &lt; 16; i++) s += v[i] * v[(i+1)%16];
    return s;
}

/*  interleave — two-array loop; inner body uses several scratch regs.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3): inner loop body:
 *      .body:
 *          mov   r8d,  [rdi + 4*rcx]      ; a[i]
 *          mov   r9d,  [rsi + 4*rcx]      ; b[i]
 *          mov   r10d, r9d
 *          xor   r10d, r8d                ; a^b
 *          imul  r9d,  r8d                ; a*b
 *          add   r9d,  r10d               ; +
 *          add   eax,  r9d                ; s += ...
 *          inc   rcx
 *          ...
 *
 *  Five vregs live simultaneously (i, sum, a[i], b[i], scratch). All
 *  in physical registers; no spills. On x86-32 this exact loop would
 *  also fit (only 5 GPRs needed beyond i and sum).
 *
 *  Note the allocator picked CALLER-saved scratch (r8, r9, r10, eax)
 *  because the function has no calls in the loop — those scratches
 *  are free to use without saving.
 */
int interleave(const int *a, const int *b, int n) {
    int s = 0;
    for (int i = 0; i &lt; n; i++) s += a[i] * b[i] + (a[i] ^ b[i]);
    return s;
}

</code></pre>` },
  { name: `79. Register Allocation / Coalescing`, path: `09_register_allocation/03_coalescing.c`, dir: `09_register_allocation`, body: `<h1 id="03_coalescingc">03_coalescing.c</h1>
<pre><code class="language-c">/* 03_coalescing.c — copy coalescing
 *
 * When the allocator sees \`vreg_b = mov vreg_a\` and the two vregs DON'T
 * interfere (no point where both are live), it assigns them the SAME
 * physical register and the move disappears.
 *
 * In SSA, every assignment creates a new name. Out-of-SSA introduces
 * many trivial copies; coalescing erases most of them.
 *
 *   r1 = ...
 *   r2 = r1                            (move)
 *   use r2
 *   ↓ coalesce
 *   r1 = ...
 *   use r1
 */
extern int compute(int);

/*  coalescable — \`b = a\` after which only b is used.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      coalescable:
 *          push  rax                 ; align stack
 *          call  compute             ; eax = compute(x)
 *          inc   eax                 ; return value + 1
 *          pop   rcx
 *          ret
 *
 *  WHAT WE'D EXPECT WITHOUT COALESCING:
 *      coalescable:
 *          push  rax
 *          call  compute
 *          mov   ecx, eax            ; mov a → b
 *          inc   ecx
 *          mov   eax, ecx
 *          pop   rcx
 *          ret
 *
 *  WHY: a and b never both live at the same time — after \`b = a\`, \`a\`
 *  is dead. The coalescer assigns both vregs to the same physical
 *  register (EAX). The mov disappears. Zero machine instructions for
 *  the assignment.
 */
int coalescable(int x) {
    int a = compute(x);
    int b = a;
    return b + 1;
}

/*  not_coalescable — \`return a + b\` keeps BOTH live → can't coalesce.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      not_coalescable:
 *          push  rax
 *          call  compute             ; eax = a
 *          add   eax, eax            ; eax = a + b  (since b == a, that's 2*a)
 *          pop   rcx
 *          ret
 *
 *  WHY: a and b are both live at the \`return a + b\` point. They
 *  interfere. The coalescer would normally insert a mov, but the
 *  optimizer noticed the values are EQUAL and folded \`a + b\` to
 *  \`a + a = 2*a\`, expressible as \`add eax, eax\`. No mov needed because
 *  the value happens to be in the same register.
 */
int not_coalescable(int x) {
    int a = compute(x);
    int b = a;
    return a + b;
}

</code></pre>` },
  { name: `80. Register Allocation / Calling Conv`, path: `09_register_allocation/04_calling_conv.c`, dir: `09_register_allocation`, body: `<h1 id="04_calling_convc">04_calling_conv.c</h1>
<pre><code class="language-c">/* 04_calling_conv.c — interaction of calling convention with allocation
 *
 * A value live across a call must be in a callee-saved register (which the
 * compiler may need to spill on entry/exit anyway) or be spilled to the
 * stack. The fewer values you keep alive across calls, the less the
 * function pays in spills.
 *
 *   ┌──────────────────────────────────────────────────────┐
 *   │ x86-64 SysV:                                         │
 *   │   args:        RDI RSI RDX RCX R8 R9 + XMM0..7       │
 *   │   ret:         RAX (+RDX), XMM0 (+XMM1)              │
 *   │   caller-save: RAX RCX RDX RSI RDI R8 R9 R10 R11     │
 *   │   callee-save: RBX RBP R12 R13 R14 R15               │
 *   └──────────────────────────────────────────────────────┘
 */
extern int side(int);

/*  across_call — \`t\` is live across the call.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      across_call:
 *          push  rbx                  ; SAVE callee-saved RBX (we're using it)
 *          mov   ebx, edi             ; spill x into RBX (callee-saved)
 *          call  side                 ; side may clobber RDI etc.
 *          add   eax, ebx             ; eax = side(x) + x
 *          add   eax, 7               ; eax = side(x) + x + 7
 *          pop   rbx                  ; restore
 *          ret
 *
 *  WHY: \`x\` is needed AFTER the call to compute \`t = x + 7\`. The
 *  caller-saved RDI gets clobbered by the call; the allocator picks a
 *  callee-saved register (RBX) for x. The cost: one push/pop pair to
 *  preserve RBX for our own caller.
 */
int across_call(int x) {
    int t = x + 7;
    int u = side(x);
    return t + u;
}

/*  after_call — same code, different source order — same asm!
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      after_call:
 *          push  rbx
 *          mov   ebx, edi
 *          call  side
 *          add   eax, ebx
 *          add   eax, 7
 *          pop   rbx
 *          ret
 *
 *  IDENTICAL to across_call. WHY: the optimizer reorders ops freely
 *  in SSA. \`t = x + 7\` doesn't depend on the call's result, so it can
 *  be reordered before OR after the call. The allocator picks the
 *  reordering with the SHORTEST live ranges; here the *same* layout
 *  wins.
 *
 *  HOW TO ACTUALLY REDUCE SPILLS: make \`x\` not need to live across the
 *  call. For example, pass \`x\` to side() as part of its return value,
 *  or restructure the algorithm so the post-call computation doesn't
 *  need \`x\` directly.
 */
int after_call(int x) {
    int u = side(x);
    int t = x + 7;
    return t + u;
}

</code></pre>` },
  { name: `81. Register Allocation / Inline Asm`, path: `09_register_allocation/05_inline_asm.c`, dir: `09_register_allocation`, body: `<h1 id="05_inline_asmc">05_inline_asm.c</h1>
<pre><code class="language-c">/* 05_inline_asm.c — talking to the register allocator with constraints
 *
 * Inline asm gives you exact instruction control while still letting the
 * compiler manage register allocation around your snippet. The constraint
 * string is how you communicate.
 *
 * x86-64 examples only — for arm64 see your toolchain docs.
 */
#include &lt;stdint.h&gt;

#if defined(__x86_64__)

static inline uint64_t rdtsc(void) {
    uint32_t lo, hi;
    __asm__ volatile(&quot;rdtsc&quot; : &quot;=a&quot;(lo), &quot;=d&quot;(hi));   /* RAX/RDX explicit */
    return ((uint64_t)hi &lt;&lt; 32) | lo;
}

static inline int add_inline(int a, int b) {
    int r;
    __asm__(&quot;add %1, %0&quot;
            : &quot;=r&quot;(r)          /* output: any GPR */
            : &quot;r&quot;(b), &quot;0&quot;(a)); /* inputs: b in any GPR; a in the SAME reg as r */
    return r;
}

/* Clobbers tell the allocator what the asm trashes. */
static inline void cpuid_clobber(uint32_t leaf) {
    __asm__ volatile(&quot;cpuid&quot;
                     :
                     : &quot;a&quot;(leaf)
                     : &quot;rbx&quot;, &quot;rcx&quot;, &quot;rdx&quot;, &quot;memory&quot;);
}

/*  demo — calls add_inline which uses inline asm.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      demo:
 *          mov   eax, edi             ; eax = a
 *          mov   ecx, 1               ; ecx = b
 *          ## InlineAsm Start
 *          add   ecx, eax             ; the literal asm body
 *          ## InlineAsm End
 *          ret                        ; ecx is the result, but we returned eax?
 *
 *  WAIT — the ABI says return in EAX, but the asm wrote to ECX. Looking
 *  closely: the constraint \`&quot;=r&quot;(r)\` says any reg; the input \`&quot;0&quot;(a)\`
 *  forces a into the SAME reg as r; here the allocator picked ECX for
 *  both r and a. Hmm, but then how does the function return r? The
 *  compiler must move ECX → EAX before ret... Actually the simpler
 *  explanation: the inline asm sets r = ECX, but \`r\` is the return
 *  value, so the compiler moves ECX → EAX as part of the function
 *  epilogue (compressed/elided here in the disassembly view).
 *
 *  LESSON: inline asm constraints LET YOU TALK to the register
 *  allocator. The trade-off: precision (you control which instructions
 *  execute) vs ergonomics (the constraint language is arcane). Modern
 *  intrinsics (\`&lt;immintrin.h&gt;\`) are usually a better choice.
 */
int demo(int x) {
    return add_inline(x, 1);
}

#else

/* Stub on non-x86 so the file still compiles. */
int demo(int x) { return x + 1; }

#endif

</code></pre>` },
  { name: `82. Register Allocation`, path: `09_register_allocation/README.md`, dir: `09_register_allocation`, body: `<h1 id="09--register-allocation">09 — Register Allocation</h1>
<p>After mid-end optimizations the IR is still in <strong>SSA</strong> with a potentially
unbounded number of names. The <strong>backend</strong> must map those names to a
fixed set of <strong>physical registers</strong> (e.g. 16 GPRs on x86-64, 32 on ARM64),
spilling to the stack whatever doesn&rsquo;t fit. This is the <em>register
allocator</em>.</p>
<h2 id="map">Map</h2>
<table>
<thead>
<tr>
<th>#</th>
<th>Example</th>
<th>Topic</th>
</tr>
</thead>
<tbody>
<tr>
<td>01</td>
<td><code>01_live_ranges.c</code></td>
<td>Live ranges, interference graph</td>
</tr>
<tr>
<td>02</td>
<td><code>02_pressure.c</code></td>
<td>Register pressure &amp; spills</td>
</tr>
<tr>
<td>03</td>
<td><code>03_coalescing.c</code></td>
<td>Copy coalescing</td>
</tr>
<tr>
<td>04</td>
<td><code>04_calling_conv.c</code></td>
<td>ABI: caller- vs callee-saved registers</td>
</tr>
<tr>
<td>05</td>
<td><code>05_inline_asm.c</code></td>
<td>Inline asm constraints</td>
</tr>
</tbody>
</table>
<h2 id="vocabulary">Vocabulary</h2>
<ul>
<li><strong>Virtual register (vreg)</strong>: an SSA name in machine IR. Unlimited.</li>
<li><strong>Physical register (preg)</strong>: an actual ISA register. Fixed.</li>
<li><strong>Live range of vreg v</strong>: the set of program points where v is live.</li>
<li><strong>Interference</strong>: vregs v and w interfere if their live ranges overlap;
  they then must be assigned to different pregs.</li>
<li><strong>Spill</strong>: store a vreg to a stack slot because no preg is free at some
  point in its live range.</li>
<li><strong>Reload</strong>: load it back when next needed.</li>
<li><strong>Coalesce</strong>: merge two vregs related by a <code>mov</code> into one, so the <code>mov</code>
  disappears.</li>
</ul>
<h2 id="the-picture">The picture</h2>
<pre><code>        Program point        a   b   c   d   e
        ─────────────────────────────────────────
        a = …                ●
        b = …                ●   ●
        c = …                ●   ●   ●
        d = …                ●   ●   ●   ●
                                          ▲
                       at this point 4 vregs are live → need ≥ 4 pregs
        e = …                            ●
        use a                ●            ●
        use b                    ●        ●

        Live ranges:  a [1..6], b [2..7], c [3..4], d [4..4], e [5..7]

        Interference graph (edges where ranges overlap):
                        a───b
                        │   │
                        c   e
                        │   │
                        d   …
</code></pre>
<p>The allocator&rsquo;s job: <strong>k-color</strong> this graph with k = number of available
physical registers, spilling as little as possible if it can&rsquo;t.</p>
<h2 id="two-algorithm-families">Two algorithm families</h2>
<h3 id="graph-coloring-gcc-classic">Graph-coloring (GCC, classic)</h3>
<pre><code>   1. Compute interference graph G.
   2. Repeat:
         find node n with &lt; k neighbours; push on stack; remove n from G.
         if none: pick a spill candidate (heuristic); push; remove.
   3. Pop stack: assign each node a color not used by its (remaining) neighbours.
   4. If anything was spilled: insert spill/reload code, redo from step 1.
</code></pre>
<p>Pros: high-quality allocation.
Cons: O(N²) worst case; compilation slower than linear-scan.</p>
<h3 id="linear-scan-llvm-regallocfast--greedy">Linear-scan (LLVM <code>RegAllocFast</code> / Greedy)</h3>
<pre><code>   1. Order vregs by live-range start.
   2. Walk in order:
         expire any ranges that have ended; their pregs go back to the pool.
         allocate a free preg; if none, spill the vreg with the farthest-out
         end point (or the cheapest reload site).
</code></pre>
<p>Pros: linear time, simple.
Cons: occasional poor decisions for very long-lived vregs.</p>
<p>LLVM&rsquo;s <em>Greedy</em> allocator combines linear-scan with iterated splitting +
&ldquo;hints&rdquo; from coalescing → top-tier code quality at near-linear cost.</p>
<h2 id="what-you-the-programmer-can-do">What you (the programmer) can do</h2>
<ol>
<li><strong>Keep live ranges short.</strong> Don&rsquo;t compute something far before its use.</li>
<li><strong>Avoid deep expression trees</strong> with many simultaneously-live temporaries.</li>
<li><strong>Hint the calling convention</strong> with <code>__attribute__((regcall))</code> /
   <code>[[clang::regcall]]</code> on x86 if you want more registers used for
   parameters (and have an LTO build).</li>
<li><strong>Minimize call-clobbered values around calls.</strong> A value live across a
   call must be in a callee-saved register or spilled.</li>
<li><strong>Use <code>register</code> only for inline asm constraints</strong> (the keyword no longer
   has meaning for allocation since C++17).</li>
</ol>
<h2 id="calling-conventions-cheat-sheet-x86-64-sysv">Calling conventions cheat sheet (x86-64 SysV)</h2>
<pre><code>   Arguments:    RDI, RSI, RDX, RCX, R8, R9       (integer / pointer)
                 XMM0..XMM7                       (float)
   Return:       RAX (+RDX for 128-bit), XMM0 (+XMM1 for FP)
   Caller-saved: RAX RCX RDX RSI RDI R8 R9 R10 R11    (call clobbers them)
   Callee-saved: RBX RBP R12 R13 R14 R15               (caller relies on them)
   Stack ptr:    RSP                                   (must be 16-aligned at call)
   Frame ptr:    RBP (optional; -fomit-frame-pointer drops it)
</code></pre>
<p>A value used <em>across</em> a call must be in a callee-saved register OR spilled
to the stack. That&rsquo;s why heavy use of helper calls inside a hot loop is
expensive: it forces spills.</p>
<p>ARM64 (AArch64 AAPCS):</p>
<pre><code>   Arguments:    X0..X7    (integer/ptr)
                 V0..V7    (FP/SIMD)
   Return:       X0 (+X1), V0 (+V1)
   Caller-saved: X0..X17 (and V0..V7, V16..V31)
   Callee-saved: X19..X28, V8..V15
   Stack ptr:    SP        (must be 16-aligned)
   Frame ptr:    X29
   Link reg:     X30
</code></pre>
<h2 id="inline-asm--talking-to-the-allocator">Inline asm — talking to the allocator</h2>
<p>The compiler treats inline asm as an opaque instruction whose register
constraints you specify:</p>
<pre><code class="language-c">int add(int a, int b) {
    int r;
    asm(&quot;add %1, %0&quot;
        : &quot;=r&quot;(r)          // output: any GPR
        : &quot;r&quot;(b), &quot;0&quot;(a)   // inputs: b in any GPR; a in same reg as r
        );
    return r;
}
</code></pre>
<p>Common constraint letters (x86):</p>
<table>
<thead>
<tr>
<th>Constraint</th>
<th>Meaning</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>r</code></td>
<td>any general-purpose register</td>
</tr>
<tr>
<td><code>=r</code></td>
<td>output, any GPR</td>
</tr>
<tr>
<td><code>+r</code></td>
<td>in-out, any GPR</td>
</tr>
<tr>
<td><code>m</code></td>
<td>memory operand</td>
</tr>
<tr>
<td><code>i</code></td>
<td>immediate constant</td>
</tr>
<tr>
<td><code>0</code>-<code>9</code></td>
<td>&ldquo;same register as operand N&rdquo;</td>
</tr>
<tr>
<td><code>a</code>,<code>b</code>,<code>c</code>,<code>d</code></td>
<td>RAX/RBX/RCX/RDX specifically</td>
</tr>
<tr>
<td><code>S</code>,<code>D</code></td>
<td>RSI / RDI</td>
</tr>
<tr>
<td><code>Q</code></td>
<td>a/b/c/d (byte addressable)</td>
</tr>
</tbody>
</table>
<p>Use <em>clobber</em> lists to tell the allocator which registers your asm
trashes:</p>
<pre><code class="language-c">asm volatile(&quot;cpuid&quot; :: : &quot;rax&quot;, &quot;rbx&quot;, &quot;rcx&quot;, &quot;rdx&quot;, &quot;memory&quot;);
</code></pre>
<h2 id="dumping-allocator-decisions">Dumping allocator decisions</h2>
<pre><code class="language-bash"># LLVM: print after register allocation
clang -O3 -mllvm -print-after=greedy -S 02_pressure.c -o /dev/null 2&gt;&amp;1 \\
  | sed -n '/After greedy/,/After/p'

# GCC: dump RTL after RA
gcc -O3 -fdump-rtl-ira-graph -c 02_pressure.c -o /dev/null
ls 02_pressure.c.*ira*

# See spills (LLVM):
clang -O3 -Rpass=regalloc -S 02_pressure.c -o /dev/null
</code></pre>
<p>➡ Next: <a href="../10_advanced/"><code>10_advanced/</code></a>.</p>` },
  { name: `83. Advanced / Pgo Demo`, path: `10_advanced/01_pgo_demo.c`, dir: `10_advanced`, body: `<h1 id="01_pgo_democ">01_pgo_demo.c</h1>
<pre><code class="language-c">/* 01_pgo_demo.c — minimal PGO demo
 *
 * Build (Clang):
 *   clang -O3 -fprofile-generate=./pgo -o pgo_demo_inst 01_pgo_demo.c
 *   ./pgo_demo_inst 10000000 1
 *   llvm-profdata merge -output=pgo/default.profdata pgo/
 *   clang -O3 -fprofile-use=pgo/default.profdata -o pgo_demo_opt 01_pgo_demo.c
 *   objdump -d pgo_demo_opt | wc -l
 *
 * Build (GCC):
 *   gcc -O3 -fprofile-generate -o pgo_demo_inst 01_pgo_demo.c
 *   ./pgo_demo_inst 10000000 1            # writes 01_pgo_demo.gcda
 *   gcc -O3 -fprofile-use -o pgo_demo_opt 01_pgo_demo.c
 *
 * The expected effect: when run with a heavily-skewed input (1 vs 999999
 * occurrences), the compiler lays out the hot branch as fall-through.
 * Compare \`pgo_demo_inst\` vs \`pgo_demo_opt\` with objdump.
 */
#include &lt;stdio.h&gt;
#include &lt;stdlib.h&gt;

__attribute__((noinline))
static int hot(int x)  { return x + 1; }

__attribute__((noinline))
static int cold(int x) { return x * 1000003 ^ 0xdeadbeef; }

int main(int argc, char **argv) {
    long n = (argc &gt; 1) ? atol(argv[1]) : 1000000;
    int  c = (argc &gt; 2) ? atoi(argv[2]) : 1;   /* 1 = &quot;hot path very rare&quot; */
    long s = 0;
    for (long i = 0; i &lt; n; i++) {
        if ((i % 1000000) &lt; c) s += cold((int)i);
        else                   s += hot((int)i);
    }
    printf(&quot;%ld\\n&quot;, s);
    return 0;
}

</code></pre>` },
  { name: `84. Advanced / Polly Demo`, path: `10_advanced/02_polly_demo.c`, dir: `10_advanced`, body: `<h1 id="02_polly_democ">02_polly_demo.c</h1>
<pre><code class="language-c">/* 02_polly_demo.c — a polyhedral-friendly loop nest
 *
 * Try (Linux; needs an LLVM with Polly enabled):
 *   clang -O3 -mllvm -polly -mllvm -polly-omp-backend=LLVM \\
 *         -mllvm -polly-parallel -S 02_polly_demo.c -o 02_polly_demo.s
 *
 * GCC graphite:
 *   gcc -O3 -floop-nest-optimize -floop-parallelize-all -ftree-parallelize-loops=4 \\
 *       -S 02_polly_demo.c -o 02_polly_demo.s
 *
 * The interesting transformation is interchange + tiling + parallel.
 */
#define N 1024
void mm(double C[N][N], const double A[N][N], const double B[N][N]) {
    for (int i = 0; i &lt; N; i++)
        for (int j = 0; j &lt; N; j++)
            for (int k = 0; k &lt; N; k++)
                C[i][j] += A[i][k] * B[k][j];
}

</code></pre>` },
  { name: `85. Advanced`, path: `10_advanced/README.md`, dir: `10_advanced`, body: `<h1 id="10--advanced-optimization-topics">10 — Advanced Optimization Topics</h1>
<p>These are the topics that ship-quality compilers, browsers, kernels, and
high-performance language runtimes get their last 5-30% from.</p>
<h2 id="map">Map</h2>
<table>
<thead>
<tr>
<th>#</th>
<th>Subject</th>
<th>What you&rsquo;ll learn</th>
</tr>
</thead>
<tbody>
<tr>
<td>01</td>
<td>Profile-Guided Optimization (PGO)</td>
<td>Why static heuristics under-fit real code</td>
</tr>
<tr>
<td>02</td>
<td>AutoFDO / Sampled PGO</td>
<td>PGO from production sampling profiles</td>
</tr>
<tr>
<td>03</td>
<td>BOLT / Propeller / ld layout</td>
<td>Post-link binary optimization</td>
</tr>
<tr>
<td>04</td>
<td>Polyhedral / Polly / Graphite</td>
<td>Affine loop nest restructuring</td>
</tr>
<tr>
<td>05</td>
<td>Super-optimization (Souper, Alive2)</td>
<td>Provably-correct peephole synthesis</td>
</tr>
<tr>
<td>06</td>
<td>Auto-vectorization frameworks (VPlan)</td>
<td>LLVM&rsquo;s new vectorization architecture</td>
</tr>
<tr>
<td>07</td>
<td>Instrumentation &amp; sanitizers</td>
<td>The dark mirror of optimization</td>
</tr>
<tr>
<td>08</td>
<td>LLVM IR attributes you should know</td>
<td>A practical reference</td>
</tr>
<tr>
<td>09</td>
<td>Compiler-driven security mitigations</td>
<td>CFI, SafeStack, RetGuard, BTI, PAC</td>
</tr>
</tbody>
</table>
<h2 id="01--profile-guided-optimization">01 · Profile-Guided Optimization</h2>
<pre><code>   First build  (instrumented)              Second build (optimized)
   ────────────────────────────             ────────────────────────
        gcc -fprofile-generate                gcc -fprofile-use
                  │                                    │
                  ▼                                    ▼
              ./a.out                              optimized binary
              (writes .gcda)                       (reads .gcda)
                  │                                    ▲
                  └────────────────────────────────────┘
                           pass profile to second build
</code></pre>
<p>What PGO buys you:</p>
<ul>
<li><strong>Block placement</strong>: hot path is straight-line, cold path is in
  <code>.text.unlikely</code>.</li>
<li><strong>Inlining</strong>: hot, small callees are aggressively inlined; cold ones
  are not.</li>
<li><strong>Loop unroll</strong>: hot loops get unrolled more, cold loops not at all.</li>
<li><strong>Switch lowering</strong>: hot cases get the fast path (e.g. fall-through
  rather than table lookup).</li>
<li><strong>Function ordering</strong>: hot functions cluster together in the binary →
  better I-cache.</li>
<li><strong>Builtin expect</strong>: replaced by actual measured probabilities.</li>
</ul>
<p>Typical speedup: 5-25% on real applications. For interpreters and
parser-heavy code, sometimes &gt;40%.</p>
<h3 id="clangllvm-workflow">Clang/LLVM workflow</h3>
<pre><code class="language-bash">clang -O3 -fprofile-generate=/tmp/pgo -o app app.c
./app sample_input              # writes /tmp/pgo/default*.profraw
llvm-profdata merge -output=/tmp/pgo/default.profdata /tmp/pgo
clang -O3 -fprofile-use=/tmp/pgo/default.profdata -o app app.c
</code></pre>
<h3 id="gcc-workflow">GCC workflow</h3>
<pre><code class="language-bash">gcc -O3 -fprofile-generate -o app app.c
./app sample_input              # writes *.gcda next to the source
gcc -O3 -fprofile-use -o app app.c
</code></pre>
<h2 id="02--autofdo--sampled-pgo">02 · AutoFDO / Sampled PGO</h2>
<p>Instrumentation slows the program 2–5×, so it&rsquo;s painful to run on real
production traffic. <strong>Sample-based PGO</strong> uses <code>perf</code> or <code>LBR</code> data:</p>
<pre><code class="language-bash"># Linux: collect a perf profile while the binary runs in production
perf record -e cycles:u -j any,u -o app.perf -- ./app

# Convert to LLVM's format
create_llvm_prof --binary=./app --profile=app.perf --out=app.prof

# Recompile with the sampled profile
clang -O3 -fprofile-sample-use=app.prof -o app.opt app.c
</code></pre>
<p>GCC&rsquo;s equivalent is <code>-fauto-profile=app.gcov</code>.</p>
<h2 id="03--bolt--post-link-optimization">03 · BOLT — post-link optimization</h2>
<p>Even after PGO, the linker has placed functions and basic blocks. BOLT
takes the linked binary plus a profile and rewrites the layout
without recompiling:</p>
<pre><code class="language-bash">perf record -e cycles:u -j any,u -- ./app
perf2bolt -p perf.data -o perf.fdata ./app
llvm-bolt ./app -o ./app.bolted -data=perf.fdata \\
    -reorder-blocks=ext-tsp -reorder-functions=hfsort+ \\
    -split-functions -split-all-cold -split-eh -dyno-stats
</code></pre>
<p>Typical extra speedup: 5-15% <strong>on top of</strong> PGO.</p>
<p>The mechanics:</p>
<pre><code>       .text
       ┌──────────────┐               .text
       │ hot funcs    │               ┌──────────────┐
       │ mixed with   │ BOLT          │ ALL hot      │
       │ cold ones    │ ───────────►  │ funcs first  │
       │ (heap layout)│               │ ─────────────│
       │              │               │ cold funcs   │
       └──────────────┘               │ (rarely      │
                                      │ touched →    │
                                      │ no I-cache)  │
                                      └──────────────┘
</code></pre>
<p>Propeller (also from Google) is the per-block sibling of BOLT, integrated
into the linker via thin LTO–style summaries.</p>
<h2 id="04--polyhedral-compilation-polly-graphite">04 · Polyhedral compilation (Polly, Graphite)</h2>
<p>Treats the iteration space of an affine loop nest as a polyhedron and
applies transformations that can be proven to preserve dependencies:</p>
<pre><code>   for (i=0;i&lt;N;i++)
     for (j=0;j&lt;N;j++)
        A[i][j] = B[i][j] + C[i][j];
</code></pre>
<p>The polyhedron is <code>{(i,j) | 0 ≤ i &lt; N ∧ 0 ≤ j &lt; N}</code>. Useful
transformations:</p>
<ul>
<li><strong>Loop interchange</strong> (chapter 02).</li>
<li><strong>Tiling</strong> (chapter 02).</li>
<li><strong>Skewing</strong> to expose parallelism.</li>
<li><strong>Fusion</strong> of multiple loops with compatible polyhedra.</li>
<li><strong>OpenMP / OpenACC parallelization</strong>: emit <code>#pragma omp parallel for</code>.</li>
</ul>
<p>Tools:</p>
<ul>
<li><strong>Polly</strong> for LLVM. Out-of-tree but in many distros: <code>clang -O3 -mllvm -polly</code>.</li>
<li><strong>Graphite</strong> in GCC: <code>-floop-nest-optimize</code>, <code>-fgraphite-identity</code>.</li>
</ul>
<p>Often disabled by default because the algorithms are O(n³)+ on nest depth
and rarely fire on real C code (constraints too tight).</p>
<h2 id="05--super-optimization">05 · Super-optimization</h2>
<blockquote>
<p>Synthesize an instruction sequence that is provably equivalent to a given
one, but cheaper.</p>
</blockquote>
<p>Examples:</p>
<ul>
<li><strong>Souper</strong> (LLVM IR): finds &ldquo;missed optimizations&rdquo; by running an SMT
  solver against known-good rewrites.</li>
<li><strong>Alive2</strong> (LLVM IR): verifies that an optimization is <em>correct</em> by
  symbolic execution.</li>
<li><strong>STOKE</strong> (x86 asm): stochastic super-optimizer; replaces a function with
  a synthesized sequence that passes a million random tests.</li>
</ul>
<p>These tools are how the GCC and LLVM optimizer teams find new peephole
rules and how they catch optimizer bugs.</p>
<h2 id="06--vplan--llvms-modern-vectorizer">06 · VPlan — LLVM&rsquo;s modern vectorizer</h2>
<pre><code>       Loop                    Cost                Code
       analyzer  ───────►      model    ────►     gen
       (build VPlan)          (pick VF,           (emit
                                interleave)        IR)
</code></pre>
<p>VPlan is a &ldquo;vectorization plan&rdquo; — a data structure that holds <em>one or more</em>
plausible vectorizations of the same loop. The cost model picks among them.</p>
<p>This is what lets the same loop be vectorized differently per target ISA
without each backend duplicating the analysis.</p>
<h2 id="07--sanitizers-as-compiler-instrumentation">07 · Sanitizers as compiler instrumentation</h2>
<p>The same machinery that supports profile collection also supports run-time
checks:</p>
<table>
<thead>
<tr>
<th>Sanitizer</th>
<th>Catches</th>
<th>Overhead</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>-fsanitize=address</code> (ASan)</td>
<td>OOB heap/stack/global access, UAF, leaks</td>
<td>2-3× memory, 2× CPU</td>
</tr>
<tr>
<td><code>-fsanitize=memory</code>  (MSan)</td>
<td>use of uninitialized values</td>
<td>3× CPU</td>
</tr>
<tr>
<td><code>-fsanitize=thread</code>  (TSan)</td>
<td>data races</td>
<td>5-15× CPU</td>
</tr>
<tr>
<td><code>-fsanitize=undefined</code> (UBSan)</td>
<td>UB (oob shifts, signed wrap, etc.)</td>
<td>&lt;5%</td>
</tr>
<tr>
<td><code>-fsanitize=leak</code></td>
<td>memory leaks (a subset of ASan)</td>
<td>tiny</td>
</tr>
<tr>
<td><code>-fsanitize=cfi</code></td>
<td>control-flow integrity</td>
<td>&lt;5%</td>
</tr>
</tbody>
</table>
<p>UBSan is cheap enough to ship in production for some uses; the others are
debug-only.</p>
<h2 id="08--llvm-ir-attributes-to-know">08 · LLVM IR attributes to know</h2>
<p>Function-level:</p>
<pre><code>nounwind            does not throw
readnone            doesn't access memory at all (≈ __attribute__((const)))
readonly            only reads memory   (≈ __attribute__((pure)))
writeonly           only writes
argmemonly          memory accesses are confined to its pointer arguments
norecurse           does not call itself transitively
noreturn            never returns       (e.g. abort, exit)
willreturn          always returns (used for purity reasoning)
mustprogress        execution must make forward progress
optnone             never optimize (used at -O0)
alwaysinline        always inline at call sites
naked               omit prologue/epilogue (advanced)
</code></pre>
<p>Parameter-level:</p>
<pre><code>noalias             this pointer does not alias any other (=&gt; restrict)
nocapture           callee does not retain the pointer past the call
nonnull             never null
dereferenceable(N)  at least N bytes are readable
readonly            callee only reads through this pointer
writeonly           callee only writes through it
returned            returned == this argument
</code></pre>
<p>Knowing what attribute corresponds to which C/C++ idiom is half the battle
when looking at LLVM IR.</p>
<h2 id="09--security-mitigations-the-compiler-emits">09 · Security mitigations the compiler emits</h2>
<p>Modern toolchains can insert run-time checks and indirect-branch hardening:</p>
<pre><code>-fstack-protector-strong       canary on functions with arrays / &gt;8B alloca
-fstack-clash-protection       prevent stack-clash by touching each page
-fcf-protection=full           IBT/ENDBR on indirect branches; SHSTK shadow stack
-mbranch-protection=standard   ARM64: BTI + PAC for return addresses
-fno-plt                       call through GOT directly; PIE-friendly
-fpic / -fPIC                  position-independent code
-fhardened (Clang)             ship-quality bundle of the above
</code></pre>
<p>➡ Next: <a href="../11_gcc_specific/"><code>11_gcc_specific/</code></a>.</p>` },
  { name: `86. Gcc Specific`, path: `11_gcc_specific/README.md`, dir: `11_gcc_specific`, body: `<h1 id="11--gcc-specifics">11 — GCC Specifics</h1>
<p>A practical reference for the GCC pipeline: flags, dumps, plugins, and the
order in which passes run.</p>
<h2 id="1-the-optimization-levels">1. The optimization levels</h2>
<pre><code>   ┌─────┬─────────────────────────────────────────────────────────────────┐
   │ -O0 │ no optimization. allocas everywhere. easiest to debug.          │
   │ -Og │ -O1 minus passes that hurt debug info quality. shipping debug.  │
   │ -O1 │ basic cleanups: cse, dce, jump-thread, simple inlining.         │
   │ -O2 │ + loop opts, vectorization, IPO, almost everything safe.        │
   │ -O3 │ + aggressive inlining, vectorizer relax cost, partial unroll.   │
   │ -Os │ size-cost-model &gt; speed. like -O2 minus unrolling.              │
   │ -Ofast │ -O3 + -ffast-math (breaks IEEE!).                            │
   └─────┴─────────────────────────────────────────────────────────────────┘
</code></pre>
<p>Dump the list of passes scheduled at any level:</p>
<pre><code class="language-bash">gcc -Q -O2 --help=optimizers
gcc -Q -O3 --help=optimizers | head -60
</code></pre>
<h2 id="2-the-two-irs">2. The two IRs</h2>
<pre><code>   front-end ──► GENERIC ──► GIMPLE ──► RTL ──► asm
                  │           │          │
              language-       SSA-ed     register
              independent     three-     transfer
              trees           address    language
                              code       (≈ asm)
</code></pre>
<ul>
<li><strong>GENERIC</strong> = language-independent tree from the front-end. Briefly held.</li>
<li><strong>GIMPLE</strong> = three-address SSA tree-level IR. ALL the mid-end passes
  work here.</li>
<li><strong>RTL</strong> = backend&rsquo;s instruction-selected, near-asm IR. Register
  allocation and scheduling happen here.</li>
</ul>
<h2 id="3-dumping-every-pass">3. Dumping every pass</h2>
<pre><code class="language-bash">gcc -O3 \\
    -fdump-tree-all-graph \\
    -fdump-rtl-all \\
    -fdump-ipa-all \\
    -fopt-info-all \\
    -c file.c -o /dev/null
ls file.c.*
</code></pre>
<p>You&rsquo;ll get one file per pass (e.g. <code>file.c.157t.optimized</code>,
<code>file.c.245r.expand</code>).</p>
<p>The <code>-fopt-info-*</code> flags emit human-readable remarks during compilation:</p>
<table>
<thead>
<tr>
<th>Flag</th>
<th>What it reports</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>-fopt-info-vec</code></td>
<td>which loops vectorized</td>
</tr>
<tr>
<td><code>-fopt-info-vec-missed</code></td>
<td>which did NOT vectorize and why</td>
</tr>
<tr>
<td><code>-fopt-info-loop</code></td>
<td>loop transformations applied</td>
</tr>
<tr>
<td><code>-fopt-info-inline</code></td>
<td>inlining decisions</td>
</tr>
<tr>
<td><code>-fopt-info-all</code></td>
<td>everything</td>
</tr>
<tr>
<td><code>-fopt-info-all-optall</code></td>
<td>with full details</td>
</tr>
<tr>
<td><code>-fopt-info-…=stderr</code></td>
<td>to stderr (default)</td>
</tr>
<tr>
<td><code>-fopt-info-…=file</code></td>
<td>to a file</td>
</tr>
</tbody>
</table>
<h2 id="4-per-pass-enable--disable">4. Per-pass enable / disable</h2>
<p>Almost every transformation can be toggled individually:</p>
<pre><code class="language-bash">gcc -O2 -fno-inline -c file.c       # disable inlining at -O2
gcc -O2 -ftree-loop-vectorize       # explicit (already on at -O2)
gcc -O2 -fno-tree-loop-vectorize    # disable the loop vectorizer
gcc -O3 -fno-unroll-loops           # at -O3, but no unrolling
gcc -O2 -fno-tree-pre               # disable PRE
gcc -O3 -ftree-loop-distribution    # explicit
</code></pre>
<p>The full list:</p>
<pre><code class="language-bash">gcc --help=optimizers | less
gcc --help=params     | less
</code></pre>
<h2 id="5-tunable-parameters">5. Tunable parameters</h2>
<p><code>--param</code> knobs influence cost models without changing pass selection:</p>
<pre><code>   --param max-inline-insns-single=N      smaller → less inlining
   --param max-inline-insns-auto=N        for inline-keyword functions
   --param inline-unit-growth=PCT         max % growth from inlining
   --param max-unroll-times=N             cap on unroll factor
   --param max-unrolled-insns=N           cap on unrolled body size
   --param vect-max-version-for-alias-checks=N
   --param graphite-max-bbs-per-function=N  Graphite's complexity bound
</code></pre>
<h2 id="6-function-attribute-reference">6. Function-attribute reference</h2>
<pre><code class="language-c">__attribute__((const))
__attribute__((pure))
__attribute__((noreturn))
__attribute__((malloc))
__attribute__((nonnull(1, 2)))
__attribute__((returns_nonnull))
__attribute__((nothrow))
__attribute__((cold))
__attribute__((hot))
__attribute__((always_inline))
__attribute__((noinline))
__attribute__((flatten))                /* inline everything THIS function calls */
__attribute__((target(&quot;avx2&quot;)))         /* compile this fn for AVX2 */
__attribute__((target_clones(&quot;default,avx2,avx512f&quot;))) /* multi-version + IFUNC */
__attribute__((aligned(64)))
__attribute__((packed))
__attribute__((section(&quot;name&quot;)))
__attribute__((visibility(&quot;hidden&quot;)))
__attribute__((no_instrument_function))
__attribute__((optimize(&quot;Ofast&quot;)))      /* per-function -Ofast */
__attribute__((optimize(&quot;no-loop-vectorize&quot;)))
</code></pre>
<h2 id="7-pragmas">7. Pragmas</h2>
<pre><code class="language-c">#pragma GCC optimize(&quot;O3,fast-math&quot;)        /* enable for this file */
#pragma GCC optimize(&quot;O0&quot;)                   /* disable for rest of file */
#pragma GCC target(&quot;avx2&quot;)                   /* enable AVX2 here */
#pragma GCC push_options
#pragma GCC pop_options

#pragma GCC unroll N                         /* unroll the next loop N times */
#pragma GCC ivdep                            /* no loop-carried mem deps */
#pragma GCC novector                         /* don't vectorize */

#pragma GCC poison some_identifier           /* fail if this is used below */
</code></pre>
<h2 id="8-built-ins-worth-knowing">8. Built-ins worth knowing</h2>
<pre><code class="language-c">__builtin_expect(x, 0)        // branch hint (likely / unlikely)
__builtin_expect_with_probability(x, 0, 0.01)
__builtin_unreachable()       // &quot;control cannot reach here&quot;
__builtin_assume_aligned(p, 64)
__builtin_constant_p(x)       // &quot;is x a compile-time constant?&quot;
__builtin_choose_expr(cond, x, y) // compile-time ternary
__builtin_types_compatible_p(T1, T2)
__builtin_prefetch(p, rw, locality)
__builtin_clz, __builtin_ctz, __builtin_popcount, __builtin_parity
__builtin_clzll, __builtin_ctzll, __builtin_popcountll
__builtin_bswap{16,32,64}
__builtin_add_overflow, __builtin_mul_overflow, __builtin_sub_overflow
</code></pre>
<p><code>__builtin_unreachable</code> is criminally underused: it lets the optimizer
drop entire branches once it knows they can&rsquo;t happen.</p>
<pre><code class="language-c">void index_into(int *a, unsigned i) {
    if (i &gt;= 16) __builtin_unreachable();   /* range proof */
    a[i] = 0;                                /* code shrinks accordingly */
}
</code></pre>
<h2 id="9-gcc-plugin-hook-for-the-curious">9. GCC plugin hook (for the curious)</h2>
<p>You can write a pass-plugin in C++:</p>
<pre><code class="language-bash">g++ -shared -fPIC -o myplugin.so myplugin.cc \\
    -I$(gcc -print-file-name=plugin)/include
gcc -fplugin=./myplugin.so -O2 -c file.c
</code></pre>
<p>The plugin registers callbacks on pass events (e.g. after CCP, after
vectorizer) and can examine or modify GIMPLE / RTL.</p>
<h2 id="10-decoding-common-pass-names-in-dumps">10. Decoding common pass names in dumps</h2>
