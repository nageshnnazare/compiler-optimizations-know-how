  { name: `36. Data Flow Analysis / Reaching Definitions`, path: `04_data_flow_analysis/01_reaching_definitions.c`, dir: `04_data_flow_analysis`, body: `<h1 id="01_reaching_definitionsc">01_reaching_definitions.c</h1>
<pre><code class="language-c">/* 01_reaching_definitions.c — REACHING DEFINITIONS ANALYSIS
 * ============================================================================
 *
 * The CFG and the reaching sets
 * -----------------------------
 *
 *      d1:  x = 10              &lt;-- BB1: GEN={d1}        KILL={d2}
 *           │
 *      ┌────┴─────┐
 *      ▼          ▼
 *   d2:x=20    (no def)         &lt;-- BB2: GEN={d2} KILL={d1}, BB3: GEN=KILL=∅
 *      │          │
 *      └────┬─────┘
 *           ▼
 *        use of x              &lt;-- BB4: IN={d1, d2} — TWO defs reach here
 *
 *   Forward, MAY (∪) analysis:
 *      OUT[B] = GEN[B] ∪ (IN[B] \\ KILL[B])
 *      IN [B] = ⋃ OUT[P] over predecessors P
 *
 *   The two reaching defs at BB4's use of x are EXACTLY what tells the
 *   SSA construction pass it must place a φ-node at the start of BB4:
 *
 *      BB4:  x4 = φ(x_from_BB2, x_from_BB3)
 *
 * Uses of reaching defs
 * ---------------------
 *   – φ-node placement during SSA construction
 *   – Use-def chain construction
 *   – Constant propagation lattice setup
 *
 * ----------------------------------------------------------------------------
 *
 *  reaches — what actually gets emitted.
 *  ----------------------------------------------------------------------------
 *  ACTUAL (-O3):
 *      reaches:
 *          test  edi, edi               ; cond ?
 *          mov   ecx, 10                ; load alternative #1 (d1)
 *          mov   eax, 20                ; load alternative #2 (d2)
 *          cmove eax, ecx               ; if !cond → eax = ecx = 10
 *          ret
 *
 *  WHY: After SSA construction places the φ-node for x at the merge,
 *  SimplifyCFG converts the if into a \`select\`. The selector emits a
 *  CMOV: branch-free, two literal materializations and one conditional
 *  move. No branch mis-prediction risk.
 */
int reaches(int cond) {
    int x = 10;             /* d1 */
    if (cond) {
        x = 20;             /* d2 */
    }
    return x;               /* SSA: x_ret = φ(x@BB2 = d2, x@BB3 = d1) */
}

</code></pre>` },
  { name: `37. Data Flow Analysis / Live Variables`, path: `04_data_flow_analysis/02_live_variables.c`, dir: `04_data_flow_analysis`, body: `<h1 id="02_live_variablesc">02_live_variables.c</h1>
<pre><code class="language-c">/* 02_live_variables.c — LIVENESS ANALYSIS
 * ============================================================================
 *
 *   BB1: a = 5; b = 7;          ;; OUT(BB1) = {a, b, cond}
 *   BB2: if (cond)              ;; IN(BB2)  ⊇ {cond, a, b}
 *      /         \\
 *   BB3:         BB4:
 *   c = a + 1    d = b * 2      ;; IN(BB3) = {a}, IN(BB4) = {b}
 *   ret c        ret d
 *
 *   Backward, MAY analysis:
 *      IN [B] = USE[B] ∪ (OUT[B] \\ DEF[B])
 *      OUT[B] = ⋃ IN[S]  over successors S
 *
 * Uses of liveness
 * ----------------
 *   – Register allocation: live ranges drive interference &amp; spilling.
 *   – Dead code elimination: a def whose name is never live is dead.
 *   – Spill placement: spill the variable with the longest live range.
 * ============================================================================
 */

/*  liveness_demo — choose between c=a+1 and d=b*2.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      liveness_demo:
 *          xor   eax, eax
 *          test  edi, edi
 *          sete  al                 ; al = (cond == 0)
 *          lea   eax, [8*rax + 6]   ; cond==0 → 14 (=b*2);  cond!=0 → 6 (=a+1)
 *          ret
 *
 *  WHAT THE NAÏVE CFG WOULD GIVE:
 *      liveness_demo:
 *          test edi, edi
 *          je   .else
 *          mov  eax, 6              ; a + 1 = 5 + 1 = 6
 *          ret
 *      .else:
 *          mov  eax, 14             ; b * 2 = 7 * 2 = 14
 *          ret
 *
 *  WHY THE ACTUAL IS BETTER: SimplifyCFG converts the if/else to a
 *  \`select 6, 14\`; both constants are encoded in the linear function
 *  \`8*x + 6\` so that x=0 → 6, x=1 → 14. ONE branchless arithmetic
 *  instruction does the job. The liveness analysis is what allowed
 *  the optimizer to *see* that \`a\` and \`b\` weren't live past their
 *  respective branches, so they could be folded to constants and the
 *  branches eliminated.
 */
int liveness_demo(int cond) {
    int a = 5, b = 7, c, d;
    if (cond) {
        c = a + 1;
        return c;       /* on this path, b was DEAD already in BB1 */
    } else {
        d = b * 2;
        return d;       /* on this path, a was DEAD already in BB1 */
    }
}

/*  many_temps — five temporaries; max simultaneously live = 3.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      many_temps:
 *          lea   eax, [rsi + 2*rsi]   ; eax = 3y       (t2)
 *          lea   eax, [rax + 2*rdi]   ; eax = 3y + 2x  (t4 collapsed)
 *          lea   eax, [rax + 4*rdx]   ; eax = + 4z     (t5)
 *          ret
 *
 *  WHAT WE'D EXPECT WITHOUT LIVENESS-AWARE ALLOCATION: five distinct
 *  registers t1..t5 reserved at once → six live values including
 *  args x,y,z. Easily fits in 16 regs but represents wasted state.
 *
 *  WHY: liveness shows that t1 dies after t4 is formed, t2 also dies
 *  there, t3 dies after t5. The allocator coalesces all five SSA names
 *  into ONE physical register (RAX) by reusing it. Three lea
 *  instructions, zero spills, all in the return register.
 */
int many_temps(int x, int y, int z) {
    int t1 = x * 2;
    int t2 = y * 3;
    int t3 = z * 4;
    int t4 = t1 + t2;
    int t5 = t4 + t3;
    return t5;
}

</code></pre>` },
  { name: `38. Data Flow Analysis / Available Expressions`, path: `04_data_flow_analysis/03_available_expressions.c`, dir: `04_data_flow_analysis`, body: `<h1 id="03_available_expressionsc">03_available_expressions.c</h1>
<pre><code class="language-c">/* 03_available_expressions.c — AVAILABLE EXPRESSIONS ANALYSIS
 * ============================================================================
 *
 * An expression \`e\` is AVAILABLE at point p iff EVERY path from entry to
 * p computes e and no operand of e is redefined between that computation
 * and p.
 *
 *      t1 = a * b;            ;; BB1: GEN={a*b}  KILL={ exprs using a OR b }
 *           │
 *           ▼
 *      use of (a*b)           ;; BB2: a*b ∈ IN[BB2] → replace use with t1
 *
 *   Forward, MUST (∩) — fact survives a join only if it holds on ALL paths.
 *      IN[B] = ⋂ OUT[P]  over predecessors P
 *      OUT[B] = GEN[B] ∪ (IN[B] \\ KILL[B])
 *
 * Used by CSE / GVN. If e ∈ IN[p] and there's a temporary t holding it,
 * the use of e at p is replaced by t.
 * ============================================================================
 */

/*  cse_friendly — \`a*b\` is available at the second use → CSE'd.
 *  ──────────────────────────────────────────────────────────────────────────
 *  Source:
 *      t1 = a*b + 1;
 *      t2 = a*b + 2;            ; a, b not redefined → a*b is available
 *      return t1 + t2;          ; = 2*(a*b) + 3
 *
 *  ACTUAL (-O3):
 *      cse_friendly:
 *          imul edi, esi               ; ONE multiply: a * b
 *          lea  eax, [2*rdi + 3]        ; 2*(a*b) + 3 in one lea
 *          ret
 */
int cse_friendly(int a, int b) {
    int t1 = a * b + 1;
    int t2 = a * b + 2;
    return t1 + t2;
}

/*  cse_blocked — assignment to \`a\` KILLs availability of \`a*b\`.
 *  ──────────────────────────────────────────────────────────────────────────
 *  Source:
 *      t1 = a*b + 1;
 *      a  = 0;                  ; KILL set adds (a*b)
 *      t2 = a*b + 2;            ; a*b is NO LONGER available; recompute
 *      return t1 + t2;
 *
 *  ACTUAL (-O3):
 *      cse_blocked:
 *          imul edi, esi               ; t1 = a*b + 1 (uses original a)
 *          lea  eax, [rdi + 3]          ; result = (a*b + 1) + 2 = a*b + 3
 *          ret
 *
 *  WHAT HAPPENED:
 *    – The compiler did NOT use a*b for t2 (kill set blocks the CSE).
 *    – Instead it computed t2 = 0*b + 2 = 2 by constant folding the
 *      *new* value of a.
 *    – Then t1 + t2 = (a*b + 1) + 2 = a*b + 3, hence the lea.
 *
 *  Without the killing assignment \`a = 0\`, the optimizer would have
 *  reused the previous a*b computation. Here it had to compromise:
 *  one mul + one lea instead of one mul + one lea (same cost!) because
 *  the second \`a*b\` collapsed to a constant.
 */
int cse_blocked(int a, int b) {
    int t1 = a * b + 1;
    a = 0;
    int t2 = a * b + 2;
    return t1 + t2;
}

</code></pre>` },
  { name: `39. Data Flow Analysis / Very Busy Expressions`, path: `04_data_flow_analysis/04_very_busy_expressions.c`, dir: `04_data_flow_analysis`, body: `<h1 id="04_very_busy_expressionsc">04_very_busy_expressions.c</h1>
<pre><code class="language-c">/* 04_very_busy_expressions.c — VERY-BUSY-EXPRESSIONS ANALYSIS
 * ============================================================================
 *
 * An expression e is &quot;very busy&quot; at p iff EVERY path FROM p computes e
 * before any operand of e is changed.
 *
 *      Entry (BB1)
 *      │
 *      if (cond)
 *      /         \\
 *  BB2:         BB3:
 *  use a*b      use a*b
 *
 *   Then (a*b) is very busy at BB1 → it can be HOISTED into BB1, saving
 *   the second computation regardless of which branch is taken.
 *
 *   Backward, MUST (∩). The dual of &quot;available expressions&quot;.
 *      OUT[B] = ⋂ IN[S]  over successors S
 *      IN [B] = USE[B] ∪ (OUT[B] \\ KILL[B])
 *
 * Used by Partial Redundancy Elimination (PRE):
 *   LLVM: GVNHoist, MergedLoadStoreMotion (memory variant)
 *   GCC : tree-ssa-pre.cc
 * ============================================================================
 */

/*  hoistable — (a*b) is computed on BOTH paths.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      hoistable:
 *          imul edi, esi                ; (a*b) HOISTED to here, ONCE
 *          xor  eax, eax
 *          cmp  edx, 1
 *          setae al                     ; al = (cond != 0)
 *          lea  eax, [rdi + 2*rax]      ; (a*b) + 2*(cond != 0)
 *          dec  eax                     ; subtract 1
 *          ret
 *
 *  WHY: GVNHoist sees \`a*b\` is very busy at the if's join, so it pulls
 *  the computation into the dominator (the if's condition block) where
 *  it is executed exactly once. The if/else then collapses to a branch-
 *  less \`select 1, -1\` which the codegen lowers to a 0/1 indicator
 *  multiplied by 2 minus 1 → +1 / -1.
 */
int hoistable(int a, int b, int cond) {
    if (cond) return a * b + 1;
    else      return a * b - 1;
}

/*  not_hoistable — one arm uses a+b, the other a*b.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      not_hoistable:
 *          lea  eax, [rsi + rdi]        ; a+b  (one arm)
 *          mov  ecx, esi
 *          imul ecx, edi                ; a*b  (other arm)
 *          inc  ecx                     ; a*b + 1
 *          test edx, edx
 *          cmovne eax, ecx              ; pick a*b+1 if cond, else a+b
 *          ret
 *
 *  WHY: \`a*b\` is NOT very busy at entry — the else path doesn't compute
 *  it. The hoist would *speculatively* execute a multiply even when not
 *  needed. The cost model decides the saving doesn't pay (the if/else
 *  was going to lower to a CMOV anyway). Both expressions are computed
 *  speculatively before the test; CMOV picks.
 */
int not_hoistable(int a, int b, int cond) {
    if (cond) return a * b + 1;
    else      return a + b;
}

</code></pre>` },
  { name: `40. Data Flow Analysis / Dominators`, path: `04_data_flow_analysis/05_dominators.c`, dir: `04_data_flow_analysis`, body: `<h1 id="05_dominatorsc">05_dominators.c</h1>
<pre><code class="language-c">/* 05_dominators.c — dominator-tree intuition in C
 *
 *           Entry (e)
 *             │
 *             A
 *           ┌─┴─┐
 *           B   C
 *           └─┬─┘
 *             D
 *             │
 *            Exit
 *
 *   dominators: e dom {e, A, B, C, D, Exit}
 *               A dom {A, B, C, D, Exit}
 *               B dom {B}
 *               C dom {C}
 *               D dom {D, Exit}
 *
 *   dominator tree:
 *               e
 *               │
 *               A
 *              /│\\
 *             B C D
 *                 │
 *                Exit
 *
 *   idom(B) = idom(C) = A
 *   idom(D) = A
 *
 * Dominance is what allows hoisting:
 *   - To hoist instruction I from BB X to BB Y, Y must DOMINATE every use
 *     of I, AND I's operands must all be defined in (or dominate) Y.
 *
 * Dominance also identifies loops:
 *   - A back-edge X → Y is one where Y DOMINATES X. The natural loop is
 *     all nodes reachable from X without going through Y.
 */
/*  dom_demo — \`t = x*x\` computed once because A dominates B, C, D.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      dom_demo:
 *          imul  esi, esi             ; A: t = x * x   ← computed ONCE
 *          xor   eax, eax
 *          cmp   edi, 1
 *          setae al                   ; al = (cond != 0)
 *          lea   eax, [rsi + 2*rax]   ; t + 2*(cond?1:0)
 *          dec   eax                  ; subtract 1
 *          ret
 *
 *  This is t + (cond ? 1 : -1), computed branchlessly using a 0/1
 *  indicator and lea. The single \`imul\` is the proof that A's
 *  computation of \`t\` was REUSED in both branches — possible only
 *  because A dominates B, C, and D in the CFG.
 *
 *  Dominance is also why φ-node placement works: a φ at the merge BB D
 *  picks among reaching defs from B and C, both of which are
 *  immediately dominated by A.
 */
int dom_demo(int cond, int x) {
    int t = x * x;          /* A */
    int r;
    if (cond) {
        r = t + 1;          /* B */
    } else {
        r = t - 1;          /* C */
    }
    return r;               /* D */
}

</code></pre>` },
  { name: `41. Data Flow Analysis / Constant Propagation`, path: `04_data_flow_analysis/06_constant_propagation.c`, dir: `04_data_flow_analysis`, body: `<h1 id="06_constant_propagationc">06_constant_propagation.c</h1>
<pre><code class="language-c">/* 06_constant_propagation.c — constant-propagation lattice
 *
 * SCCP (Sparse Conditional Constant Propagation) tracks each SSA name's
 * value as one of:
 *
 *       ⊤  (&quot;undefined yet&quot;)
 *       ╱   ╲
 *      … -1 0 1 2 …    (specific constants)
 *       ╲   ╱
 *       ⊥  (&quot;not a constant&quot;)
 *
 * Meet rules:
 *   meet(⊤, x) = x
 *   meet(x, x) = x
 *   meet(x, y) = ⊥   if x ≠ y, both constants
 *
 * SCCP is &quot;conditional&quot; because it also tracks which CFG edges are
 * executable. If an edge is proven unreachable, the φ doesn't pick up
 * values along it.
 *
 * Picture for sccp_demo:
 *
 *     y1 = 5            (lattice value: 5)
 *     br true → BB2     (edge BB1→BB3 not executable)
 *     BB2: y2 = 10      (lattice value: 10)
 *     BB3: y3 = y1 + 1  (UNREACHABLE; not visited)
 *     BB4: y4 = φ(y2 from BB2,
 *                 y3 from BB3)        ← BB3 edge dead → φ collapses to y2 = 10
 *     return y4         (lattice value: 10) → compiles to \`mov eax, 10\`
 */
/*  sccp_demo — only the true arm is executable.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      sccp_demo:
 *          mov  eax, 10
 *          ret
 *
 *  WHY: SCCP marks BB1→BB_else as non-executable (condition is constant
 *  1). The lattice value of \`y\` collapses to {10}. The φ at the join
 *  has only one executable input, picks 10. The whole function returns
 *  the literal 10.
 *
 *  COMPARE WITH NAIVE CP: it would merge both arms (10 from one, 6 from
 *  the other) and conclude y = ⊥ (&quot;not constant&quot;) → emit the if/else.
 *  SCCP's edge-executability tracking is what makes the difference.
 */
int sccp_demo(void) {
    int x = 5;
    int y;
    if (1)              /* true branch always taken; edge to else is dead */
        y = 10;
    else
        y = x + 1;
    return y;
}

</code></pre>` },
  { name: `42. Data Flow Analysis`, path: `04_data_flow_analysis/README.md`, dir: `04_data_flow_analysis`, body: `<h1 id="04--data-flow-analysis">04 — Data-Flow Analysis</h1>
<blockquote>
<p>Optimizations are <em>transformations</em>. Data-flow analyses are the <em>evidence</em>
they need before firing. This chapter gives you the four canonical
analyses, their lattices, and their direction.</p>
</blockquote>
<h2 id="map">Map</h2>
<table>
<thead>
<tr>
<th>#</th>
<th>Example</th>
<th>Analysis</th>
</tr>
</thead>
<tbody>
<tr>
<td>01</td>
<td><code>01_reaching_definitions.c</code></td>
<td>Reaching definitions</td>
</tr>
<tr>
<td>02</td>
<td><code>02_live_variables.c</code></td>
<td>Liveness</td>
</tr>
<tr>
<td>03</td>
<td><code>03_available_expressions.c</code></td>
<td>Available expressions</td>
</tr>
<tr>
<td>04</td>
<td><code>04_very_busy_expressions.c</code></td>
<td>Very-busy expressions</td>
</tr>
<tr>
<td>05</td>
<td><code>05_dominators.c</code></td>
<td>Dominators &amp; post-dominators</td>
</tr>
<tr>
<td>06</td>
<td><code>06_constant_propagation.c</code></td>
<td>Constant propagation lattice</td>
</tr>
</tbody>
</table>
<h2 id="the-big-picture">The big picture</h2>
<p>Every classical analysis fits in this 2×2 table:</p>
<pre><code>                       │       MAY (∪)             │       MUST (∩)
        ───────────────┼───────────────────────────┼────────────────────────
        FORWARD        │  Reaching definitions     │  Available expressions
                       │  Constant propagation     │
        ───────────────┼───────────────────────────┼────────────────────────
        BACKWARD       │  Live variables           │  Very-busy expressions
                       │                           │
</code></pre>
<ul>
<li><strong>Direction</strong>: forward = data flows from entry; backward = from exits.</li>
<li><strong>Confluence operator at a join</strong>:</li>
<li><strong>∪ (may)</strong> — value at the join = union of incoming sets.
    &ldquo;Property X <em>may</em> hold here.&rdquo;</li>
<li><strong>∩ (must)</strong> — value at the join = intersection of incoming sets.
    &ldquo;Property X <em>must</em> hold here.&rdquo;</li>
</ul>
<p>Each analysis is solved by a <strong>fixed-point iteration</strong> on the CFG:</p>
<pre><code>   for each block B:  IN[B] = initial
   repeat until no change:
       for each block B in &lt;direction&gt; order:
           IN[B]  = ⨁ OUT[predecessors] / OUT[successors]
           OUT[B] = transfer(B, IN[B])
</code></pre>
<p><code>⨁</code> is <code>∪</code> (may) or <code>∩</code> (must). <code>transfer(B, IN)</code> is the <strong>transfer function</strong>
of block B — what the block does to the incoming facts.</p>
<h2 id="1-reaching-definitions-forward-may">1. Reaching definitions (FORWARD, MAY)</h2>
<p>A definition <code>d: x = e</code> at point p <strong>reaches</strong> point q if there is a CFG path
p → q on which x is not redefined.</p>
<pre><code>                d1: x = 10
                     │
                     ▼
                  B1 (uses x)             ← d1 reaches B1
                     │
              ┌──────┴──────┐
              ▼             ▼
        d2: x = 20      (no def)
              │             │
              └──────┬──────┘
                     ▼
                  B4 (uses x)             ← {d1, d2} both reach B4
</code></pre>
<p><strong>Used by</strong>: SSA construction (where to place φ-nodes), use-def chains,
constant propagation.</p>
<p><strong>Transfer function</strong>:</p>
<pre><code>   OUT[B] = (IN[B]  \\ KILL[B]) ∪ GEN[B]
   GEN[B]  = defs in B reaching the end of B
   KILL[B] = all other defs of the same variables
</code></pre>
<h2 id="2-liveness-backward-may">2. Liveness (BACKWARD, MAY)</h2>
<p>A variable v is <strong>live</strong> at point p if some path from p uses v before redefining it.</p>
<pre><code>   B1:                     B1 ← {a}  (a is live here because some path uses it)
       a = 5
       b = 7
       ┃
       ▼
   B2:    if cond
       /         \\
   B3:            B4:
   c = a + 1       d = b * 2
   ret c           ret d

   Liveness at exit of B3, B4 = {} (returns)
   Liveness at exit of B2     = {a, b}    (children read them on disjoint paths)
   Liveness at exit of B1     = {a, b}    (cond is read, but assume already used)
   Liveness at entry of B1    = {}
</code></pre>
<p><strong>Used by</strong>: register allocation (live ranges), DCE (uses ∅ ⇒ dead), copy
coalescing.</p>
<p><strong>Transfer</strong>:</p>
<pre><code>   IN[B]  = USE[B] ∪ (OUT[B] \\ DEF[B])
</code></pre>
<h2 id="3-available-expressions-forward-must">3. Available expressions (FORWARD, MUST)</h2>
<p>An expression <code>e</code> is <strong>available</strong> at p if every path to p computes e and no
operand of e is redefined after the computation.</p>
<pre><code>   B1:  t = a + b     ← (a+b) generated
        x = t
                 ▼
   B2:                    ← (a+b) still available (no one wrote a or b)
        y = a + b         ← can be replaced by y = t (CSE!)
</code></pre>
<p><strong>Used by</strong>: CSE / GVN.</p>
<p><strong>Transfer</strong>:</p>
<pre><code>   OUT[B] = (IN[B] ∪ GEN[B]) \\ KILL[B]
   meet   = intersection                       (∩; the &quot;MUST&quot; direction)
   IN[entry] = ∅
</code></pre>
<h2 id="4-very-busy-expressions-backward-must">4. Very-busy expressions (BACKWARD, MUST)</h2>
<p>An expression <code>e</code> is <strong>very busy</strong> at p if every path from p computes e
before any operand is changed.</p>
<pre><code>   B1:                      ◄── (a+b) very busy here
        if cond
       /         \\
   B2:            B3:
   t = a + b      u = a + b   ◄── both children compute it
   ...            ...
</code></pre>
<p>If <code>(a+b)</code> is very busy at the entry of <code>B1</code>, you can <strong>hoist</strong> the
computation into B1 (code hoisting, a form of partial-redundancy
elimination).</p>
<p><strong>Used by</strong>: PRE (LLVM <code>GVNHoistPass</code>, GCC <code>tree-ssa-pre</code>), code hoisting.</p>
<h2 id="5-dominators">5. Dominators</h2>
<p>Block A <strong>dominates</strong> block B if every path from entry to B passes through A.</p>
<pre><code>                Entry
                  │
                  ▼
                ┌─A─┐
                │   │
              ┌─┴─┐ │
              ▼   ▼ │
              B   C │
              │   │ │
              └─┬─┘ │
                ▼   │
                D ◄─┘

   Dominators:
     A dom A,B,C,D
     B dom B
     C dom C
     D dom D
     (Entry dominates everything)
</code></pre>
<p>The <strong>immediate dominator</strong> idom(B) is the closest dominator other than B.
The <strong>dominator tree</strong> has every node&rsquo;s parent = idom.</p>
<pre><code>   Dominator tree of the CFG above:
                Entry
                  │
                  A
                ┌─┼─┐
                B C D
</code></pre>
<p><strong>Used by</strong>:
- SSA construction (φ-placement uses <em>dominance frontier</em>)
- LICM (only hoist out of a loop into its preheader — the preheader
  dominates the header)
- Loop detection (a back-edge is one whose target dominates the source)
- Speculative execution (a side-effect can be hoisted iff its new location
  dominates all its former uses)</p>
<p><strong>Post-dominators</strong> are the dual: A <em>post-dominates</em> B if every path from B
to exit passes through A. Used by code sinking.</p>
<h2 id="6-the-lattice-picture">6. The lattice picture</h2>
<p>Every analysis is a lattice and a monotone transfer function. The lattice
encodes &ldquo;how much do we know?&rdquo;:</p>
<pre><code>       ⊤   ← &quot;we know nothing yet&quot; (top; many possibilities)
       │
   ┌───┼───┐
   │   │   │
   x   y   z   ← discrete facts
   │   │   │
   └─┬─┴─┬─┘
     │   │
     ┴   ⊥   ← &quot;contradiction / completely undefined&quot;
</code></pre>
<p>For <strong>constant propagation</strong>:</p>
<pre><code>                  ⊤        ← &quot;no value yet known&quot;
              ╱       ╲
            -1   0   1  2  3 …    ← concrete constants
              ╲       ╱
                  ⊥        ← &quot;not a constant&quot; (could be anything)
</code></pre>
<p>The meet operator on this lattice is:
- meet(⊤, x) = x
- meet(x, x) = x
- meet(x, y) = ⊥ if x ≠ y, where ⊤ ≠ x ≠ ⊥</p>
<p>This is why SCCP is &ldquo;sparse&rdquo; and &ldquo;conditional&rdquo;: it walks SSA edges, not the
entire CFG, and it tracks which CFG edges are <em>executable</em> — making it more
precise than naïve constant propagation.</p>
<h2 id="7-how-a-transform-consumes-an-analysis">7. How a transform consumes an analysis</h2>
<p>Concrete example — LICM in three steps:</p>
<pre><code>   ┌──────────────────┐
   │ 1. compute LoopInfo:
   │    &quot;this is loop L, preheader P, header H, latch X&quot;
   ├──────────────────┤
   │ 2. compute Dominators:
   │    &quot;instruction I dominates all uses of I within L&quot;
   ├──────────────────┤
   │ 3. compute AliasAnalysis:
   │    &quot;the load at I does not alias any store inside L&quot;
   ├──────────────────┤
   │ 4. for each I in loop body that is loop-invariant and safe to speculate:
   │       move I to preheader P
   └──────────────────┘
</code></pre>
<p>If any of analyses 1/2/3 are missing or imprecise, the transform is too
conservative and the optimization doesn&rsquo;t fire.</p>
<h2 id="8-building--inspecting">8. Building &amp; inspecting</h2>
<p>Each example here is annotated with the <strong>exact</strong> GEN/KILL/IN/OUT sets you&rsquo;d
write on a whiteboard during a compilers exam.</p>
<pre><code class="language-bash">make all                      # build object files
make asm                      # asm dump per file
clang -O0 -Xclang -disable-O0-optnone -S -emit-llvm 01_reaching_definitions.c \\
    -o 01_reaching_definitions.O0.ll
</code></pre>
<p>➡ Next: <a href="../05_control_flow/"><code>05_control_flow/</code></a>.</p>` },
  { name: `43. Control Flow / Jump Threading`, path: `05_control_flow/01_jump_threading.c`, dir: `05_control_flow`, body: `<h1 id="01_jump_threadingc">01_jump_threading.c</h1>
<pre><code class="language-c">/* 01_jump_threading.c — JUMP THREADING
 * ============================================================================
 *
 * Idea
 * ----
 *   A path of the form  cond_X → block_Y → cond_X  where the second
 *   evaluation of cond_X is *fully determined* by the first can be
 *   &quot;threaded&quot;: rewrite Y's exit edge to point directly to the known-
 *   correct successor, bypassing the redundant compare.
 *
 *       Before:                              After threading:
 *
 *       if (cond) {                          if (cond) {
 *         x = 1;                                x = 1;
 *       } else {                                // go straight to       
 *         x = 0;                                // goto_label below     
 *       }                                       goto goto_label;
 *       if (cond)         &lt;-- redundant       } else {
 *         ...                                   x = 0;
 *       else                                    //same 
 *         ...                                   goto goto_label_else;
 *                                            }
 *
 * Pass names
 * ----------
 *   LLVM:  JumpThreadingPass; CorrelatedValuePropagationPass.
 *   GCC :  tree-ssa-threadedge.cc.
 * ============================================================================
 */

extern int A_path(int);
extern int B_path(int);

/*  threadable — chained compares with the SAME operand.
 *  ──────────────────────────────────────────────────────────────────────────
 *  Source:    if (x &gt; 10) {... } if (x &gt; 10) {... }    (the second is implied)
 *  Effectively, if (x &gt; 10) → A_path else → B_path, with an intermediate
 *  redundant compare threaded away.
 *
 *  ACTUAL (-O3):
 *      threadable:
 *          cmp  edi, 11
 *          jl   B_path             ; TAILCALL on x &lt; 11
 *          jmp  A_path             ; TAILCALL on x &gt;= 11 (i.e. x &gt; 10)
 *
 *  WHAT WE'D EXPECT WITHOUT THREADING:
 *      threadable:
 *          cmp  edi, 10
 *          jle  .else
 *          mov  ebx, 1
 *          jmp  .check
 *      .else:
 *          xor  ebx, ebx
 *      .check:
 *          test ebx, ebx
 *          je   .else_call
 *          jmp  A_path
 *      .else_call:
 *          jmp  B_path
 *
 *  WHY: After SSA, both \`if (cond)\` blocks share the same φ value at
 *  the second test (it's exactly \`cond\` itself, unchanged). Jump
 *  Threading uses Lazy Value Information (LVI) to prove the second
 *  test's outcome from the first, then redirects edges to skip the
 *  intermediate block entirely. Pair this with TCE and the function
 *  becomes a 3-instruction dispatch.
 */
int threadable(int x) {
    int cond;
    if (x &gt; 10) cond = 1;
    else        cond = 0;

    if (cond) return A_path(x);
    else      return B_path(x);
}

/*  threadable_phi — value of \`r\` known on each predecessor.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      threadable_phi:
 *          lea  ecx, [2*rsi + 1]      ; ecx = 2y + 1   (the &quot;x &gt; 0&quot; arm)
 *          xor  eax, eax              ; eax = 0       (the other arm)
 *          test edi, edi
 *          cmovg eax, ecx             ; if x &gt; 0 → use 2y+1
 *          ret
 *
 *  Without threading, the two adds in the body of the second-if would
 *  be reached via different incoming φ values; LVI proves the second-if
 *  condition matches the first and threads them, then SimplifyCFG turns
 *  the chain into a single CMOV.
 */
int threadable_phi(int x, int y) {
    int r;
    if (x &gt; 0) r = y + 1;
    else       r = -1;

    if (r &gt;= 0) return r + y;     /* on x&gt;0 path: (y+1)+y = 2y+1 */
    else        return 0;          /* on x≤0 path: r=-1 → return 0 */
}

</code></pre>` },
  { name: `44. Control Flow / Cfg Simplification`, path: `05_control_flow/02_cfg_simplification.c`, dir: `05_control_flow`, body: `<h1 id="02_cfg_simplificationc">02_cfg_simplification.c</h1>
<pre><code class="language-c">/* 02_cfg_simplification.c — SIMPLIFYCFG
 * ============================================================================
 *
 * What it does
 * ------------
 *   A grab-bag of CFG cleanups, run many times in the pipeline. The
 *   most common transforms:
 *
 *     1. Eliminate UNREACHABLE blocks.
 *     2. Merge a block with its sole predecessor when the predecessor
 *        has a single successor (collapse trivial linear chains).
 *     3. Eliminate EMPTY blocks (only contain a branch).
 *     4. Convert a 2-arm if/else with identical code in the head into a
 *        single block.
 *     5. SINK common instructions from both arms of a branch to the
 *        merge point.
 *     6. HOIST common instructions from both arms to the dominator.
 *     7. Convert short if/else into \`select\` (the if-conversion pass
 *        ultimately consumes those).
 *     8. Tail-call merging.
 *
 * Pass names
 * ----------
 *   LLVM: SimplifyCFGPass; many transforms also in InstCombine.
 *   GCC : cleanup_cfg, recursively called after every other pass.
 * ============================================================================
 */
extern int side(void);

/*  empty_blocks — chain of empty blocks collapses to one straight-line BB.
 *  ──────────────────────────────────────────────────────────────────────────
 *  Source: artificial nested-empty-if pattern.
 *
 *  ACTUAL (-O3):
 *      empty_blocks:
 *          lea  eax, [rdi + 1]
 *          ret
 *
 *  WHY: After mem2reg + InstCombine, every branch's condition becomes
 *  a constant or a redundant test. SimplifyCFG collapses the entire
 *  chain into a single basic block: \`return x + 1;\`.
 */
int empty_blocks(int x) {
    int r = x;
    if (1) {
        if (1) {
            if (1) {
                r = x + 1;
            }
        }
    }
    return r;
}

/*  sink_common — both arms call side() then add 1; sink them.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      sink_common:
 *          push rax
 *          call side               ; ONE call (sunk from BOTH arms)
 *          inc  eax                ; +1 (the common postfix)
 *          pop  rcx
 *          ret
 *
 *  WHAT WE'D EXPECT WITHOUT SINKING:
 *      if (cond) { call side; r = side()+1; }
 *      else      { call side; r = side()+1; }
 *      A naïve compile would emit two distinct call sites.
 *
 *  WHY: SimplifyCFG observes both arms end with the same \`r = side()+1\`
 *  instructions, removes them from each arm, and inserts them after
 *  the join. The if's condition becomes irrelevant and the branch is
 *  removed entirely.
 */
int sink_common(int cond) {
    int r;
    if (cond) r = side() + 1;
    else      r = side() + 1;
    return r;
}

/*  hoist_common — both arms call side(); hoist it BEFORE the branch.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      hoist_common:
 *          push rbx
 *          mov  ebx, edi
 *          call side               ; ONE call, hoisted ABOVE the branch
 *          xor  ecx, ecx
 *          cmp  ebx, 1
 *          setae cl                ; cl = (cond != 0)
 *          lea  eax, [rax + 2*rcx] ; side() + 2*(cond ? 1 : 0)
 *          dec  eax                ; subtract 1
 *          pop  rbx
 *          ret
 *
 *  WHY: GVNHoist (a sibling of SimplifyCFG) sees both arms compute
 *  \`side()\`. Hoisting executes side() exactly once. The remaining
 *  if/else \`+1 vs -1\` is converted to a branchless \`2*(cond?1:0) - 1\`.
 */
int hoist_common(int cond) {
    int r;
    if (cond) r = side() + 1;
    else      r = side() - 1;
    return r;
}

</code></pre>` },
  { name: `45. Control Flow / If Conversion`, path: `05_control_flow/03_if_conversion.c`, dir: `05_control_flow`, body: `<h1 id="03_if_conversionc">03_if_conversion.c</h1>
<pre><code class="language-c">/* 03_if_conversion.c — IF-CONVERSION (branch → select / cmov)
 * ============================================================================
 *
 * Idea
 * ----
 *   A short if/else with side-effect-free arms is converted to a
 *   \`select\`-style instruction that executes both arms and picks the
 *   right value. Eliminates the branch (no mispredict penalty) at the
 *   cost of computing both sides.
 *
 *     C                          IR                       x86
 *     ----                       -----                    ----
 *     r = c ? a : b;             %r = select %c, a, b     cmp/cmov
 *     if (c) r = a; else r = b;
 *
 * When the compiler does it
 * -------------------------
 *   – Both arms are speculatable (no traps, no side effects).
 *   – The arms are CHEAP (a few instructions).
 *   – The branch is unpredictable (compiler usually can't tell;
 *     PGO data clarifies).
 *
 * Architecture support
 * --------------------
 *   x86  — CMOVcc family.
 *   ARM  — CSEL, CINC, CSET, CNEG (and predicated 32-bit ARM).
 * ============================================================================
 */
extern int may_trap(int x);

/*  max_branchless — canonical CMOV idiom.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      max_branchless:
 *          mov   eax, esi          ; eax = b
 *          cmp   edi, esi          ; flags from a - b
 *          cmovg eax, edi          ; if a &gt; b → eax = a
 *          ret
 *
 *  WHAT WE'D EXPECT WITHOUT IF-CONVERSION:
 *      max_branchless:
 *          cmp  edi, esi
 *          jle  .else
 *          mov  eax, edi
 *          ret
 *      .else:
 *          mov  eax, esi
 *          ret
 *
 *  WHY: max is the textbook \`select\`. Three machine instructions, no
 *  branch → no possible misprediction. On modern Intel/AMD, cmov is
 *  one µop, ~1 cycle latency, no port pressure on the branch unit.
 */
int max_branchless(int a, int b) {
    return (a &gt; b) ? a : b;
}

/*  select_constant — both results are constants (3 and 7).
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      select_constant:
 *          xor   eax, eax
 *          test  edi, edi
 *          setne al                 ; al = (x != 0) ? 1 : 0
 *          lea   eax, [4*rax + 3]   ; 4*al + 3 → 3 (no) or 7 (yes)
 *          ret
 *
 *  WHY: When both results are constants in arithmetic progression
 *  (3, 7 = 3 + 4*1), the selector emits a 0/1 indicator (setne) +
 *  affine combination (\`lea [4*rax + 3]\`) instead of a CMOV. Same
 *  branch-free shape, even fewer dependencies.
 */
int select_constant(int x) {
    return x ? 7 : 3;
}

/*  has_side_effects — \`may_trap\` cannot be speculated.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      has_side_effects:
 *          test edi, edi
 *          je   .ret_zero
 *          mov  edi, esi
 *          jmp  may_trap            ; TAILCALL (still BRANCHED, not selected)
 *      .ret_zero:
 *          xor  eax, eax
 *          ret
 *
 *  WHAT WE MIGHT NAIVELY WANT: \`r = cond ? may_trap(b) : 0;\` → a select
 *  on the result of may_trap. But that would require CALLING may_trap
 *  unconditionally — observable side effect in the cond==0 case. If
 *  may_trap divides by zero when b==0, we'd crash where the original
 *  source wouldn't. So the branch must STAY.
 */
int has_side_effects(int cond, int b) {
    if (cond) return may_trap(b);
    return 0;
}

/*  cond_inside_loop — if-conversion inside a loop body.
 *  ──────────────────────────────────────────────────────────────────────────
 *  Source:
 *      for (i=0;i&lt;n;i++) a[i] = (a[i] &gt; 0) ? a[i] * 2 : 0;
 *
 *  ACTUAL (-O3): the loop VECTORIZES because the inner \`if\` was
 *  replaced by a \`select\`, which SIMD-instruction-selects to a \`pcmpgtd\`
 *  (compare-greater-than packed) producing a 0/-1 mask, then a \`pand\`
 *  with \`a[i] * 2\`. NO branch inside the inner loop.
 *
 *  Without if-conversion the SIMD code would have to do per-lane
 *  predicated execution (mask-and-mask) anyway — they're equivalent.
 *  But without if-conversion the *scalar* fallback would have a branch
 *  per element, slowing the non-vector path dramatically.
 */
void cond_inside_loop(int *a, int n) {
    for (int i = 0; i &lt; n; i++) {
        if (a[i] &gt; 0)
            a[i] = a[i] * 2;
        else
            a[i] = 0;
    }
}

</code></pre>` },
  { name: `46. Control Flow / Tail Call`, path: `05_control_flow/04_tail_call.c`, dir: `05_control_flow`, body: `<h1 id="04_tail_callc">04_tail_call.c</h1>
<pre><code class="language-c">/* 04_tail_call.c — TAIL CALL FROM THE CONTROL-FLOW SIDE
 * ============================================================================
 *
 *   Chapter 03's \`05_tail_call.c\` covers tail-call elimination as an
 *   interprocedural transform. Here we look at the *control-flow*
 *   consequence: \`call ... ; ret\` becomes \`jmp ...\`. The caller's
 *   stack frame is reclaimed before the callee runs.
 *
 *   In the CFG it shows up as: the function's exit-block contains a
 *   \`jmp\` instead of a \`call\`+\`ret\` pair, AND the Return Address Stack
 *   prediction is more accurate (one fewer push/pop).
 * ============================================================================
 */
extern int callee(int);

/*  caller_tail — textbook tail call.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      caller_tail:
 *          inc  edi                 ; x + 1 in argument register
 *          jmp  callee              ; TAILCALL: no frame, no ret
 */
int caller_tail(int x) {
    return callee(x + 1);
}

/*  sum_to — tail-recursive sum.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      sum_to:
 *          ; SCEV closed-form: acc + n*(n+1)/2  (no loop, no recursion)
 *          mov   eax, esi          ; acc
 *          test  edi, edi
 *          je    .ret
 *          add   eax, edi          ; + n
 *          lea   ecx, [rdi - 1]
 *          ; ... (closed-form arithmetic) ...
 *          ret
 *
 *  WHY: TCE first removes the recursion → loop. Then SCEV recognises
 *  the loop as \`Σi=1..n i = n(n+1)/2\` and substitutes the closed form.
 *  What started as a tail-recursive function with O(n) calls becomes
 *  O(1) machine code. TCE alone would have given a loop.
 */
int sum_to(int n, int acc) {
    if (n == 0) return acc;
    return sum_to(n - 1, acc + n);
}

/*  f / g — mutual recursion; TCE turns BOTH into a loop.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      f:
 *          xor  eax, eax
 *          test edi, edi
 *          jle  .ret_zero
 *          add  edi, 2             ; pre-bias for loop test
 *      .loop:                      ; SHARED loop body for both f and g
 *          cmp  edi, 3
 *          je   .ret_g_base
 *          add  edi, -2            ; x -= 2 each round-trip f→g→f
 *          cmp  edi, 3
 *          jge  .loop
 *      .ret_zero:
 *          ret
 *
 *  WHY: After tail-call elimination, both functions become loops over
 *  the same state. The compiler then notices the loops are isomorphic
 *  and emits a single shared loop. From two recursive functions to
 *  one tight loop with no calls — the recursion has been &quot;fused&quot;.
 */
int g(int);

int f(int x) {
    if (x &lt;= 0) return 0;
    return g(x - 1);
}

int g(int x) {
    if (x &lt;= 0) return 1;
    return f(x - 1);
}

</code></pre>` },
  { name: `47. Control Flow / Switch Lowering`, path: `05_control_flow/05_switch_lowering.c`, dir: `05_control_flow`, body: `<h1 id="05_switch_loweringc">05_switch_lowering.c</h1>
<pre><code class="language-c">/* 05_switch_lowering.c — SWITCH LOWERING STRATEGIES
 * ============================================================================
 *
 *   case-set shape                       lowered to
 *   ────────────────────────             ─────────────────────────
 *   dense contiguous (0..N)              jump table (one indirect jmp)
 *   sparse, few cases                    chain of cmp/je
 *   sparse, many cases                   binary search of compares
 *   constants → constants (1-1)          rodata lookup table
 *   bit-set membership (e.g. ASCII)      a 64-bit constant + \`bt\` test
 *
 * Pass names
 * ----------
 *   LLVM:  SwitchLowering in SelectionDAG; LowerSwitchPass for the LCG
 *          (older backends).
 *   GCC :  expand_switch.cc selects between jump table, decision tree,
 *          bit-test, and lookup.
 *
 * Knobs (LLVM)
 * ------------
 *   -mllvm -min-jump-table-entries=N      default 4 — below this, use compares
 *   -mllvm -switch-peel-threshold=P       PGO-guided likely-case extraction
 * ============================================================================
 */
extern int op0(int);
extern int op1(int);
extern int op2(int);
extern int op3(int);

/*  dense — 4 contiguous cases → JUMP TABLE.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      dense:
 *          cmp   edi, 3                  ; bounds check: op &gt; 3?
 *          ja    .default                ; yes → return -1
 *          mov   eax, edi
 *          lea   rcx, [rip + LJTI0_0]    ; address of jump table
 *          movsxd rax, dword ptr [rcx + 4*rax]   ; signed 32-bit offset
 *          add   rax, rcx                ; absolute target
 *          jmp   rax                     ; INDIRECT jump
 *      .case0:  mov edi, esi ; jmp op0  ; TAILCALL
 *      .case1:  mov edi, esi ; jmp op1
 *      .case2:  mov edi, esi ; jmp op2
 *      .case3:  mov edi, esi ; jmp op3
 *      .default: mov eax, -1 ; ret
 *
 *  LJTI0_0:
 *      .long .case0 - LJTI0_0
 *      .long .case1 - LJTI0_0
 *      .long .case2 - LJTI0_0
 *      .long .case3 - LJTI0_0
 *
 *  WHY: 4 contiguous cases → table is small (16 bytes), one indirect
 *  jump, branch-target-predictor handles it. Each case tail-calls its
 *  handler. Total per-case path: 4 cheap insns + 1 indirect jmp.
 *
 *  COMPARED TO IF/ELSE CHAIN: would be up to 4 sequential cmp/jcc, with
 *  3 mispredicts on cold paths.
 */
int dense(int op, int x) {
    switch (op) {
    case 0: return op0(x);
    case 1: return op1(x);
    case 2: return op2(x);
    case 3: return op3(x);
    default: return -1;
    }
}

/*  sparse — 5 cases spread over 1..999 → BINARY SEARCH of compares.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3, simplified):
 *      sparse:
 *          cmp  edi, 41                  ; midpoint compare
 *          jle  .lo_half                 ;   1 or 17 ?
 *          cmp  edi, 42                  ;
 *          je   .ret_33                  ;   == 42 → 33
 *          cmp  edi, 100                 ;
 *          je   .ret_44                  ;   == 100 → 44
 *          cmp  edi, 999
 *          je   .ret_55                  ;   == 999 → 55
 *          jmp  .default
 *      .lo_half:
 *          cmp  edi, 1   ; je .ret_11
 *          cmp  edi, 17  ; je .ret_22
 *          jmp  .default
 *
 *  WHY: A jump table would be 999 × 4 bytes = ~4 KB of mostly-default
 *  entries. The compiler prefers a binary decision tree: O(log K)
 *  compares, no memory load, predictable on hot paths.
 */
int sparse(int code) {
    switch (code) {
    case   1: return 11;
    case  17: return 22;
    case  42: return 33;
    case 100: return 44;
    case 999: return 55;
    default:  return  0;
    }
}

/*  constant_switch — every case returns a constant.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3): often a \`lea\` based on (x * 10 + 10) for x in 0..3 with
 *  bounds checking. Or a 4-entry rodata lookup table. The exact choice
 *  depends on whether the constants form an arithmetic progression
 *  (here yes: 10, 20, 30, 40 = 10*(x+1)).
 *
 *  Lookup-table form:
 *      table:  .long 10, 20, 30, 40
 *      constant_switch:
 *          cmp   edi, 3
 *          ja    .default
 *          mov   eax, [table + 4*edi]
 *          ret
 *      .default:
 *          mov   eax, -1
 *          ret
 *
 *  Arithmetic form (LLVM often picks this):
 *      constant_switch:
 *          cmp   edi, 3
 *          ja    .default
 *          lea   eax, [10*(rdi + 1)]     ; pseudo; really 10 + edi * 10
 *          ret
 */
int constant_switch(int x) {
    switch (x) {
    case 0: return 10;
    case 1: return 20;
    case 2: return 30;
    case 3: return 40;
    default: return -1;
    }
}

/*  is_punctuation — bit-set membership of ASCII characters.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3): the compiler often emits a 64-bit bitmask with one bit
 *  per relevant character, then a \`bt\`-style test:
 *      is_punctuation:
 *          ; bitmap = bits set at positions for {.,;:!?}
 *          mov  rax, 0x0080000A04000000   ; example mask
 *          cmp  edi, 63                   ; if c &gt; 63 → ret 0
 *          ja   .ret_0
 *          bt   rax, edi                  ; test bit c in rax
 *          setb al                        ; al = (bit set)
 *          movzx eax, al
 *          ret
 *
 *  Six compares replaced by one 64-bit constant + a single bit test.
 */
int is_punctuation(char c) {
    switch (c) {
    case '.': case ',': case ';':
    case ':': case '!': case '?':
        return 1;
    default:
        return 0;
    }
}

</code></pre>` },
  { name: `48. Control Flow / Block Placement`, path: `05_control_flow/06_block_placement.c`, dir: `05_control_flow`, body: `<h1 id="06_block_placementc">06_block_placement.c</h1>
<pre><code class="language-c">/* 06_block_placement.c — HOT / COLD CODE LAYOUT
 * ============================================================================
 *
 * Idea
 * ----
 *   The backend reorders basic blocks so the *hot* path is straight-line
 *   fall-through (no taken branches → no I-cache miss for the next BB).
 *
 *     BEFORE (source order)             AFTER (machine layout)
 *     ──────                            ─────
 *      if (rare)                          ; hot path lives here
 *          cold_path();                   if (!rare) goto hot;
 *      hot_path();                        cold_path();
 *                                         jmp end;
 *                                       hot:
 *                                         hot_path();
 *                                       end:
 *
 *   Source ordering does NOT determine machine ordering: the backend
 *   uses branch-probability estimates (\`__builtin_expect\`, PGO data,
 *   attribute hints) to pick the layout.
 *
 * Pass names
 * ----------
 *   LLVM: MachineBlockPlacement.
 *   GCC : bb-reorder.cc (-freorder-blocks).
 *
 * Knobs
 * -----
 *   __builtin_expect(x, EXPECTED)        per-branch
 *   __attribute__((cold))                whole function rarely called
 *   __attribute__((hot))                  whole function often called
 *   PGO via -fprofile-generate / -fprofile-use
 * ============================================================================
 */
extern void hot_path(int);
extern void cold_path(int);

/*  hint_with_builtin — &quot;rare&quot; branch goes off the fall-through path.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      hint_with_builtin:
 *          cmp  edi, 57005           ; 0xDEAD = 57005
 *          jne  hot_path             ; TAILCALL on the COMMON (predicted) case
 *          push rbx
 *          mov  ebx, edi             ; preserve x across cold_path()
 *          mov  edi, 57005
 *          call cold_path
 *          mov  edi, ebx
 *          pop  rbx
 *          jmp  hot_path             ; TAILCALL after cold work
 *
 *  WHAT TO NOTICE:
 *    1. The COMMON case (\`!= 0xDEAD\`) is a single \`cmp + jne\` → no
 *       taken branch (the predicted prediction is &quot;not taken&quot; for jne
 *       when the hint says the equality is unlikely).
 *    2. The RARE case is laid out off the fall-through; reaching it
 *       requires a TAKEN branch.
 *
 *  WHY: __builtin_expect(cond, 0) hints &quot;cond is unlikely&quot;. The
 *  branch-probability annotator assigns 1/2000 weight to the true edge.
 *  MachineBlockPlacement then orders blocks so the FALSE arm (hot) is
 *  fall-through. Modern branch predictors do well with static hints on
 *  cold paths.
 */
void hint_with_builtin(int x) {
    if (__builtin_expect(x == 0xDEAD, 0))
        cold_path(x);
    hot_path(x);
}

/*  hint_with_attribute — branch hint via __builtin_expect, MIRRORED.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      hint_with_attribute:
 *          cmp  edi, 48879           ; 0xBEEF
 *          jne  cold_path            ; TAILCALL on the UNLIKELY case
 *          mov  edi, 48879
 *          jmp  hot_path             ; TAILCALL on the LIKELY case
 *
 *  Symmetric to the previous example, but here the equality is the
 *  likely path → fall-through is the LIKELY branch.
 */
void hint_with_attribute(int x) {
    if (__builtin_expect(x == 0xBEEF, 1)) {
        hot_path(x);
    } else {
        cold_path(x);
    }
}

/*  error_handler — \`cold\` attribute: entire function placed in cold section.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      error_handler:
 *          jmp  cold_path            ; tail-call to cold helper
 *
 *  WHY: \`cold\` attribute does THREE things:
 *    1. Places the function in \`.text.unlikely.error_handler\` (a
 *       separate, cold I-cache region).
 *    2. Tells the inliner to never inline this function INTO hot code.
 *    3. Tells the register allocator to prefer callee-saved registers
 *       (no need to optimize for fast call/return when calls are rare).
 */
__attribute__((cold)) void error_handler(int code) {
    cold_path(code);
}

/*  mainloop — \`hot\` attribute: kept small and contiguous in the hot section.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      mainloop:
 *          jmp  hot_path
 *
 *  WHY: \`hot\` inverts the cold heuristics. The function is placed in
 *  the hot section (.text.hot.mainloop), the inliner is encouraged to
 *  inline INTO it (treating it as a frequently-executed callee), and
 *  the allocator prefers caller-saved scratch (cheaper calls).
 */
__attribute__((hot)) void mainloop(int x) {
    hot_path(x);
}

</code></pre>` },
  { name: `49. Control Flow / Loop Rotation`, path: `05_control_flow/07_loop_rotation.c`, dir: `05_control_flow`, body: `<h1 id="07_loop_rotationc">07_loop_rotation.c</h1>
<pre><code class="language-c">/* 07_loop_rotation.c — LOOP ROTATION
 * ============================================================================
 *
 * Idea
 * ----
 *   Rotate \`while (cond) { body; }\` into \`if (cond) do { body; } while (cond);\`.
 *
 *   BEFORE (while-form; test-at-top)         AFTER (do-while + guard)
 *   ─────────────────────────────────       ─────────────────────────
 *   header:                                  if (!cond) goto exit;
 *      if (!cond) goto exit                  do {
 *      body                                      body
 *      goto header                           } while (cond);
 *   exit:                                    exit:
 *
 * Benefits
 * --------
 *   – ONE branch per iteration instead of two (loop body falls through
 *     to the comparison and conditionally jumps back).
 *   – Canonical CFG shape required by LICM, IVOPT, LoopVectorize, etc.
 *   – Better branch prediction on the back-edge: a &quot;taken&quot; branch
 *     to the loop start every iteration, &quot;not-taken&quot; only once on exit.
 *
 * Pass names
 * ----------
 *   LLVM:  LoopRotatePass.
 *   GCC :  -ftree-loop-rotate (default at -O3).
 * ============================================================================
 */

/*  rotateable — straight while-loop; rotated then vectorized.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      rotateable:
 *          test esi, esi
 *          jle  .exit                ; GUARD: if n &lt;= 0 → skip entire loop
 *          mov  edx, esi
 *          mov  eax, edx
 *          and  eax, 3               ; tail = n % 4
 *          cmp  esi, 4
 *          jae  .vec_main            ; n &gt;= 4 → use unrolled main
 *          xor  ecx, ecx
 *          jmp  .scalar_tail
 *      .vec_main:                    ; 4-way UNROLLED loop body
 *          and  edx, ~3
 *          xor  ecx, ecx
 *      .vec_body:
 *          mov  esi, ecx
 *          imul esi, ecx             ; (i)^2
 *          mov  [rdi + 4*rcx], esi
 *          lea  esi, [rcx + 1]
 *          imul esi, esi             ; (i+1)^2
 *          mov  [rdi + 4*rcx + 4], esi
 *          lea  esi, [rcx + 2]
 *          imul esi, esi             ; (i+2)^2
 *          mov  [rdi + 4*rcx + 8], esi
 *          lea  esi, [rcx + 3]
 *          imul esi, esi             ; (i+3)^2
 *          mov  [rdi + 4*rcx + 12], esi
 *          add  rcx, 4
 *          cmp  rdx, rcx
 *          jne  .vec_body
 *          ; ... scalar tail for n % 4 ...
 *      .exit:
 *          ret
 *
 *  THE ROTATION IS VISIBLE: the GUARD \`test esi, esi ; jle .exit\` is
 *  the if at the top, and the loop body falls through to \`jne .vec_body\`
 *  at the bottom — back-edge as a conditional jump backwards. ONE
 *  comparison per iteration instead of the test-at-top while-loop's
 *  two.
 *
 *  Without rotation the vectorizer would refuse to unroll (it needs the
 *  do-while shape) and we'd get a plain scalar loop.
 */
void rotateable(int *a, int n) {
    int i = 0;
    while (i &lt; n) {
        a[i] = i * i;
        i++;
    }
}

</code></pre>` },
  { name: `50. Control Flow / Branch Folding`, path: `05_control_flow/08_branch_folding.c`, dir: `05_control_flow`, body: `<h1 id="08_branch_foldingc">08_branch_folding.c</h1>
<pre><code class="language-c">/* 08_branch_folding.c — COMMON TAIL FOLDING (cross-jumping)
 * ============================================================================
 *
 * Idea
 * ----
 *   Two CFG paths that end with IDENTICAL machine code can share that
 *   tail: each path's last few instructions are deleted, and a jump
 *   to the common tail is inserted instead. The savings are code size
 *   (tail emitted once) and often better instruction-cache behaviour.
 *
 *   BEFORE                           AFTER FOLDING
 *   ──────                           ─────────────
 *   if (cond) {                       if (cond) v = a;
 *       v = a;                        else      v = b;
 *       cleanup();                    cleanup();
 *       return v;                     return v;
 *   } else {
 *       v = b;
 *       cleanup();
 *       return v;
 *   }
 *
 * Pass names
 * ----------
 *   LLVM:  BranchFoldingPass (machine-IR), SimplifyCFG (LLVM IR).
 *   GCC :  cross-jumping in cfgcleanup.cc.
 * ============================================================================
 */
extern void cleanup(void);

/*  fold_me — both arms end with \`cleanup(); return v;\` → folded.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      fold_me:
 *          push  rbp
 *          push  r14
 *          push  rbx
 *          mov   ebx, edx               ; save b
 *          mov   ebp, esi               ; save a
 *          mov   r14d, edi              ; save cond
 *          call  cleanup                 ; ONE call to cleanup
 *          test  r14d, r14d
 *          cmove ebp, ebx               ; if cond == 0 → eax = b
 *          mov   eax, ebp
 *          pop   rbx
 *          pop   r14
 *          pop   rbp
 *          ret                          ; ONE epilogue
 *
 *  WHAT WE'D EXPECT WITHOUT FOLDING:
 *      fold_me:
 *          ; ... save callee-saveds, etc ...
 *          test  edi, edi
 *          je    .else
 *          ; THEN arm:
 *          call  cleanup
 *          mov   eax, esi               ; return a
 *          ; ... pop and ret ...
 *      .else:
 *          ; ELSE arm:
 *          call  cleanup
 *          mov   eax, edx               ; return b
 *          ; ... pop and ret (DUPLICATED) ...
 *
 *  WHY: The two arms have identical tails (\`call cleanup ; ret\`). The
 *  branch-folder hoists the \`cleanup()\` ABOVE the branch, then
 *  collapses the if/else (which now only chooses between two values)
 *  into a CMOV. From two call+ret pairs to ONE call + ONE branchless
 *  pick + ONE ret.
 *
 *  Note the order of operations: callee-saved registers must be saved
 *  BEFORE the call (cleanup() may clobber caller-saveds), so a, b, cond
 *  end up in RBP, RBX, R14. After cleanup() returns, the CMOV picks
 *  the result based on cond, and a single epilogue restores them.
 */
int fold_me(int cond, int a, int b) {
    int v;
    if (cond) {
        v = a;
        cleanup();
        return v;
    } else {
        v = b;
        cleanup();
        return v;
    }
}

</code></pre>` },

backend has the smallest, fastest, and most predictable control flow
possible. They almost always run <em>together with</em> SimplifyCFG to clean up
trivial edges.</p>

<h2 id="why-control-flow-matters">Why control-flow matters</h2>
<pre><code>   Modern OoO core:
   ┌────────────────────────────────────────┐
   │ branch predictor                       │
   │   ↓ predicted target                   │
   │ fetch / decode (16 bytes/cycle)        │
   │   ↓ µops                               │
   │ rename / dispatch                      │
   │   ↓                                    │
   │ schedule / execute                     │
   │   ↓                                    │
   │ retire                                 │
   └────────────────────────────────────────┘

   A mispredict costs ~15-20 cycles. Inserting a branch where a
   conditional-move (\`cmov\`) would do is one of the most common
   sources of &quot;obvious-in-retrospect&quot; speedups.
</code></pre>
<h2 id="01--jump-threading">01 · Jump threading</h2>
<blockquote>
<p>&ldquo;If the <em>condition</em> of a branch is determined by a chain we&rsquo;ve already
seen, redirect the edge directly to the eventual target.&rdquo;</p>
</blockquote>
<pre><code>   BEFORE                            AFTER
   ──────                            ──────
       B1: if (x&gt;10) goto B2          B1: if (x&gt;10) goto B4   ← thread
                     else goto B3                else goto B5
       B2: t = 1                      (B2 still exists for any
       B3: t = 0                       other entries; or it is
       B4: if (t)  goto B5             also removed if no one else
              else goto B6             reaches it.)
       B5: A
       B6: B
</code></pre>
<p>After jump threading, the second branch evaporates because <em>along the path</em>
B1→B2→B4 the value of <code>t</code> is <em>known</em> to be 1.</p>
<p>LLVM pass: <code>JumpThreadingPass</code>. GCC pass: <code>tree-ssa-threadedge.cc</code>.</p>
<h2 id="02--simplifycfg">02 · SimplifyCFG</h2>
<p>A grab-bag of CFG clean-ups:</p>
<ul>
<li>Remove empty BBs (just an unconditional branch).</li>
<li>Merge a BB into its single predecessor.</li>
<li>Hoist common code from two arms of an <code>if</code> into the join.</li>
<li>Sink common tail code.</li>
<li>Convert <code>if-x return a; else return b</code> into <code>return select(x, a, b)</code>.</li>
<li>Collapse trivial switches into branches.</li>
</ul>
<pre><code>   B1: br cond, B2, B3
   B2: x = 1; br B4
   B3: x = 2; br B4
   B4: use x

                 ▼ SimplifyCFG: select

   B1: x = select(cond, 1, 2); use x
</code></pre>
<p>LLVM: <code>SimplifyCFGPass</code>. GCC: <code>cleanup_cfg</code> (called repeatedly).</p>
<h2 id="03--if-conversion">03 · If-conversion</h2>
<p>Replace a small <code>if-then-else</code> with a <em>predicated</em> / <em>select</em> / <em>cmov</em>
sequence, removing the branch entirely.</p>
<pre><code>   BEFORE                                  AFTER (cmov-style)
   ──────                                  ──────────────────
   if (a &gt; b) r = x;                       cmp a, b
   else       r = y;                       mov r, y
                                           cmovg r, x
</code></pre>
<p>When it helps:</p>
<ul>
<li>The branch is hard to predict (data-dependent, near 50/50).</li>
<li>Both arms are short and inexpensive to <em>speculatively</em> execute.</li>
</ul>
<p>When it <em>hurts</em>:</p>
<ul>
<li>The branch is predictable (e.g. always taken) — <code>cmov</code> forces both
  computations.</li>
<li>One side is much more expensive than the other.</li>
</ul>
<p>LLVM passes: <code>SelectOptimize</code>, <code>EarlyIfConversion</code> (in the backend), and
the SimplifyCFG fold mentioned above.</p>
<h3 id="vectorized-if-conversion">Vectorized if-conversion</h3>
<p>Loops with conditional bodies get vectorized via <strong>masking</strong>:</p>
<pre><code class="language-c">for (i=0;i&lt;n;i++)
    if (a[i] &gt; 0) b[i] = a[i] * 2;
</code></pre>
<p>becomes (conceptually):</p>
<pre><code>   v = load a[i:i+8]
   m = v &gt; 0           ; mask register
   r = v * 2
   masked-store b[i:i+8] under mask m
</code></pre>
<p>See chapter 08.</p>
<h2 id="04--tail-call-elimination-control-flow-viewpoint">04 · Tail-call elimination (control-flow viewpoint)</h2>
<p>Already discussed in chapter 03 from the <em>interprocedural</em> angle. From the
CFG angle, the transformation replaces</p>
<pre><code>   ... ; call f ; ret
</code></pre>
<p>with</p>
<pre><code>   ... ; jmp f
</code></pre>
<p>— a single back-edge into another function&rsquo;s entry. The caller&rsquo;s frame is
reused.</p>
<h2 id="05--switch-lowering">05 · Switch lowering</h2>
<p>A <code>switch (x) { case 0: …; case 1: …; … }</code> is lowered by the backend into
one of several shapes depending on the case density and target ISA:</p>
<pre><code>   Dense (small, contiguous keys):           Sparse (few, scattered keys):
   ┌──────────────────┐                       ┌──────────────────┐
   │ jump table       │                       │ binary search    │
   │  jmp [base+x*8]  │                       │  cmp x, mid      │
   └──────────────────┘                       │  jl  lower       │
                                              │  jg  upper       │
                                              │  ...             │
                                              └──────────────────┘
</code></pre>
<p>Other shapes:</p>
<ul>
<li><strong>Range tests</strong> (bit-test): for case sets like {3, 7, 9, 12} the backend
  may emit <code>bt mask, x ; jc target</code>.</li>
<li><strong><code>switch</code> → arithmetic</strong>: for a switch that returns one of a few constants,
  the backend can compute the result without branching at all
  (<code>return arr[x]</code> or <code>return (x==0)*3 + (x==1)*7 + …</code>).</li>
</ul>
<p>LLVM: <code>SwitchInstr</code> lowering in <code>CodeGen</code>. GCC: <code>tree-switch-conversion</code>.</p>
<h2 id="06--block-placement">06 · Block placement</h2>
<p>The backend reorders basic blocks so that the <strong>most-likely path</strong> is
straight-line, with the <em>unlikely</em> (cold) blocks pushed to the bottom of
the function. This:</p>
<ul>
<li>Reduces taken branches → fewer mispredicts.</li>
<li>Improves I-cache (hot blocks contiguous).</li>
</ul>
<pre><code>   BEFORE                                  AFTER PLACEMENT
   ──────                                  ───────────────
   B1:           (taken 99%)                B1:
        if cold goto B2                       if !cold goto B3
        ...                                   ; B2 inlined immediately after
   B2: &lt;cold&gt;                                 ; ...
   B3: ...                                   B3: ...
                                              ...
                                              cold: ...
                                              jmp B3
</code></pre>
<p>The <code>__builtin_expect(x, 0)</code> / <code>[[unlikely]]</code> annotation feeds the
heuristic. Profile data (PGO/AutoFDO) is even better.</p>
<p>LLVM: <code>MachineBlockPlacementPass</code>. GCC: <code>bb-reorder.cc</code>.</p>
<h2 id="07--loop-rotation">07 · Loop rotation</h2>
<p>Convert a <em>while-loop</em> (test at top) into a <em>do-while-loop</em> (test at
bottom) plus a <em>guard</em>:</p>
<pre><code>   BEFORE (while)                            AFTER (do-while + guard)
   ──────────────                            ────────────────────────
       header:                                if (!cond) goto exit
       if !cond goto exit                     loop:
         body                                   body
         goto header                            if cond goto loop
       exit:                                   exit:
</code></pre>
<p>This eliminates one branch per iteration and creates the canonical
<em>pre-header / header / latch / exit</em> shape required by the vectorizer and
LICM.</p>
<p>LLVM: <code>LoopRotatePass</code>. GCC happens implicitly through cfgcleanup.</p>
<h2 id="08--branch-folding--cross-jumping">08 · Branch folding / cross-jumping</h2>
<p>If two BBs end with identical sequences, the backend can fold them, so
both predecessors branch to the same shared epilogue.</p>
<pre><code>   BEFORE                                  AFTER
   ──────                                  ─────
   B1: ... ; jmp epi1                       B1: ... ; jmp shared
   B2: ... ; jmp epi2                       B2: ... ; jmp shared
   epi1: store rax; pop rbp; ret            shared: store rax; pop rbp; ret
   epi2: store rax; pop rbp; ret
</code></pre>
<p>LLVM: <code>BranchFolding</code>. GCC: in cfgcleanup.</p>

<pre><code class="language-c">/* 01_mem2reg.c — PROMOTE ALLOCAS TO SSA REGISTERS
 * ============================================================================
 *
 * The single most important pass in the LLVM mid-end.
 *
 * Without mem2reg
 * ---------------
 *   The front-end emits every local as a *stack slot* (\`alloca\`). All
 *   reads are \`load\`, all writes are \`store\`. The IR looks like assembly
 *   already; no SSA names exist except the pointers and loaded values.
 *
 *     %x_addr = alloca i32
 *     store i32 0,    i32* %x_addr
 *     ...
 *     %v = load i32, i32* %x_addr
 *     store i32 %v_new, i32* %x_addr
 *
 *   Optimizations like CSE and InstCombine can do almost nothing here:
 *   they can't see across loads and stores without a precise memory
 *   model.
 *
 * With mem2reg
 * ------------
 *   PromoteMemoryToRegister identifies allocas that NEVER have their
 *   address taken (never passed by pointer, never escape) and:
 *     1. Deletes the alloca and its loads/stores.
 *     2. Replaces every load with the value the load would observe.
 *     3. Inserts φ-nodes at CFG merges where multiple stores reach.
 *
 *   Now everything is SSA and the rest of the optimizer can do its job.
 *
 * Pass names
 * ----------
 *   LLVM:  PromoteMemoryToRegisterPass (mem2reg).
 *   GCC :  pass_lower_vector → pass_build_ssa.
 *
 * What blocks promotion
 * ---------------------
 *   – \`&amp;local\` taken (address escapes to a function or another pointer).
 *   – Address used in a \`getelementptr\` and stored away.
 *   – Atomic / volatile loads/stores on the slot.
 * ============================================================================
 */
extern void take_addr(int *p);

/*  promote_me — local \`x\` never escapes → fully promoted to SSA.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      promote_me:
 *          mov   eax, esi           ; eax = a    (default)
 *          test  edi, edi           ; cond ?
 *          cmovne eax, edx          ; if cond → eax = b
 *          ret
 *
 *  WHY: After mem2reg the IR is:
 *      define i32 @promote_me(i1 %cond, i32 %a, i32 %b) {
 *          %x = select i1 %cond, i32 %b, i32 %a
 *          ret i32 %x
 *      }
 *  No alloca, no stack slot. The select lowers to a CMOV: a → eax by
 *  default, b on the true-branch.
 *
 *  WITHOUT mem2reg: 4 stack reads/writes per branch, no folding, ugly.
 */
int promote_me(int cond, int a, int b) {
    int x = a;
    if (cond) x = b;
    return x;
}

/*  does_not_promote — \`&amp;x\` ESCAPES via take_addr → must remain in memory.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      does_not_promote:
 *          push  rax                    ; align stack + 8 bytes scratch
 *          inc   edi                    ; x = i + 1
 *          mov   dword ptr [rsp + 4], edi   ; STORE to stack slot
 *          lea   rdi, [rsp + 4]              ; address of x → first arg
 *          call  take_addr                   ; pass &amp;x
 *          mov   eax, dword ptr [rsp + 4]   ; RELOAD x (may have been written)
 *          pop   rcx
 *          ret
 *
 *  WHY: The compiler can't prove that \`take_addr\` doesn't modify *p.
 *  The slot must be addressable; mem2reg refuses to promote it. Two
 *  memory ops per call to take_addr survive.
 *
 *  HOW TO AVOID: if you only need to PASS the value (not let the callee
 *  modify it), take it by value or by \`const int *\`. With LTO and a
 *  visible \`take_addr\` body that doesn't write, the compiler could
 *  promote — but defensively it doesn't.
 */
int does_not_promote(int i) {
    int x = i + 1;
    take_addr(&amp;x);
    return x;
}

</code></pre>` },
