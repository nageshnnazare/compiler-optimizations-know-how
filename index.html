<p>The same reference treatment for the LLVM/Clang side.</p>
<h2 id="1-the-pipeline">1. The pipeline</h2>
<pre><code>   source.{c,cpp}
        │
        ▼  Clang front-end (AST, sema)
   LLVM IR (text .ll  /  bitcode .bc)
        │
        ▼  opt (mid-end pass manager)
   LLVM IR (optimized)
        │
        ▼  llc (backend)
        │      ─ ISel (SelectionDAG / GlobalISel)
        │      ─ machine IR (MIR)
        │      ─ register allocator (Greedy or Fast)
        │      ─ scheduler
        │      ─ asm printer
        ▼
   object file
</code></pre>
<p>Every textbook LLVM pipeline is also pieceable on the command line:</p>
<pre><code class="language-bash"># 1. Front-end only: produce IR.
clang -S -emit-llvm -O0 -Xclang -disable-O0-optnone file.c -o file.ll

# 2. Mid-end only: run optimizations on IR.
opt -O3 file.ll -S -o file.O3.ll

# 3. Backend only: IR → asm.
llc -O3 file.O3.ll -o file.s
</code></pre>
<h2 id="2-the-opt-tool">2. The opt tool</h2>
<pre><code class="language-bash">opt --help                 # human-readable list of all passes
opt -print-passes          # pipeline strings: e.g. &quot;default&lt;O3&gt;&quot;
opt -p='function(simplifycfg)' file.ll -S         # run a single pass
opt -p='default&lt;O3&gt;' file.ll -S                   # the full -O3 pipeline
opt -p='function(loop(loop-rotate,licm))' …       # nested pipeline syntax
opt -print-after-all  file.ll -S 1&gt;/dev/null      # IR after every pass
opt -print-after=licm file.ll -S 1&gt;/dev/null      # IR after LICM only
opt -debug-pass-manager file.ll -S 1&gt;/dev/null    # which passes ran in order
</code></pre>
<h2 id="3-the-clang-side-of-the-same-knobs">3. The Clang side of the same knobs</h2>
<pre><code class="language-bash">clang -O3 -mllvm -print-after-all  -c file.c -o /dev/null
clang -O3 -mllvm -debug-pass-manager -c file.c -o /dev/null
clang -O3 -Rpass=loop-vectorize     -c file.c -o /dev/null    # what fired
clang -O3 -Rpass-missed=loop-vectorize \\
          -Rpass-analysis=loop-vectorize ...                  # what didn't, and why
clang -O3 -fsave-optimization-record -c file.c -o /dev/null   # YAML opt remarks
</code></pre>
<p>The YAML remarks pair nicely with
<a href="https://github.com/llvm/llvm-project/tree/main/llvm/tools/opt-viewer">opt-viewer</a>
which produces an HTML annotated source listing.</p>
<h2 id="4-the-new-pass-manager">4. The (new) pass manager</h2>
<p>LLVM 13+ defaults to the <em>new</em> pass manager (<code>-fexperimental-new-pass-manager</code>
is no longer needed). The pipeline is a <em>string</em>:</p>
<pre><code>default&lt;O3&gt;
  module(annotation2metadata,
         forceattrs,
         inferattrs,
         coro-early,
         function&lt;eager-inv&gt;(lower-expect, simplifycfg, sroa, early-cse),
         ipsccp,
         called-value-propagation,
         globalopt,
         function&lt;eager-inv&gt;(mem2reg, instcombine,
                              loop(loop-rotate, licm),
                              vectorize, instcombine, simplifycfg),
         ... )
</code></pre>
<p>You can supply your own pipeline:</p>
<pre><code class="language-bash">opt -p='module(inline,function(sroa,early-cse,licm))' file.ll -S
</code></pre>
<p>Or attach it to Clang:</p>
<pre><code class="language-bash">clang -O0 -mllvm -passes='function(sroa,licm)' -c file.c -o /dev/null
</code></pre>
<h2 id="5-function--parameter-attributes">5. Function &amp; parameter attributes</h2>
<p>(See chapter 10 for a longer table.)</p>
<pre><code>function:   nounwind   readnone   readonly   willreturn   mustprogress
            norecurse  noreturn   cold       hot          alwaysinline
            optnone    speculatable

parameter:  noalias    nocapture  nonnull    dereferenceable(N)
            readonly   writeonly  returned   align(N)
</code></pre>
<p>Examples in C with <code>__attribute__</code>:</p>
<pre><code class="language-c">__attribute__((const))     int strlen_like(const char *);     // readnone-ish
__attribute__((pure))      int hashfn(const char *);          // readonly
__attribute__((malloc))    void *xmalloc(unsigned);           // ret noalias
__attribute__((nonnull))   int  use(const void *p);           // p nonnull
</code></pre>
<p>LLVM-specific attribute spellings (less common in user code):</p>
<pre><code class="language-c">__attribute__((annotate(&quot;noalias&quot;)))
__attribute__((noescape))     /* parameter cannot escape */
__attribute__((preserve_most))  /* ABI: caller-saves most regs */
__attribute__((preserve_all))   /* ABI: caller-saves ALL regs */
</code></pre>
<h2 id="6-builtins-worth-knowing-clangllvm">6. Builtins worth knowing (Clang/LLVM)</h2>
<pre><code class="language-c">__builtin_expect(x, 0)
__builtin_expect_with_probability(x, 0, 0.01)
__builtin_unreachable()
__builtin_assume(cond)                  /* same as if (!cond) __builtin_unreachable() */
__builtin_assume_aligned(p, 64)
__builtin_constant_p(x)
__builtin_object_size(p, type)
__builtin_prefetch(p, rw, locality)
__builtin_offsetof(T, member)
__builtin_clz / ctz / popcount / parity (and ll versions)
__builtin_bswap{16,32,64}
__builtin_add_overflow / mul_overflow / sub_overflow
__builtin_dynamic_object_size(p, type)  /* for hardened libc */
__builtin_LINE() / __builtin_FILE() / __builtin_FUNCTION()
</code></pre>
<p><code>__builtin_assume(x &gt; 0)</code> is the dual of <code>__builtin_unreachable()</code>. The
compiler uses it for VRP, then drops the assumption.</p>
<h2 id="7-debugging-missed-optimizations">7. Debugging missed optimizations</h2>
<p>Recipe:</p>
<ol>
<li>Reproduce on the simplest possible C file.</li>
<li>Dump IR at -O0 and -O3:
   <code>bash
   clang -O0 -Xclang -disable-O0-optnone -S -emit-llvm file.c -o file.O0.ll
   opt -O3 file.O0.ll -S -o file.O3.ll
   diff -u file.O0.ll file.O3.ll</code></li>
<li>Find which pass <em>should</em> have fired:
   <code>bash
   opt -O3 -debug-pass-manager file.O0.ll -S -o /dev/null 2&gt;&amp;1 | less</code></li>
<li>Run just that pass and confirm it didn&rsquo;t fire:
   <code>bash
   opt -p='function(licm)' file.O0.ll -S</code></li>
<li>Often the answer is an attribute the front-end could have emitted but
   didn&rsquo;t (<code>restrict</code> → <code>noalias</code>, <code>__attribute__((pure))</code> → <code>readonly</code>).</li>
</ol>
<h2 id="8-reading-llvm-ir-fluently">8. Reading LLVM IR fluently</h2>
<pre><code class="language-llvm">; Function attributes
define dso_local noundef i32 @add(i32 noundef %a, i32 noundef %b) #0 {
entry:
  %r = add nsw i32 %a, %b           ; nsw = no signed wrap
  ret i32 %r
}

attributes #0 = { mustprogress nofree norecurse nosync nounwind
                  willreturn memory(none) uwtable }
</code></pre>
<p>Tags to recognize:</p>
<ul>
<li><code>nsw</code> / <code>nuw</code>  — no signed / unsigned wrap (UB on overflow → enables
  reassoc &amp; strength-reduce).</li>
<li><code>inbounds</code>     — on <code>getelementptr</code>; the pointer arithmetic stays within
  an allocated object.</li>
<li><code>align N</code>      — operand alignment.</li>
<li><code>!tbaa !N</code>     — Type-Based Alias Analysis metadata.</li>
<li><code>!noalias</code>     — region-scoped noalias (vector-vectorizer memcheck).</li>
<li><code>tail</code>         — on <code>call</code>; allowed to TCE.</li>
</ul>

  { name: `88. Practical`, path: `13_practical/README.md`, dir: `13_practical`, body: `<h1 id="13--practical-workflow--pitfalls">13 — Practical Workflow &amp; Pitfalls</h1>
<p>The previous chapters told you what the optimizer does. This chapter tells
you how to <strong>work with it day-to-day</strong> — how to inspect, measure, and avoid
the booby-traps.</p>
<h2 id="1-the-5-step-optimization-recipe">1. The 5-step optimization recipe</h2>
<pre><code>   1. MEASURE   – never optimize without a profile.
                  perf, Instruments, VTune, samply, AMD uProf.

   2. ATTRIBUTE – which function/loop is hot?
                  cycles, branch misses, cache misses, port utilization.

   3. INSPECT   – read the generated asm AND the IR.
                  godbolt.org, clang -S, opt -S, gcc -S, objdump.

   4. CHANGE    – source code, attributes, flags, algorithm.
                  Don't change the compiler invocation without rebuilding from clean.

   5. RE-MEASURE – confirm the change actually helped.
                   Beware regression in OTHER benchmarks.
</code></pre>
<h2 id="2-reading-assembly-a-quick-primer">2. Reading assembly: a quick primer</h2>
<pre><code class="language-bash"># Quickest &quot;what does this compile to?&quot;
clang -O3 -S -fverbose-asm file.c -o -
gcc   -O3 -S -fverbose-asm file.c -o -

# Intel syntax (easier than AT&amp;T)
clang -O3 -S -masm=intel file.c -o -

# Compiler Explorer locally
# https://github.com/compiler-explorer/compiler-explorer
docker run --rm -p 10240:10240 godboltprivate/compiler-explorer:latest
</code></pre>
<p>For studying single functions, prefer the <strong>godbolt.org</strong> workflow: split
view, side-by-side compiler comparison, color-mapped source-to-asm lines.</p>
<h3 id="reading-checklist">Reading checklist</h3>
<pre><code>   1. How many instructions per loop iteration?
   2. Are loads/stores aligned (movdqa vs movdqu, ldr vs ldur)?
   3. Are they vectorized (xmm/ymm/zmm registers, v0..v31 on arm64)?
   4. How many branches? Where do they go?
   5. Are calls present that shouldn't be?
   6. Spills? (loads/stores to [rsp+N], sp+N).
   7. Multiplies &amp; divides where shifts would do?
</code></pre>
<h2 id="3-the-benchmarking-hygiene-checklist">3. The benchmarking hygiene checklist</h2>
<pre><code>   ✓ Pin to a single CPU (Linux: \`taskset -c 2 ./bench\`).
   ✓ Disable Turbo (or fix the frequency).
   ✓ Disable HT-sibling noise (avoid that pair's other thread).
   ✓ Pre-warm the cache once.
   ✓ Use a clock with known overhead (clock_gettime(CLOCK_MONOTONIC_RAW)).
   ✓ Run for *enough* iterations that timer noise &lt; 1%.
   ✓ Report MIN, MEDIAN, and STDDEV (not just one number).
   ✓ Repeat across boots if you care about cache layout effects.
</code></pre>
<p>A common gotcha:</p>
<pre><code class="language-c">volatile int sink;
for (int i = 0; i &lt; N; i++) sink = f(i);   /* prevents DCE of f */
</code></pre>
<p>vs.</p>
<pre><code class="language-c">__attribute__((noinline)) int probe(int x) { return f(x); }
</code></pre>
<p>The <code>volatile sink</code> trick is what Google Benchmark and Catch2 use under
the hood (<code>benchmark::DoNotOptimize</code>).</p>
<h2 id="4-pitfalls--the-top-12-in-production-code">4. Pitfalls — the top 12 in production code</h2>
<h3 id="1-implicit-memory-loads-through-aliasing-pointers">(1) Implicit memory loads through aliasing pointers</h3>
<pre><code class="language-c">void f(int *a, int *b, int n) {
    for (int i = 0; i &lt; n; i++) a[i] = b[0] + i;
}
</code></pre>
<p>Without <code>restrict</code> the compiler reloads <code>b[0]</code> each iteration. Fix with
<code>restrict</code> or hand-hoist:</p>
<pre><code class="language-c">void f(int * restrict a, const int * restrict b, int n) { ... }
</code></pre>
<h3 id="2-volatile-in-hot-loops">(2) Volatile in hot loops</h3>
<pre><code class="language-c">volatile int counter;
for (int i = 0; i &lt; N; i++) counter += do_thing(i);
</code></pre>
<p><code>volatile</code> forces every read and write — no CSE, no LICM, no vectorization.
Only use it for memory-mapped IO and signal handlers.</p>
<h3 id="3-wrong-type-punning">(3) Wrong type-punning</h3>
<pre><code class="language-c">float f = *(float *)&amp;my_int;   /* UB by strict aliasing; may miscompile */
</code></pre>
<p>Use:</p>
<pre><code class="language-c">float f;
memcpy(&amp;f, &amp;my_int, sizeof f);
</code></pre>
<h3 id="4-indirect-calls-without-devirtualization">(4) Indirect calls without devirtualization</h3>
<p>A struct of function pointers initialized at run-time means every call
through it is a load + indirect branch. If the value is <em>known at
compile time</em>, mark it <code>static const</code> or use templates / <code>if constexpr</code>.</p>
<h3 id="5-int-index-variables-for-large-arrays">(5) <code>int</code> index variables for large arrays</h3>
<p>On x86-64, an <code>int</code> index gets sign-extended on every memory access, which
the optimizer occasionally cannot prove away. Use <code>size_t</code> (or
<code>ptrdiff_t</code>) for indices.</p>
<h3 id="6-reading-the-ir-at--o0-and-concluding-the-compiler-is-dumb">(6) Reading the IR at -O0 and concluding &ldquo;the compiler is dumb&rdquo;</h3>
<p>Always look at <code>-O2</code>/<code>-O3</code> output. -O0 keeps every alloca and every
variable in memory so it can be debugged.</p>
<h3 id="7-building-with--o3--ffast-math-in-shared-libraries">(7) Building with <code>-O3 -ffast-math</code> in shared libraries</h3>
<p><code>-ffast-math</code> sets a process-wide MXCSR/FPCR mode flag in some libc
startup. If your DSO is loaded into a process that needs IEEE conformance
(numpy, OpenBLAS), bad things happen. Prefer per-function
<code>#pragma GCC optimize("fast-math")</code> if you only need it in your code.</p>
<h3 id="8-__attribute__always_inline-on-huge-functions">(8) <code>__attribute__((always_inline))</code> on huge functions</h3>
<p>You force inlining → blow up the call site → cache thrash. Use only for
small (&lt;10-line) helpers.</p>
<h3 id="9-register-keyword">(9) <code>register</code> keyword</h3>
<p>Has had no effect since C++17 / C11 deprecated it. Doesn&rsquo;t matter — drop
it; the allocator will do the right thing.</p>
<h3 id="10--os-cargo-culted">(10) <code>-Os</code> cargo-culted</h3>
<p><code>-Os</code> can be slower than <code>-O2</code> on CPU-bound code. It IS often faster on
I-cache-bound code (web servers, browsers). Profile.</p>
<h3 id="11-compiling-at--o2-in-one-tu-and--o0-in-another">(11) Compiling at -O2 in one TU and -O0 in another</h3>
<p>The optimizer is allowed to inline across TUs only when bodies are
visible (header / LTO). A -O0 caller in TU-B will call a -O2 callee in
TU-A through the ABI, which means the callee&rsquo;s optimizations DO apply,
but the caller around it is dumb.</p>
<h3 id="12-profile-mismatch-pgo">(12) Profile mismatch (PGO)</h3>
<p>If the input you used to build the profile doesn&rsquo;t resemble real workload
(e.g. training on the regression tests), PGO can make things SLOWER. Use
real inputs.</p>
<h2 id="5-quick-reference-tools-per-task">5. Quick reference: tools per task</h2>
<table>
<thead>
<tr>

<tr>

const BY_PATH = {};        // "01_pthreads/readme.md"  -> idx
const BY_DIR_README = {};  // "01_pthreads" / ""        -> idx (README of dir)
const BY_BASENAME = {};    // "cheatsheet.md"           -> idx (only if unique)
const BASENAME_DUP = {};

        else BY_BASENAME[base] = idx;

/* Join a relative href onto a base directory and normalize . / .. segments. */
function joinPath(baseDir, rel) {
    if (rel.charAt(0) === '/') { baseDir = ''; rel = rel.replace(/^\/+/, ''); }
    const parts = (baseDir ? baseDir.split('/') : []).concat(rel.split('/'));
    const out = [];
    for (const p of parts) {
        if (p === '' || p === '.') continue;
        if (p === '..') { out.pop(); continue; }
        out.push(p);
    }
    return out.join('/');
}

function mdTarget(rawHref, baseDir) {
    if (!rawHref || rawHref.charAt(0) === '#') return null;
    if (/^[a-z][a-z0-9+.-]*:\/\//i.test(rawHref) || /^(mailto|tel):/i.test(rawHref)) return null;

    let anchor = '';
    let pathPart = rawHref;
    const hashIdx = pathPart.indexOf('#');
    if (hashIdx >= 0) {
        anchor = pathPart.substring(hashIdx + 1);
        pathPart = pathPart.substring(0, hashIdx);
        try { anchor = decodeURIComponent(anchor); } catch (e) {}
    }
    const qIdx = pathPart.indexOf('?');
    if (qIdx >= 0) pathPart = pathPart.substring(0, qIdx);
    if (!pathPart) return null;

    const joined = joinPath(baseDir || '', pathPart).toLowerCase();
    let idx;
    if (/\.md$/i.test(pathPart)) {
        idx = BY_PATH[joined];
        if (idx === undefined) {
            const base = joined.split('/').pop();
            idx = BY_BASENAME[base];
        }
    } else {
        // a directory reference -> that folder's README
        idx = BY_DIR_README[joined];
    }
    if (idx === undefined) return null;
    return { idx: idx, anchor: anchor };
}

function baseDirOf(node) {
    const panel = node && node.closest ? node.closest('.tab-content') : null;
    return panel ? (panel.dataset.dir || '') : '';
}

/* Tag links so we can style internal navigation distinctly from external ones. */
function classifyLinks() {
    document.querySelectorAll('.tab-content a[href]').forEach(a => {
        const href = a.getAttribute('href');
        if (!href) return;
        if (href.charAt(0) === '#') {
            a.classList.add('anchor-link');
        } else if (mdTarget(href, baseDirOf(a))) {
            a.classList.add('xref-link');
        } else if (/^[a-z][a-z0-9+.-]*:\/\//i.test(href)) {
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
        }
    });
}

function addCopyButton(pre, block) {
    const btn = document.createElement('button');
    btn.className = 'code-copy-btn';
    btn.type = 'button';
    btn.textContent = 'Copy';
    btn.addEventListener('click', () => {
        const text = block.innerText;
        const done = () => {
            btn.textContent = 'Copied';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1600);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
        } else {
            fallbackCopy(text, done);
        }
    });
    pre.appendChild(btn);
}

function fallbackCopy(text, done) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); done(); } catch (e) {}
    document.body.removeChild(ta);
}

        block.dataset.highlighted = '1';
    });
}

/* ───── Search index: pre-extract plain text per block ───── */

const searchIndex = [];

TAB_DATA.forEach((tab, tabIdx) => {
    const tmp = document.createElement('div');
    tmp.innerHTML = tab.body;
    let currentHeading = '';

    function walk(node) {
        for (const child of node.childNodes) {
            if (child.nodeType === Node.ELEMENT_NODE) {
                const tag = child.tagName;
                if (/^H[1-6]$/.test(tag)) {
                    currentHeading = child.textContent.trim();
                }
                const text = child.textContent.trim();
                if (text.length > 0) {
                    searchIndex.push({
                        tabIdx: tabIdx,
                        tabName: tab.name,
                        heading: currentHeading,
                        text: text,
                        tag: tag
                    });
                }
                if (/^(P|LI|TD|TH|BLOCKQUOTE|PRE|H[1-6])$/.test(tag)) {
                    continue;
                }
                walk(child);
            }
        }
    }
    walk(tmp);
});

});

document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        if (overlay.classList.contains('open')) closeSearch();
        else openSearch();
        return;
    }
    if (e.key === '/' && !overlay.classList.contains('open') &&
        !['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) {
        e.preventDefault();
        openSearch();
        return;
    }
    if (e.key === 'Escape' && overlay.classList.contains('open')) {
        closeSearch();
        return;
    }
    if (overlay.classList.contains('open')) {
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (srResults.length > 0) {
                srActiveIdx = Math.min(srActiveIdx + 1, srResults.length - 1);
                updateActiveResult();
            }
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (srResults.length > 0) {
                srActiveIdx = Math.max(srActiveIdx - 1, 0);
                updateActiveResult();
            }
        } else if (e.key === 'Enter') {
            e.preventDefault();
            if (srActiveIdx >= 0 && srActiveIdx < srResults.length) {
                navigateToResult(srResults[srActiveIdx]);
            }
        }
    }
});

function updateActiveResult() {
    srBody.querySelectorAll('.sr-item').forEach((el, i) => {
        el.classList.toggle('sr-active', i === srActiveIdx);
    });
    const active = srBody.querySelector('.sr-active');
    if (active) active.scrollIntoView({ block: 'nearest' });
}

function escapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

function highlightSnippet(text, query, maxLen) {
    const lower = text.toLowerCase();
    const qLower = query.toLowerCase();
    const pos = lower.indexOf(qLower);
    if (pos < 0) return text.substring(0, maxLen);

    const pad = Math.floor((maxLen - query.length) / 2);
    let start = Math.max(0, pos - pad);
    let end = Math.min(text.length, pos + query.length + pad);
    let snippet = text.substring(start, end);
    if (start > 0) snippet = '...' + snippet;
    if (end < text.length) snippet = snippet + '...';

    const re = new RegExp('(' + escapeRegex(query) + ')', 'gi');
    return snippet.replace(re, '<mark>$1</mark>');
}

let searchTimer = null;
searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(runSearch, 120);
});

function runSearch() {
    const query = searchInput.value.trim();
    if (query.length < 2) {
        srBody.innerHTML = '<div class="sr-empty">Type at least 2 characters</div>';
        srCount.textContent = '';
        srResults = [];
        srActiveIdx = -1;
        return;
    }

    const qLower = query.toLowerCase();
    const matches = [];
    const seen = new Set();

    for (const entry of searchIndex) {
        if (entry.text.toLowerCase().includes(qLower)) {
            const key = entry.tabIdx + ':' + entry.heading + ':' + entry.text.substring(0, 80);
            if (seen.has(key)) continue;
            seen.add(key);
            matches.push(entry);
            if (matches.length >= 100) break;
        }
    }

    srResults = matches;
    srActiveIdx = matches.length > 0 ? 0 : -1;

    if (matches.length === 0) {
        srBody.innerHTML = '<div class="sr-empty">No results for "' +
            query.replace(/</g,'&lt;') + '"</div>';
        srCount.textContent = '0 results';
        return;
    }

    srCount.textContent = matches.length >= 100 ? '100+ results' : matches.length + ' result' + (matches.length > 1 ? 's' : '');

    let html = '';
    matches.forEach((m, i) => {
        const snippet = highlightSnippet(m.text, query, 160);
        html += '<div class="sr-item' + (i === 0 ? ' sr-active' : '') + '" data-ridx="' + i + '">';
        html += '<div class="sr-item-tab">' + m.tabName + '</div>';
        if (m.heading) html += '<div class="sr-item-heading">' + m.heading.replace(/</g,'&lt;') + '</div>';
        html += '<div class="sr-item-snippet">' + snippet + '</div>';
        html += '</div>';
    });
    srBody.innerHTML = html;

    srBody.querySelectorAll('.sr-item').forEach(el => {
        el.addEventListener('click', () => {
            const idx = parseInt(el.dataset.ridx, 10);
            navigateToResult(srResults[idx]);
        });
    });
}

function navigateToResult(result) {
    const savedQuery = searchInput.value.trim() || result.text.substring(0, 20);
    closeSearch();
    activateTab(result.tabIdx, false);

    requestAnimationFrame(() => {
        clearHighlights();
        const panel = document.getElementById('panel-' + result.tabIdx);
        const qLower = savedQuery.toLowerCase();
        const qLen = savedQuery.length;

        const hits = [];
        const walker = document.createTreeWalker(panel, NodeFilter.SHOW_TEXT);
        while (walker.nextNode()) {
            const node = walker.currentNode;
            const idx = node.textContent.toLowerCase().indexOf(qLower);
            if (idx >= 0) {
                hits.push({ node: node, offset: idx });
            }
        }

        let firstMark = null;
        for (let i = hits.length - 1; i >= 0; i--) {
            const h = hits[i];
            const range = document.createRange();
            range.setStart(h.node, h.offset);
            range.setEnd(h.node, h.offset + qLen);
            const mark = document.createElement('span');
            mark.className = 'search-highlight';
            mark.dataset.searchHighlight = '1';
            try { range.surroundContents(mark); firstMark = mark; } catch(e) {}
        }

        if (firstMark) {
            firstMark.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        setTimeout(clearHighlights, 6000);
    });
}

function clearHighlights() {
    document.querySelectorAll('[data-search-highlight]').forEach(el => {
        const parent = el.parentNode;
        parent.replaceChild(document.createTextNode(el.textContent), el);
        parent.normalize();
    });
}

/* ───── Sidebar TOC + scroll spy ───── */

const sidebarNav = document.getElementById('sidebarNav');
const navList = document.getElementById('navList');
const sidebarToggle = document.getElementById('sidebarToggle');
let currentTocHeadings = [];

function buildToc(panelIdx) {
    navList.innerHTML = '';
    currentTocHeadings = [];
    const panel = document.getElementById('panel-' + panelIdx);
    if (!panel) return;
    const headings = panel.querySelectorAll('h1, h2, h3, h4');
    headings.forEach((h, i) => {
        if (!h.id) h.id = 'autoid-' + panelIdx + '-' + i;
        const level = h.tagName.substring(1);
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = h.textContent;
        a.className = 'nav-h' + level;
        a.title = h.textContent;
        a.dataset.headingId = h.id;
        a.addEventListener('click', function(e) {
            e.preventDefault();
            h.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
        li.appendChild(a);
        navList.appendChild(li);
        currentTocHeadings.push({ el: h, link: a });
    });
    updateScrollSpy();
}

let spyRaf = null;
function updateScrollSpy() {
    if (spyRaf) return;
    spyRaf = requestAnimationFrame(() => {
        spyRaf = null;
        if (currentTocHeadings.length === 0) return;
        const scrollY = window.scrollY;
        const offset = 80;
        let activeEntry = currentTocHeadings[0];
        for (const entry of currentTocHeadings) {
            if (entry.el.offsetTop <= scrollY + offset) {
                activeEntry = entry;
            } else {
                break;
            }
        }
        currentTocHeadings.forEach(e => e.link.classList.remove('nav-active'));
        if (activeEntry) {
            activeEntry.link.classList.add('nav-active');
            const linkTop = activeEntry.link.offsetTop;
            const navH = sidebarNav.clientHeight;
            const navScroll = sidebarNav.scrollTop;
            if (linkTop < navScroll + 40 || linkTop > navScroll + navH - 40) {
                sidebarNav.scrollTo({ top: linkTop - navH / 3, behavior: 'smooth' });
            }
        }
    });
}

window.addEventListener('scroll', updateScrollSpy, { passive: true });

/* ───── iOS-style condensing navbar (hide on scroll down, show on scroll up) ───── */
function updateNavCondense() {
    const y = window.scrollY;
    const NAV_TOP = 8;       // always expanded near the very top
    const NAV_TRIGGER = 72;  // must scroll past this before condensing
    const DELTA = 5;         // ignore tiny jitters
    if (y <= NAV_TOP) {
        document.body.classList.remove('nav-condensed');
    } else if (y > navLastY + DELTA && y > NAV_TRIGGER) {
        document.body.classList.add('nav-condensed');   // scrolling down
    } else if (y < navLastY - DELTA) {
        document.body.classList.remove('nav-condensed'); // scrolling up
    }
    navLastY = y;
}
window.addEventListener('scroll', updateNavCondense, { passive: true });

const tocSidebar = document.getElementById('tocSidebar');
const tocToggle = document.getElementById('tocToggle');

function toggleSidebar() {
    const collapsed = sidebarNav.classList.toggle('collapsed');
    document.body.classList.toggle('sidebar-collapsed', collapsed);
    if (!collapsed && window.innerWidth <= 1024) {
        tocSidebar.classList.add('collapsed');
        document.body.classList.add('toc-collapsed');
    }
}

function toggleToc() {
    const collapsed = tocSidebar.classList.toggle('collapsed');
    document.body.classList.toggle('toc-collapsed', collapsed);
    if (!collapsed && window.innerWidth <= 1024) {
        sidebarNav.classList.add('collapsed');
        document.body.classList.add('sidebar-collapsed');
    }
}

sidebarToggle.addEventListener('click', toggleSidebar);
tocToggle.addEventListener('click', toggleToc);

document.addEventListener('click', (e) => {
    if (window.innerWidth <= 1024) {
        if (!sidebarNav.contains(e.target) && !tocSidebar.contains(e.target) &&
            !sidebarToggle.contains(e.target) && !tocToggle.contains(e.target)) {
            sidebarNav.classList.add('collapsed');
            document.body.classList.add('sidebar-collapsed');
            tocSidebar.classList.add('collapsed');
            document.body.classList.add('toc-collapsed');
        }
    }
});

document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'b' && !overlay.classList.contains('open')) {
        e.preventDefault();
        toggleSidebar();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'i' && !overlay.classList.contains('open')) {
        e.preventDefault();
        toggleToc();
    }
});

/* ───── Anchor + cross-document link interception ───── */

/* Find an element by id, preferring the given panel (heading ids can collide
   across documents because each file is converted independently). */
function findById(id, preferredPanel) {
    if (preferredPanel) {
        const scoped = preferredPanel.querySelector('[id="' + id.replace(/(["\\])/g, '\\$1') + '"]');
        if (scoped) return scoped;
    }
    return document.getElementById(id);
}

function scrollToTarget(target) {
    requestAnimationFrame(() => target.scrollIntoView({ behavior: 'smooth', block: 'start' }));
}

function gotoAnchor(idx, anchor) {
    activateTab(idx, !anchor);
    const panel = document.getElementById('panel-' + idx);
    if (anchor) {
        const target = findById(anchor, panel);
        if (target) { scrollToTarget(target); return; }
    }
}

document.addEventListener('click', function(e) {
    const link = e.target.closest('a[href]');
    if (!link) return;
    const href = link.getAttribute('href');
    if (!href) return;

    // In-page anchor: resolve within the panel that owns the link first.
    if (href.charAt(0) === '#') {
        const id = href.substring(1);
        if (!id) return;
        const ownerPanel = link.closest('.tab-content');
        const target = findById(id, ownerPanel);
        if (target) {
            e.preventDefault();
            const dest = target.closest('.tab-content');
            if (dest) {
                const m = dest.id.match(/^panel-(\d+)$/);
                if (m) activateTab(parseInt(m[1], 10), false);
            }
            scrollToTarget(target);
        }
        return;
    }

    // Cross-document link to another bundled doc (file or folder), optionally #anchor.
    const md = mdTarget(href, baseDirOf(link));
    if (md) {
        e.preventDefault();
        gotoAnchor(md.idx, md.anchor);
    }
});

/* ───── Startup ───── */
/* - Nagesh N Nazare - */

const hash = location.hash || '';
const tabMatch = hash.match(/^#tab-(\d+)$/);
if (tabMatch) {
    activateTab(Math.min(parseInt(tabMatch[1], 10), TAB_DATA.length - 1));
} else if (hash.length > 1) {
    const targetId = hash.substring(1);
    const target = document.getElementById(targetId);
    if (target) {
        const panels = document.querySelectorAll('.tab-content');
        for (let i = 0; i < panels.length; i++) {
            if (panels[i].contains(target)) {
                activateTab(i, false);
                requestAnimationFrame(() => {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
                break;
            }
        }
    } else {
        activateTab(0);
    }
} else {
    activateTab(0);
}
