</table>
<h2 id="anatomy-of-a-loop-in-ir">Anatomy of a loop in IR</h2>
<p>Before any optimization, both LLVM and GCC normalize loops to a <strong>canonical
form</strong>:</p>
<pre><code>                            ┌──────────────┐
                            │   preheader  │   single predecessor of header
                            │   (PH)       │   ← invariant code hoists here
                            └──────┬───────┘
                                   ▼
                            ┌──────────────┐
                ┌──────────►│   header (H) │   ← phis live here
                │           │              │
                │           │   φ(IV)      │
                │           └──────┬───────┘
                │                  │
                │           ┌──────▼───────┐
                │           │   body (B)   │
                │           │   ...        │
                │           └──────┬───────┘
                │                  │
                │           ┌──────▼───────┐
                │           │   latch (L)  │   ← back-edge to header
                │           │   IV++       │
                │           │   br cond    │
                │           └──┬───────┬───┘
                └──────────────┘       │
                       back-edge       │ exit
                                       ▼
                                ┌──────────────┐
                                │   exit (X)   │
                                └──────────────┘
</code></pre>
<p>Key vocabulary:</p>
<ul>
<li><strong>Header</strong> — block that all loop paths flow through; phis live here.</li>
<li><strong>Latch</strong> — block with the back-edge to the header. A <em>natural loop</em> has
  exactly one.</li>
<li><strong>Preheader</strong> — the single entry block that flows into the header from
  outside. Created on demand so that <em>hoisted</em> invariants have somewhere
  to live.</li>
<li><strong>Induction variable (IV)</strong> — a variable that monotonically changes each
  iteration. Modeled by Scalar Evolution (SCEV) in LLVM.</li>
<li><strong>Loop-invariant</strong> — an expression whose operands are defined outside the
  loop and which has no side effects inside it.</li>
<li><strong>Trip count</strong> — number of iterations. May be a constant, a parameter, or
  symbolically described by SCEV.</li>
</ul>
<p>You can see all of these in any LLVM IR dump after <code>-loop-rotate</code> has run.</p>
<hr />
<h2 id="01--loop-invariant-code-motion-licm">01 · Loop-Invariant Code Motion (LICM)</h2>
<blockquote>
<p>&ldquo;If it doesn&rsquo;t depend on the loop, do it <em>before</em> the loop.&rdquo;</p>
</blockquote>
<pre><code>   BEFORE                            AFTER LICM
   ──────                            ──────────
   for (i=0;i&lt;n;i++) {                t = x * y + k;
       a[i] = (x * y + k) * a[i];     for (i=0;i&lt;n;i++) {
   }                                       a[i] = t * a[i];
                                       }
</code></pre>
<h3 id="diagram">Diagram</h3>
<pre><code>                preheader
                ┌──────────┐
                │   t = …  │ ◄── hoisted here
                └────┬─────┘
                     ▼
           ┌────► header (i, cond)
           │           │
           │     ┌─────▼─────┐
           │     │ body:     │
           │     │  a[i]=t*…│   ← uses t, no longer recomputed
           │     └─────┬─────┘
           │           ▼
           └─── latch (i++)
</code></pre>
<h3 id="legality">Legality</h3>
<ul>
<li>The expression must be loop-invariant (no operand defined inside the loop).</li>
<li>It must be <strong>safe to speculate</strong> — that is, executing it even when the loop
  trips zero times must not crash or trap. <code>1 / x</code> is <em>not</em> speculatable
  unless <code>x != 0</code> is proven. Loads from possibly-null pointers are not.</li>
<li>It must not have observable side effects (no I/O, no atomics, etc.).</li>
</ul>
<h3 id="where-it-lives">Where it lives</h3>
<ul>
<li><strong>LLVM</strong>: <code>LICMPass</code> (works on natural loops, uses MemorySSA for stores).</li>
<li><strong>GCC</strong>: <code>tree-ssa-loop-im.cc</code> (Invariant Motion).</li>
</ul>
<hr />
<h2 id="02--loop-unrolling">02 · Loop unrolling</h2>
<p>Replicate the loop body N times so each iteration of the new loop covers N
of the old iterations. Trade: more instructions, fewer branches, more
instruction-level parallelism (ILP), better vectorization opportunities.</p>
<pre><code>   BEFORE                            AFTER UNROLL BY 4
   ──────                            ─────────────────
   for (i=0;i&lt;n;i++)                 for (i=0; i+3 &lt; n; i+=4) {
       a[i] = b[i] + c[i];               a[i  ] = b[i  ] + c[i  ];
                                          a[i+1] = b[i+1] + c[i+1];
                                          a[i+2] = b[i+2] + c[i+2];
                                          a[i+3] = b[i+3] + c[i+3];
                                      }
                                      // scalar epilogue for i..n
</code></pre>
<h3 id="two-flavours">Two flavours</h3>
<ol>
<li><strong>Full unroll</strong> — when the trip count is a small known constant
   (<code>for (i=0;i&lt;4;i++)</code>). The loop disappears entirely.</li>
<li><strong>Partial unroll by N</strong> — replicate by N, keep a residual epilogue for
   leftovers. N is chosen by a cost model based on the body size and the
   target&rsquo;s pipeline.</li>
</ol>
<h3 id="cfg-before--after">CFG before / after</h3>
<pre><code>   BEFORE                                AFTER N=4
   ──────                                ─────────
        ┌──header──┐                          ┌──header──┐
        │  cmp i,n │                          │  cmp i+3,n│
        │  br      │                          │  br       │
        └───┬──┬───┘                          └───┬───┬───┘
            │  │ exit                              │   │ exit
            ▼  ▼                                   ▼   ▼
         body                                4× body, then epilogue
            │                                      │
         latch                                  latch (i+=4)
            └─►header                              └─►header
</code></pre>
<h3 id="cost-model-knobs">Cost-model knobs</h3>
<ul>
<li>LLVM: <code>-funroll-loops</code>, <code>-mllvm -unroll-count=N</code>,
  <code>#pragma clang loop unroll_count(4)</code>, <code>unroll(disable|enable|full)</code>.</li>
<li>GCC: <code>-funroll-loops</code>, <code>-funroll-all-loops</code>, <code>--param max-unroll-times=N</code>,
  <code>#pragma GCC unroll N</code>.</li>
</ul>
<h3 id="pitfalls">Pitfalls</h3>
<ul>
<li>Unrolling <strong>without</strong> vectorization can hurt I-cache and increase
  decode pressure.</li>
<li>Don&rsquo;t unroll loops with unknown trip counts that average to 2 or 3.</li>
</ul>
<hr />
<h2 id="03--loop-peeling">03 · Loop peeling</h2>
<p>Peel <strong>one or more</strong> iterations off the front (or back) of a loop. Helpful
when the first iteration is different (e.g., the initialization of a phi),
or when the trip count is small and the loop body has a predictable startup
penalty.</p>
<pre><code>   BEFORE                            AFTER peel-by-1
   ──────                            ────────────────
   for (i=0;i&lt;n;i++) {                if (n &gt; 0) body(0);
       body(i);                       for (i=1;i&lt;n;i++) body(i);
   }
</code></pre>
<p>When useful:</p>
<ul>
<li>Allows another optimization to fire (e.g., <code>body(0)</code> becomes a constant).</li>
<li>Aligns the loop entry (more relevant on older architectures).</li>
<li>Used heavily by the vectorizer to split off the <em>prologue</em> that runs
  scalar until the pointer becomes aligned.</li>
</ul>
<hr />
<h2 id="04--loop-unswitching">04 · Loop unswitching</h2>
<p>Move a <strong>loop-invariant condition</strong> out of the loop, producing two loops
each with the condition removed.</p>
<pre><code>   BEFORE                            AFTER UNSWITCH
   ──────                            ──────────────
   for (i=0;i&lt;n;i++) {                if (cond) {
       if (cond)                          for (i=0;i&lt;n;i++) a[i] = f(b[i]);
           a[i] = f(b[i]);            } else {
       else                               for (i=0;i&lt;n;i++) a[i] = g(b[i]);
           a[i] = g(b[i]);            }
   }
</code></pre>
<p>This <strong>doubles code size</strong> but removes a per-iteration branch and lets each
specialized loop vectorize independently. The cost model is strict.</p>
<p>LLVM pass: <code>LoopUnswitchPass</code> (legacy) / <code>SimpleLoopUnswitchPass</code> (new).
GCC pass: <code>tree-ssa-loop-unswitch.cc</code>.</p>
<hr />
<h2 id="05--loop-fusion-jamming">05 · Loop fusion (jamming)</h2>
<p>Combine two loops with the <em>same trip count</em> into one. Improves cache
locality and removes overhead.</p>
<pre><code>   BEFORE                                AFTER FUSE
   ──────                                ──────────
   for (i=0;i&lt;n;i++) a[i] = b[i] + 1;    for (i=0;i&lt;n;i++) {
   for (i=0;i&lt;n;i++) c[i] = a[i] * 2;        a[i] = b[i] + 1;
                                              c[i] = a[i] * 2;
                                          }
</code></pre>
<p>Legality:</p>
<ul>
<li>Same trip count.</li>
<li>No backward dependence (<code>c[i]</code> must not need <code>a[i+1]</code> from the first loop).</li>
</ul>
<p>LLVM: <code>LoopFusePass</code> (experimental, enabled at <code>-O3</code> with caveats).
GCC: <code>tree-ssa-loop-distribute.cc</code> (also handles fission, the inverse).</p>
<hr />
<h2 id="06--loop-fission-distribution">06 · Loop fission (distribution)</h2>
<p>The dual of fusion: split a loop with multiple statements into multiple
loops, each handling a single statement. Beneficial when:</p>
<ul>
<li>One statement is vectorizable and the other isn&rsquo;t.</li>
<li>The aggregate working set doesn&rsquo;t fit in cache, but each part does.</li>
</ul>
<pre><code>   BEFORE                                AFTER FISSION
   ──────                                ─────────────
   for (i=0;i&lt;n;i++) {                    for (i=0;i&lt;n;i++) a[i] = b[i]+1;
       a[i] = b[i] + 1;                   for (i=0;i&lt;n;i++) hash_combine(&amp;h, a[i]);
       hash_combine(&amp;h, a[i]);
   }
</code></pre>
<hr />
<h2 id="07--loop-interchange">07 · Loop interchange</h2>
<p>Swap the order of two nested loops.</p>
<pre><code class="language-c">for (i=0;i&lt;N;i++) for (j=0;j&lt;N;j++) A[i][j] = B[j][i];
</code></pre>
<p>After interchange:</p>
<pre><code class="language-c">for (j=0;j&lt;N;j++) for (i=0;i&lt;N;i++) A[i][j] = B[j][i];
</code></pre>
<p>The point: the <em>inner</em> loop now strides through memory the way the array is
laid out, restoring cache locality.</p>
<pre><code>   Row-major (C) layout of A[3][4]:
   ┌──┬──┬──┬──┐
   │00│01│02│03│  ◄── inner loop i (stride 1, NOT 4)
   ├──┼──┼──┼──┤
   │10│11│12│13│
   ├──┼──┼──┼──┤
   │20│21│22│23│
   └──┴──┴──┴──┘
</code></pre>
<p>LLVM pass: <code>LoopInterchangePass</code> (cost-model driven).
GCC pass: <code>graphite-interchange.cc</code> (Polyhedral / Graphite framework).</p>
<hr />
<h2 id="08--loop-tiling-blocking">08 · Loop tiling (blocking)</h2>
<p>For loops whose working set exceeds the cache, partition the iteration space
into <em>tiles</em> that fit. Classic matrix-multiplication example:</p>
<pre><code class="language-c">for (i=0;i&lt;N;i++)
  for (j=0;j&lt;N;j++)
    for (k=0;k&lt;N;k++)
      C[i][j] += A[i][k] * B[k][j];
</code></pre>
<p>After tiling with block size T:</p>
<pre><code class="language-c">for (ii=0; ii&lt;N; ii+=T)
  for (jj=0; jj&lt;N; jj+=T)
    for (kk=0; kk&lt;N; kk+=T)
      for (i=ii; i&lt;min(ii+T,N); i++)
        for (j=jj; j&lt;min(jj+T,N); j++)
          for (k=kk; k&lt;min(kk+T,N); k++)
            C[i][j] += A[i][k] * B[k][j];
</code></pre>
<pre><code>   N×N matrix, T = 4 tile:
   ┌─────┬─────┬─────┬─────┐
   │ T₀₀ │ T₀₁ │ T₀₂ │ T₀₃ │
   ├─────┼─────┼─────┼─────┤
   │ T₁₀ │ T₁₁ │ T₁₂ │ T₁₃ │     ← compute one tile fully (fits in L1)
   ├─────┼─────┼─────┼─────┤        before moving to the next
   │ T₂₀ │ T₂₁ │ T₂₂ │ T₂₃ │
   ├─────┼─────┼─────┼─────┤
   │ T₃₀ │ T₃₁ │ T₃₂ │ T₃₃ │
   └─────┴─────┴─────┴─────┘
</code></pre>
<p>Compilers do this automatically only under specific cost models (LLVM
<code>-mllvm -enable-loop-distribute</code>, GCC Graphite <code>-floop-block</code>,
<code>-floop-strip-mine</code>, <code>-floop-nest-optimize</code>). In practice, hand-tile the
inner loops of math libraries and let the compiler vectorize them.</p>
<hr />
<h2 id="09--induction-variable-simplification">09 · Induction-variable simplification</h2>
<p>Reduce the strength of induction-variable expressions: <code>a[i*8]</code> becomes a
pointer that increments by 8 each iteration.</p>
<pre><code>   BEFORE                                AFTER IV-simpl
   ──────                                ──────────────
   for (i=0;i&lt;n;i++) sum += a[i*8];      p = a;
                                          for (i=0;i&lt;n;i++) {
                                              sum += *p;
                                              p += 8;
                                          }
</code></pre>
<p>Both compilers go further and <strong>eliminate redundant IVs</strong> when possible
(one pointer can drive both loops). LLVM: <code>IndVarSimplifyPass</code>. GCC:
<code>tree-ssa-loop-ivopts.cc</code>.</p>
<hr />
<h2 id="10--loop-rerolling">10 · Loop rerolling</h2>
<p>The opposite of unrolling. If source code has been manually unrolled but
the optimizer wants to vectorize, it first <strong>rerolls</strong> so it has a clean
loop to vectorize.</p>
<pre><code>   BEFORE (manual unroll-by-4)            AFTER REROLL
   ──────────────────────────             ────────────
   a[i  ] = b[i  ] + 1;                   for (k=0;k&lt;4;k++)
   a[i+1] = b[i+1] + 1;                       a[i+k] = b[i+k] + 1;
   a[i+2] = b[i+2] + 1;
   a[i+3] = b[i+3] + 1;
</code></pre>
<p>LLVM pass: <code>LoopRerollPass</code>. Rarely fires; useful for cleaning up bad
hand-written code.</p>
<hr />
<h2 id="11--loop-idiom-recognition">11 · Loop idiom recognition</h2>
<p>A <em>loop</em> that implements a memset/memcpy/strlen/popcount pattern is
replaced by a single call to a library function or to a wide intrinsic.</p>
<pre><code>   BEFORE                                AFTER
   ──────                                ─────
   for (i=0;i&lt;n;i++) buf[i] = 0;         memset(buf, 0, n);

   while (*s++) ;                        s = (const char*)__rawmemchr(s, 0);

   for (i=0;i&lt;n;i++) c += (x&gt;&gt;i)&amp;1;       c = __builtin_popcount(x);
</code></pre>
<p>LLVM: <code>LoopIdiomRecognizePass</code>. GCC: <code>tree-loop-distribution.cc</code> includes
this.</p>
<h3 id="pitfall">Pitfall</h3>
<p><code>-ffreestanding</code> and <code>-fno-builtin-memset</code> disable the recognition because
the compiler can&rsquo;t assume <code>memset</code> exists in the runtime.</p>
<hr />
<h2 id="12--loop-versioning">12 · Loop versioning</h2>
<p>When a critical legality property is unprovable at compile time, the
optimizer can emit a <strong>runtime check</strong> and select between two versions of
the loop:</p>
<pre><code>   AFTER VERSIONING
   ────────────────
   if (a + n &lt;= b || b + n &lt;= a) {          // no overlap → safe to vectorize
       /* vectorized version */
       for (i=0;i&lt;n;i++) a[i] = b[i] + c[i];
   } else {
       /* scalar fallback */
       for (i=0;i&lt;n;i++) a[i] = b[i] + c[i];
   }
</code></pre>
<p>LLVM&rsquo;s loop vectorizer routinely emits these &ldquo;memcheck&rdquo; guards.</p>

</code></pre>

<pre><code class="language-c">/* 01_inlining.c — INLINING MECHANICS
 * ============================================================================
 *
 * What it is
 * ----------
 *   Replace \`call f(args)\` at the call site with a *copy* of f's body,
 *   with parameters substituted for arguments. Then re-run all the local
 *   optimizations on the merged code.
 *
 * Why it is the most important optimization
 * -----------------------------------------
 *
 *      inline ─┬─► constants in args flow into callee → constant-fold
 *              ├─► dead args removed from callee
 *              ├─► alias-analysis no longer hits the &quot;opaque call&quot; wall
 *              ├─► loop opts on the inlined body
 *              └─► tail-call merge with caller's epilogue
 *
 *   Almost every other inter-procedural optimization is a special case
 *   or downstream consequence of inlining.
 *
 * Cost model
 * ----------
 *   Each candidate gets a (cost, benefit) score. Inline iff
 *   \`benefit - cost ≥ threshold\`. The cost counts callee instructions
 *   that survive inlining; the benefit counts compile-time-folded
 *   computation in the merged code.
 *
 *   Knobs:
 *     LLVM:  -mllvm -inline-threshold=N            default ~225
 *     GCC :  --param max-inline-insns-single=N     default ~70
 * ============================================================================
 */
#include &lt;stddef.h&gt;

/* static + inline = &quot;may be inlined; emit a copy only if needed.&quot; */
static inline int square(int x) { return x * x; }

/*  caller_const — constant arg lets the body fold completely.
 *  ──────────────────────────────────────────────────────────────────────────
 *  Source:  return square(7);
 *
 *  WHAT YOU'D NAIVELY EXPECT WITHOUT INLINING:
 *      caller_const:
 *          mov  edi, 7
 *          call square
 *          ret
 *  AND   square:
 *          imul edi, edi
 *          mov  eax, edi
 *          ret
 *
 *  ACTUAL (-O3):
 *      caller_const:
 *          mov  eax, 49         ; everything folded to a literal
 *          ret
 *
 *  WHY: inlining substitutes \`x = 7\` into square's body → \`7 * 7\`
 *  → constant folder → 49. The original call site disappears, and
 *  \`square\` either disappears from the binary (it was \`static inline\`)
 *  or remains only as a possible callee for other TUs (none here).
 */
int caller_const(void) {
    return square(7);
}

/*  caller_var — variable arg; inlined but cannot fold.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      caller_var:
 *          lea   eax, [rdi + 1]   ; eax = n + 1
 *          imul  eax, eax         ; eax = (n+1) * (n+1)
 *          ret
 *
 *  ONE function body, two instructions, NO call. The compiler did:
 *    inline square(n+1) → (n+1) * (n+1)
 *    instruction-select  → lea + imul
 */
int caller_var(int n) {
    return square(n + 1);
}

__attribute__((always_inline)) static inline int double_it(int x) { return x + x; }

/*  caller_force — always_inline + algebraic simplification.
 *  ──────────────────────────────────────────────────────────────────────────
 *  Source:  return double_it(n) + double_it(n+1);
 *
 *  IDEAL TRANSFORMATION:
 *      double_it(n)   = 2n
 *      double_it(n+1) = 2(n+1) = 2n + 2
 *      sum            = 4n + 2
 *
 *  ACTUAL (-O3):
 *      caller_force:
 *          lea  eax, [4*rdi + 2]   ; ONE lea: 4n + 2
 *          ret
 *
 *  WHY: After both calls inline, InstCombine sees \`(n+n) + ((n+1)+(n+1))\`,
 *  reassociates to \`4n + 2\`, and the selector emits the lea pattern.
 *  The two helper calls become ZERO machine instructions.
 */
int caller_force(int n) { return double_it(n) + double_it(n + 1); }

/*  slow_path / hot_path — noinline + cold attribute.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      hot_path:
 *          cmp  edi, 1001
 *          jge  slow_path         ; TAIL CALL on the unlikely branch
 *          add  edi, edi          ; hot path: x * 2
 *          mov  eax, edi
 *          ret
 *      slow_path:
 *          ... (real implementation: arithmetic sequence sum)
 *
 *  WHAT WE LOSE BY MARKING \`slow_path\` NOINLINE: a function call. WHAT
 *  WE GAIN: hot_path is 4 instructions and fits in 16 bytes of I-cache;
 *  slow_path's loop doesn't bloat the hot function. Common pattern for
 *  rare error paths.
 */
__attribute__((noinline)) static int slow_path(int x) {
    int s = 0;
    for (int i = 0; i &lt; x; i++) s += i;
    return s;
}

int hot_path(int x) {
    if (__builtin_expect(x &gt; 1000, 0)) return slow_path(x);
    return x * 2;
}

/*  factorial / call_fact — recursion + full unrolling.
 *  ──────────────────────────────────────────────────────────────────────────
 *  Source:
 *      int factorial(int n) { return n&lt;=1 ? 1 : n * factorial(n-1); }
 *      int call_fact(void)  { return factorial(5); }
 *
 *  IDEAL: const-fold factorial(5) → 120; emit \`mov eax, 120; ret\`.
 *  ACTUAL (-O3): the compiler often does exactly that for tiny constant
 *  args. For larger args it inlines partially and may leave the
 *  recursive call.
 *
 *  Note: \`factorial\` itself in the asm above shows the *standalone*
 *  emitted version (with SSE vectorization of the running product
 *  triggered by SCEV recognising the multiplication chain). That body
 *  is only emitted because the function might be called from another
 *  TU. With LTO it would disappear if call_fact were the only caller.
 */
int factorial(int n) {
    return n &lt;= 1 ? 1 : n * factorial(n - 1);
}

int call_fact(void) {
    return factorial(5);
}

</code></pre>` },
  { name: `28. Interprocedural / Ipsccp`, path: `03_interprocedural/02_ipsccp.c`, dir: `03_interprocedural`, body: `<h1 id="02_ipsccpc">02_ipsccp.c</h1>
<pre><code class="language-c">/* 02_ipsccp.c — INTERPROCEDURAL SPARSE CONDITIONAL CONSTANT PROPAGATION
 * ============================================================================
 *
 * Idea
 * ----
 *   SCCP (chapter 04) computes constant values within a function. IPSCCP
 *   extends the analysis ACROSS function boundaries: if every call site
 *   of \`f(x, flag)\` passes the same value for \`flag\`, that parameter
 *   becomes a constant inside \`f\`. Branches that depended on it fold
 *   away.
 *
 *   The closure of &quot;all calls see the same constant&quot; only works for:
 *     – \`static\` functions (compiler sees ALL callers in the TU), or
 *     – functions with internal linkage after LTO joins TUs.
 *
 * Pass names
 * ----------
 *   LLVM:  IPSCCPPass.
 *   GCC :  tree-ipa-cp (IPA constant prop) + tree-ipa-prop.
 * ============================================================================
 */
extern void foo(int x);
extern void bar(int x);

static void helper(int x, int flag) {
    if (flag) foo(x);
    else      bar(x);
}

/*  caller_a, caller_b, caller_c — all three pass flag=1.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      caller_a:
 *          mov  edi, 1
 *          jmp  foo                ; TAIL CALL straight to foo(1)
 *      caller_b:
 *          mov  edi, 2
 *          jmp  foo                ; tail call foo(2)
 *      caller_c:
 *          mov  edi, 3
 *          jmp  foo                ; tail call foo(3)
 *
 *  WHAT WE'D EXPECT WITHOUT IPSCCP:
 *      caller_a:
 *          mov  edi, 1            ; x
 *          mov  esi, 1            ; flag
 *          jmp  helper
 *
 *  WHY: IPSCCP analyses helper and finds:
 *    – \`x\` has different values at different calls → lattice ⊥
 *    – \`flag\` is always 1 → lattice 1
 *  It then specialises helper assuming \`flag == 1\`; the \`else\` branch is
 *  pruned and helper becomes \`foo(x)\`. Now the call is a 1-statement
 *  forwarder, which the inliner happily inlines into each caller. The
 *  result: each caller directly tail-calls \`foo\`, the helper function
 *  is eliminated, and the \`bar\` symbol need not be referenced at all.
 *
 *  Total wins:
 *    – fewer instructions (no helper prologue/epilogue);
 *    – \`bar\` may be DCE'd by the linker (chapter 03 LTO);
 *    – better branch prediction (tail-call, no return mispredict).
 */
void caller_a(void) { helper(1, 1); }
void caller_b(void) { helper(2, 1); }
void caller_c(void) { helper(3, 1); }

</code></pre>` },
  { name: `29. Interprocedural / Arg Promotion`, path: `03_interprocedural/03_arg_promotion.c`, dir: `03_interprocedural`, body: `<h1 id="03_arg_promotionc">03_arg_promotion.c</h1>
<pre><code class="language-c">/* 03_arg_promotion.c — ARGUMENT PROMOTION (by-ref → by-val)
 * ============================================================================
 *
 * Idea
 * ----
 *   A static function that takes a \`T *p\`, only DEREFERENCES it (no
 *   stores, no further escape), and the address \`&amp;x\` only flows to it
 *   → the function can be rewritten to take \`T\` by value.
 *
 *   The caller does a load on its side and passes the value in a register.
 *   The callee never touches memory for this parameter.
 *
 *   Often combined with INLINING — the load disappears too.
 *
 * Pass names
 * ----------
 *   LLVM:  ArgumentPromotionPass.
 *   GCC :  ipa-sra (SRA inter-procedurally).
 *
 * Why bother
 * ----------
 *   A pointer parameter needs a load on every use; a value parameter is
 *   already in a register. For small leaf functions called millions of
 *   times (think hash combiners, comparators), this is a multi-percent
 *   speedup with zero source change.
 * ============================================================================
 */

static int read1(const int *p) {
    return *p + 1;
}

/*  caller — &amp;x flows into read1; x is never stored to memory at all.
 *  ──────────────────────────────────────────────────────────────────────────
 *  WHAT WE'D EXPECT NAIVELY (no inlining, no argprom):
 *      caller:
 *          mov   dword ptr [rsp - 4], edi   ; spill x
 *          lea   rdi, [rsp - 4]              ; pass &amp;x
 *          call  read1
 *          ret
 *      read1:
 *          mov   eax, dword ptr [rdi]        ; *p
 *          inc   eax
 *          ret
 *
 *  ACTUAL (-O3):
 *      caller:
 *          lea   eax, [rdi + 1]              ; x + 1; NO call, NO store
 *          ret
 *
 *  WHY:
 *    1. Argument promotion sees \`&amp;x\` only flows to read1; read1 only
 *       loads, never stores or escapes the pointer → rewrite read1 to
 *       take \`int\` by value.
 *    2. Inlining: read1's body is 2 instructions, well under threshold;
 *       inline into caller.
 *    3. Mem2reg + InstCombine collapse to \`lea\`.
 *
 *  Net: from 1 call + 1 store + 1 load + 1 add → 1 lea.
 */
typedef struct { int a; int b; } Pair;

static int sum_pair(const Pair *p) {
    return p-&gt;a + p-&gt;b;
}

int caller(int x) {
    return read1(&amp;x);
}

/*  caller_pair — struct address promotion (per-field scalarization).
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      caller_pair:
 *          lea   eax, [rdi + rsi]            ; a + b
 *          ret
 *
 *  IDEAL: NO Pair anywhere in memory.
 *  WHAT WE GOT: exactly that. The temporary struct \`p\` was scalarized
 *  by SROA on the caller side, the function rewritten to take (a, b),
 *  inlined, and the body \`a + b\` lowered to a single lea.
 *
 *  This is the IPA equivalent of SROA: the struct is shredded at the
 *  function boundary, allowing both sides to operate on scalars.
 */
int caller_pair(int a, int b) {
    Pair p = { a, b };
    return sum_pair(&amp;p);
}

</code></pre>` },
  { name: `30. Interprocedural / Devirtualization`, path: `03_interprocedural/04_devirtualization.c`, dir: `03_interprocedural`, body: `<h1 id="04_devirtualizationc">04_devirtualization.c</h1>
<pre><code class="language-c">/* 04_devirtualization.c — DEVIRTUALIZATION
 * ============================================================================
 *
 * Idea
 * ----
 *   Replace an indirect call (\`call qword ptr [rax]\`) with a direct call
 *   to the function the pointer is *known* to point to. Once direct, the
 *   call can be inlined.
 *
 *   In C++ this is a \`virtual\` call resolved at compile time. In C it's
 *   any &quot;vtable&quot; pattern: a struct of function pointers initialized with
 *   \`static const\` values.
 *
 * Pass names
 * ----------
 *   LLVM:  WholeProgramDevirtPass (with LTO), GlobalsAA.
 *   GCC :  ipa-devirt, -fdevirtualize-speculatively.
 *
 * Requirements
 * ------------
 *   – The compiler must prove the called function. This works when:
 *     (a) the vtable field is \`const\` AND its containing object's
 *         initializer is visible, OR
 *     (b) PGO data narrows the target to one likely callee (speculative
 *         devirt: emit a fast direct call + fallback indirect).
 *   – LTO multiplies the surface area where (a) succeeds.
 * ============================================================================
 */
#include &lt;stddef.h&gt;

typedef struct Op {
    void (*go)(int *);
} Op;

static void real_go(int *a) { *a += 1; }
__attribute__((unused)) static void noop_go(int *a) { (void)a; }

static const Op G = { .go = real_go };

void run(const Op *op, int *a) {
    op-&gt;go(a);
}

/*  caller — uses the known constant Op G with a real_go function pointer.
 *  ──────────────────────────────────────────────────────────────────────────
 *  WHAT WE'D EXPECT WITHOUT DEVIRT:
 *      caller:
 *          lea   rdi, [rip + G]
 *          call  run
 *      run:
 *          mov   rax, [rdi]               ; load op-&gt;go
 *          mov   rdi, rsi
 *          jmp   qword ptr [rax]          ; INDIRECT call
 *      real_go:
 *          inc   dword ptr [rdi]
 *          ret
 *
 *  ACTUAL (-O3):
 *      caller:
 *          inc   dword ptr [rdi]          ; THE ENTIRE FUNCTION
 *          ret
 *
 *  WHY (three optimizations cascading):
 *    1. DEVIRTUALIZATION: G.go is a const initialiser pointing to
 *       real_go. The compiler sees the constant and replaces the
 *       indirect \`op-&gt;go(a)\` in \`run\` with the direct call \`real_go(a)\`.
 *    2. INLINING of real_go into run: body is one statement → trivial.
 *    3. INLINING of run into caller, with G dropped because nothing
 *       accesses it post-inline.
 *
 *  End result: a single \`inc dword ptr [rdi]\` instruction. The
 *  trampoline-like function-pointer dispatch costs ZERO machine
 *  instructions.
 */
void caller(int *a) {
    run(&amp;G, a);
}

/*  caller_dyn — op is an opaque pointer.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      caller_dyn:
 *          mov   rax, rdi
 *          mov   rdi, rsi
 *          jmp   qword ptr [rax]          ; tail-INDIRECT call
 *
 *  WHY: The compiler doesn't know which Op \`op\` points to. No devirt
 *  possible (would need PGO or whole-program analysis to know it's
 *  always &amp;G in practice). The call survives — but at least TCE turned
 *  \`call ... ; ret\` into \`jmp ...\`, saving the call frame.
 *
 *  TO MAKE THIS DEVIRTUALIZE: build with -flto so the linker can see
 *  all callers and prove that op is always &amp;G. Or speculatively devirt
 *  using PGO data: \`if (op == &amp;G) real_go(a); else op-&gt;go(a);\` which
 *  the branch predictor handles well.
 */
void caller_dyn(const Op *op, int *a) {
    run(op, a);
}

</code></pre>` },
  { name: `31. Interprocedural / Tail Call`, path: `03_interprocedural/05_tail_call.c`, dir: `03_interprocedural`, body: `<h1 id="05_tail_callc">05_tail_call.c</h1>
<pre><code class="language-c">/* 05_tail_call.c — TAIL CALL ELIMINATION (TCE / Sibling Calls)
 * ============================================================================
 *
 * What it is
 * ----------
 *   \`... ; call f ; ret\` is replaced by \`... ; jmp f\`. The caller's
 *   stack frame is REUSED by the callee. Tail-recursive calls become
 *   loops with NO stack growth.
 *
 *   &quot;Sibling calls&quot; are the same transformation across DIFFERENT
 *   functions (not just recursion) — possible when the ABIs match.
 *
 * Why it matters
 * --------------
 *   – Constant stack usage for tail-recursive algorithms (no SIGSEGV).
 *   – One fewer call/ret pair → better Return-Address-Stack accuracy →
 *     better branch prediction.
 *   – Often enables a return to be predicted directly to the next
 *     instruction after the original *grand*caller's call site.
 *
 * Pass names
 * ----------
 *   LLVM:  TailCallElimPass (early) + backend MachineTailCall (final).
 *   GCC :  -foptimize-sibling-calls (on by default at -O2+).
 *
 * Requirements
 * ------------
 *   – Caller and callee ABIs are compatible (same return type / cleanup).
 *   – The call's return value flows DIRECTLY to caller's return.
 *   – No destructors / cleanup in scope (C++).
 *   – No \`va_list\` passed by reference.
 * ============================================================================
 */

/*  fact_tail — tail-recursive factorial becomes a LOOP.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3): the function is no longer recursive at the asm level.
 *  Instead the compiler:
 *    1. TCE'd the recursion → loop.
 *    2. Recognised the multiplicative reduction.
 *    3. VECTORIZED the loop using SSE pmulld, processing 8 elements per
 *       iteration with 4-wide vector multiplications.
 *
 *  The relevant labels are:
 *      fact_tail:
 *          ...           ; jump to vectorized loop
 *      LBB0_4:           ; main vector loop (×8 elements per iter)
 *          pmulld xmm1, xmm5
 *          pmulld xmm0, xmm2
 *          ...
 *      LBB0_6:           ; scalar tail loop (residual &lt;8 iterations)
 *      LBB0_7:
 *          ret
 *
 *  WHAT WE'D EXPECT WITHOUT TCE: a stack-eating recursive call:
 *      fact_tail:
 *          test edi, edi
 *          je   .base
 *          imul esi, edi
 *          dec  edi
 *          call fact_tail        ; ← recursion, frame per call
 *          ret
 *      .base:
 *          mov  eax, esi
 *          ret
 *
 *  WHY: After TCE the IR is a loop \`while (n) { acc *= n; n--; }\`. SCEV
 *  + LoopVectorize recognise the multiplicative reduction and SIMD-ify.
 *  The &quot;function call&quot; is gone; the &quot;loop&quot; is vectorized. Two
 *  optimizations stacked.
 */
int fact_tail(int n, int acc) {
    if (n == 0) return acc;
    return fact_tail(n - 1, acc * n);
}

/*  sibling — tail call across functions.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      sibling:
 *          jmp  _other            ; TAILCALL
 *
 *  WHAT WE'D EXPECT WITHOUT TCE:
 *      sibling:
 *          inc  edi
 *          call _other
 *          ret
 *
 *  WHY: The result of \`other(x+1)\` is the function's return value, and
 *  both signatures are \`int(int)\` — ABI compatible. TCE turns the
 *  \`call ... ; ret\` into a single \`jmp\`. The caller's stack frame is
 *  reused.
 *
 *  NOTE: The \`x + 1\` adjustment happens *before* the jmp (gets folded
 *  with the argument register update). In the actual asm, since \`x\` is
 *  already in EDI and we want EDI+1, the compiler often emits one
 *  \`inc edi\` and jmps. The exact shape depends on the prologue.
 */
extern int other(int);

int sibling(int x) {
    return other(x + 1);
}

/*  musttail — force the optimizer to perform TCE.
 *  ──────────────────────────────────────────────────────────────────────────
 *  Clang's \`[[clang::musttail]]\` (also \`__attribute__((musttail))\`) is a
 *  HARD requirement: if the compiler cannot tail-call, it errors out.
 *  Use this for interpreters and other code where the runtime
 *  correctness depends on no stack growth.
 */
#if defined(__clang__)
__attribute__((noinline))
int musttail_demo(int n, int acc) {
    if (n == 0) return acc;
    __attribute__((musttail)) return musttail_demo(n - 1, acc + n);
}
#endif

</code></pre>` },
  { name: `32. Interprocedural / Attributes`, path: `03_interprocedural/06_attributes.c`, dir: `03_interprocedural`, body: `<h1 id="06_attributesc">06_attributes.c</h1>
<pre><code class="language-c">/* 06_attributes.c — FUNCTION ATTRIBUTES THE OPTIMIZER CARES ABOUT
 * ============================================================================
 *
 * Attributes are the user's way of HANDING THE OPTIMIZER information it
 * can't derive on its own. They unlock entire categories of transforms.
 *
 * Most useful attributes
 * ----------------------
 *   __attribute__((const))      No memory access, no state, deterministic
 *                               in args. CALLS CAN BE CSE'd. (LLVM:
 *                               readnone willreturn)
 *
 *   __attribute__((pure))       Reads memory but doesn't write. Calls CSE
 *                               across non-writing code. (LLVM: readonly)
 *
 *   __attribute__((noreturn))   Doesn't return. Optimizer knows code
 *                               after the call is unreachable; saves
 *                               prologue/epilogue.
 *
 *   __attribute__((nonnull))    Listed pointer args must be non-null.
 *                               Null checks on those args are deleted.
 *
 *   __attribute__((malloc))     Returns a unique pointer. AA returns
 *                               NoAlias against any other live pointer.
 *
 *   __attribute__((returns_nonnull))    Result is non-null.
 *
 *   __attribute__((cold))       Function is rarely called. Affects
 *                               register allocation (use callee-saveds),
 *                               placement (cold section).
 *
 *   __attribute__((hot))        Function is often called. Affects
 *                               inlining heuristic and placement.
 *
 *   __attribute__((flatten))    Inline all calls inside this function
 *                               aggressively, regardless of cost.
 *
 *   __attribute__((target(&quot;X&quot;))) Compile this function with extra ISA
 *                               extensions enabled.
 * ============================================================================
 */
#include &lt;stdint.h&gt;

__attribute__((const)) extern int const_helper(int x);
__attribute__((pure))  extern int pure_helper(int x);

/*  demo_const — \`const\` lets the call CSE.
 *  ──────────────────────────────────────────────────────────────────────────
 *  Source: int a = const_helper(x); int b = const_helper(x); return a+b;
 *
 *  ACTUAL (-O3):
 *      demo_const:
 *          push  rax                      ; align stack for the call
 *          call  const_helper             ; ONE call
 *          add   eax, eax                 ; a + b = 2a
 *          pop   rcx
 *          ret
 *
 *  WHAT WE'D GET WITHOUT \`const\`:
 *      demo_const:
 *          push  rbx
 *          mov   ebx, edi                 ; save x
 *          call  const_helper             ; first call
 *          mov   ebp, eax                 ; save a
 *          mov   edi, ebx                 ; restore x
 *          call  const_helper             ; SECOND call
 *          add   eax, ebp
 *          pop   rbx
 *          ret
 *
 *  WHY: \`const\` ≡ LLVM \`readnone willreturn\`. The optimizer knows the
 *  call is a pure function of its args — same arg, same result, no side
 *  effects. CSE eliminates the second call.
 */
int demo_const(int x) {
    int a = const_helper(x);
    int b = const_helper(x);
    return a + b;
}

/*  demo_pure — \`pure\` is weaker; a write in between blocks CSE.
 *  ──────────────────────────────────────────────────────────────────────────
 *  Source: int a = pure_helper(x); *flag = 0; int b = pure_helper(x); return a+b;
 *
 *  ACTUAL (-O3):
 *      demo_pure:
 *          ...
 *          call  pure_helper              ; first call
 *          mov   r14d, eax                ; save a
 *          mov   dword ptr [rbx], 0       ; *flag = 0  ← WRITE
 *          ...
 *          call  pure_helper              ; SECOND call (the write killed CSE)
 *          add   eax, r14d                ; a + b
 *          ret
 *
 *  WHY: \`pure\` ≡ LLVM \`readonly\`. The helper READS memory; the store
 *  to *flag may have changed something the helper would observe. The
 *  optimizer conservatively re-executes the second call.
 *
 *  To get CSE despite the write: use \`const\` (helper reads NOTHING) or
 *  add a \`restrict\` qualifier that proves *flag is in a region the
 *  helper cannot reach.
 */
int demo_pure(int x, int *flag) {
    int a = pure_helper(x);
    *flag = 0;
    int b = pure_helper(x);
    return a + b;
}

/*  demo_noreturn — die() never returns.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      demo_noreturn:
 *          test  edi, edi
 *          js    .die_path                ; if x &lt; 0 → die
 *          inc   edi
 *          mov   eax, edi
 *          ret
 *      .die_path:
 *          push  rax
 *          call  die                      ; NO ret after; saves bytes
 *
 *  WHY: \`noreturn\` tells the optimizer the call doesn't come back. The
 *  trailing \`ret\` is omitted (\`die\` will not unwind). The push for
 *  stack alignment is the only setup; no return-value handling.
 */
__attribute__((noreturn)) extern void die(void);

int demo_noreturn(int x) {
    if (x &lt; 0) die();
    return x + 1;
}

/*  demo_nonnull — null check on a \`nonnull\` parameter is dropped.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3):
 *      demo_nonnull:
 *          push  rbx
 *          mov   rbx, rdi
 *          call  use_ptr                  ; passes p, knows p != null
 *          add   eax, dword ptr [rbx]     ; deref p WITHOUT a null check
 *          pop   rbx
 *          ret
 *
 *  WITHOUT nonnull, the compiler would have to keep a \`if (!p) return …;\`
 *  guard, or at minimum tolerate that \`use_ptr(p)\` is a no-op when p
 *  is null and the subsequent deref is UB.
 *
 *  WHY: \`nonnull\` ≡ LLVM \`nonnull\` parameter attribute on use_ptr's
 *  first arg. Calling with null is UB; the compiler assumes p != null
 *  for the rest of the function, deleting any test against null.
 */
__attribute__((nonnull(1))) extern int use_ptr(const int *p);

int demo_nonnull(int *p) {
    return use_ptr(p) + *p;
}

#if defined(__x86_64__) || defined(_M_X64)
/*  demo_avx2 — only emitted on x86_64; uses AVX2 even at default ISA.
 *  ──────────────────────────────────────────────────────────────────────────
 *  ACTUAL (-O3 -march=x86-64-v2): the inner loop uses VPADDD ymm
 *  instructions because of the \`target(&quot;avx2&quot;)\` attribute — even though
 *  the rest of the TU compiles for baseline x86-64-v2 (SSE only).
 *
 *  Use this to opt-in to wider SIMD on a per-function basis without
 *  raising the global ISA level (which would crash on older CPUs that
 *  call ANY function in the TU).
 */
__attribute__((target(&quot;avx2&quot;)))
void demo_avx2(int * restrict a, const int * restrict b, int n) {
    for (int i = 0; i &lt; n; i++) a[i] = a[i] + b[i];
}
#endif

</code></pre>` },
  { name: `33. Interprocedural / Lto`, path: `03_interprocedural/07_lto.c`, dir: `03_interprocedural`, body: `<h1 id="07_ltoc">07_lto.c</h1>
<pre><code class="language-c">/* 07_lto.c — LINK-TIME OPTIMIZATION (LTO / ThinLTO)
 * ============================================================================
 *
 *   \`add\` is defined here and called from 07_lto_mod.c. With or without
 *   LTO the source is identical; only the build pipeline changes.
 *
 * What LTO does
 * -------------
 *   1. Each \`cc -flto -c file.c\` emits *LLVM bitcode* (or GCC GIMPLE)
 *      into the .o file instead of native code.
 *   2. At link time, the linker calls back into the compiler (&quot;LTO
 *      plugin&quot;) with all bitcode merged.
 *   3. The optimizer then runs whole-program: inlining, devirtualization,
 *      IPSCCP, IPA-SRA, dead-function removal, etc.
 *   4. Native code is emitted ONCE at the end.
 *
 *   ThinLTO splits the merged bitcode by function, runs per-function
 *   summary analyses, then schedules backend compilation in parallel.
 *   Quality close to full LTO at a fraction of the link time.
 *
 * What changes for THIS function
 * ------------------------------
 *   Without LTO:
 *     add() is compiled to its own little function:
 *       add:
 *           lea  eax, [rdi + rsi]
 *           ret
 *     callee_no_lto() must emit a real call:
 *       callee_no_lto:
 *           mov  edi, 1
 *           mov  esi, 2
 *           jmp  add            ; (TCE turns call+ret into jmp)
 *
 *   With LTO:
 *     The linker sees both TUs in bitcode. The inliner sees add() is a
 *     tiny pure leaf function. It inlines add(1, 2) into callee_no_lto(),
 *     which then constant-folds to:
 *       callee_no_lto:
 *           mov  eax, 3
 *           ret
 *     and \`add\` itself may be deleted from the final binary as unused.
 *
 * Build &amp; inspect
 * ---------------
 *   Without LTO:
 *     cc -O2 -c 07_lto.c     -o 07_lto.o
 *     cc -O2 -c 07_lto_mod.c -o 07_lto_mod.o
 *     cc -O2    07_lto.o 07_lto_mod.o -o 07_lto.out
 *     objdump -d --disassemble=callee_no_lto 07_lto.out | head -10
 *       ; expect: tail-call (jmp) to add survives.
 *
 *   With LTO:
 *     cc -O2 -flto -c 07_lto.c     -o 07_lto.o
 *     cc -O2 -flto -c 07_lto_mod.c -o 07_lto_mod.o
 *     cc -O2 -flto 07_lto.o 07_lto_mod.o -o 07_lto.out
 *     objdump -d --disassemble=callee_no_lto 07_lto.out | head -10
 *       ; expect: \`mov eax, 3 ; ret\`. add() inlined, constants folded,
 *       ; original add symbol DCE'd.
 *
 *   With ThinLTO:
 *     cc -O2 -flto=thin -c 07_lto.c     -o 07_lto.o
 *     cc -O2 -flto=thin -c 07_lto_mod.c -o 07_lto_mod.o
 *     cc -O2 -flto=thin 07_lto.o 07_lto_mod.o -o 07_lto.out
 *
 * Why every serious shipping binary uses LTO
 * ------------------------------------------
 *   – Inlining across TU boundaries (especially for getters / small
 *     wrappers in libraries).
 *   – Whole-program devirtualization (C++ virtual calls become direct).
 *   – Dead function elimination across libraries.
 *   – Cross-TU IPSCCP / arg promotion.
 *   – Better register allocation when callees are visible.
 * ============================================================================
 */
int add(int a, int b) {
    return a + b;
}

</code></pre>` },
  { name: `34. Interprocedural / Lto Mod`, path: `03_interprocedural/07_lto_mod.c`, dir: `03_interprocedural`, body: `<h1 id="07_lto_modc">07_lto_mod.c</h1>
<pre><code class="language-c">/* 07_lto_mod.c — caller of \`add\` from 07_lto.c.
 *
 * See 07_lto.c for the full LTO walkthrough.
 *
 * Quick check (after building with the recipe in 07_lto.c):
 *
 *   Without -flto:
 *     callee_no_lto:
 *       mov   edi, 1
 *       mov   esi, 2
 *       jmp   _add               ; tail call to add survives across TU
 *
 *   With -flto:
 *     callee_no_lto:
 *       mov   eax, 3              ; whole call vanished; constants folded
 *       ret
 */
extern int add(int, int);

int callee_no_lto(void) {
    return add(1, 2);
}

</code></pre>` },
  { name: `35. Interprocedural`, path: `03_interprocedural/README.md`, dir: `03_interprocedural`, body: `<h1 id="03--interprocedural-optimizations-ipo">03 — Interprocedural Optimizations (IPO)</h1>
<p>Local and loop optimizations look at one function at a time. <strong>IPO</strong> crosses
function boundaries. The single most impactful interprocedural optimization
is <strong>inlining</strong> — almost every other IPO derives its power from being able to
<em>see across</em> a call.</p>
<h2 id="map">Map</h2>
<table>
<thead>
<tr>
<th>#</th>
<th>Example</th>
<th>Optimization</th>
</tr>
</thead>
<tbody>
<tr>
<td>01</td>
<td><code>01_inlining.c</code></td>
<td>Inlining (cost model, heuristics)</td>
</tr>
<tr>
<td>02</td>
<td><code>02_ipsccp.c</code></td>
<td>Interprocedural Sparse Conditional CP</td>
</tr>
<tr>
<td>03</td>
<td><code>03_arg_promotion.c</code></td>
<td>Argument promotion (by-ref → by-value)</td>
</tr>
<tr>
<td>04</td>
<td><code>04_devirtualization.c</code></td>
<td>Devirtualization</td>
</tr>
<tr>
<td>05</td>
<td><code>05_tail_call.c</code></td>
<td>Tail-call elimination</td>
</tr>
<tr>
<td>06</td>
<td><code>06_attributes.c</code></td>
<td>Function attributes that unlock IPO</td>
</tr>
<tr>
<td>07</td>
<td><code>07_lto.c</code> + <code>07_lto_mod.c</code></td>
<td>Link-Time Optimization, ThinLTO</td>
</tr>
</tbody>
</table>
<h2 id="why-ipo-matters">Why IPO matters</h2>
<pre><code>                  ┌─────────────────────────────────┐
                  │  Without IPO every TU is a wall │
                  └────────────┬────────────────────┘
                               │
        ┌──────────────────────┴───────────────────────┐
        ▼                                              ▼
   ┌──────────┐                                  ┌──────────┐
   │  caller  │       opaque call                │  callee  │
   │          │ ────────────────────────────────►│          │
   │  knows:  │                                  │  knows:  │
   │  args    │      nothing about callee        │  body    │
   │  return  │                                  │          │
   └──────────┘                                  └──────────┘
</code></pre>
<p>With IPO (typically via inlining or LTO):</p>
<pre><code>   ┌─────────────────────────────────────────────────┐
   │  optimizer sees BOTH sides of the call          │
   │  – constants in args become known inside body   │
   │  – body's reads/writes inform caller's AA       │
   │  – the call itself often disappears             │
   └─────────────────────────────────────────────────┘
</code></pre>
<h2 id="01--inlining">01 · Inlining</h2>
<blockquote>
<p>&ldquo;Replace a call with a <em>copy</em> of the callee&rsquo;s body.&rdquo;</p>
</blockquote>
<pre><code>   BEFORE                                  AFTER INLINE
   ──────                                  ────────────
   int square(int x) { return x*x; }       (the call site contains)

   int caller(int n) {                     int caller(int n) {
       return square(n + 1);                   int t = n + 1;
   }                                            return t * t;
                                            }
</code></pre>
<h3 id="why-inlining-is-the-king">Why inlining is the king</h3>
<p>It enables almost every other optimization:</p>
<pre><code>   inline ─┬─► constant propagation across call
           ├─► dead-arg elimination
           ├─► escape analysis (callee's locals are visible)
           ├─► alias analysis (no more &quot;opaque call&quot; wall)
           ├─► loop opts on the inlined body
           └─► tail-call combine with caller's epilogue
</code></pre>
<h3 id="cost-model-both-compilers">Cost model (both compilers)</h3>
<p>Each candidate gets a <em>cost</em> in pseudo-instructions and a <em>benefit</em> (constant
folding triggered, branches removed). Inline iff <code>benefit − cost ≥ threshold</code>.</p>
<p>Typical knobs:</p>
<table>
<thead>
<tr>
<th>Knob</th>
<th>GCC</th>
<th>Clang/LLVM</th>
</tr>
</thead>
<tbody>
<tr>
<td>Force inline</td>
<td><code>__attribute__((always_inline))</code></td>
<td><code>__attribute__((always_inline))</code></td>
</tr>
<tr>
<td>Forbid inline</td>
<td><code>__attribute__((noinline))</code></td>
<td><code>__attribute__((noinline))</code></td>
</tr>
<tr>
<td>Adjust threshold</td>
<td><code>--param inline-unit-growth=…</code></td>
<td><code>-mllvm -inline-threshold=…</code></td>
</tr>
<tr>
<td>Force inline of <code>inline</code> keyword</td>
<td><code>-finline-functions</code></td>
<td>always at <code>-O2+</code></td>
</tr>
<tr>
<td>Show decisions</td>
<td><code>-fopt-info-inline</code></td>
<td><code>-Rpass=inline</code>, <code>-Rpass-missed=inline</code></td>
</tr>
</tbody>
</table>
<h3 id="what-inhibits-inlining">What inhibits inlining</h3>
<ul>
<li>Recursion (only partial inlining of recursive calls).</li>
<li>Function pointers / indirect calls without devirtualization.</li>
<li><code>noinline</code>, <code>volatile</code> arguments.</li>
<li>ABI mismatches (variadic, <code>setjmp</code>, exceptions in C++).</li>
<li>Cross-TU calls without LTO (the body just isn&rsquo;t visible).</li>
</ul>
<h3 id="picture-how-inlining-propagates-constants">Picture: how inlining propagates constants</h3>
<pre><code>   call site: square(n+1)
                  │
                  ▼ inline
                  │
        ┌──────────────────────┐
        │ int t = n + 1;       │
        │ int r = t * t;       │
        │ return r;            │
        └──────────────────────┘

   If the caller knows n is a constant (say 5), the inlined body becomes
        int t = 6;
        int r = 36;
        return 36;                  ← whole call collapses to a literal
</code></pre>
<h2 id="02--interprocedural-sparse-conditional-cp-ipsccp">02 · Interprocedural Sparse Conditional CP (IPSCCP)</h2>
<p>SCCP across the whole call graph. If every call to <code>f(x)</code> passes <code>x = 0</code>,
the optimizer specializes <code>f</code> for <code>x = 0</code>.</p>
<pre><code>   ┌────────────┐  call f(0)  ┌──────────────┐
   │  caller A  │ ───────────►│              │
   └────────────┘             │   f(x)       │   ◄─── IPSCCP discovers
   ┌────────────┐  call f(0)  │   if (x) …   │       x always == 0,
   │  caller B  │ ───────────►│   else …     │       eliminates the
   └────────────┘             └──────────────┘       \`if\` branch.
</code></pre>
<p>LLVM: <code>IPSCCPPass</code>. GCC: <code>tree-ipa-ccp</code> plus <code>tree-ipa-prop</code>.</p>
<h2 id="03--argument-promotion">03 · Argument promotion</h2>
<p>A function that takes a <code>T *</code> and only ever dereferences it (no escape, no
stores) can be rewritten to take <code>T</code> by value. Result: one less indirection,
the parameter ends up in a register.</p>
<pre><code>   BEFORE                                  AFTER
   ──────                                  ─────
   int hot(const int *p) {                 int hot(int v) {
       return *p + 1;                          return v + 1;
   }                                       }
   ...                                     ...
   int r = hot(&amp;x);                        int r = hot(x);
</code></pre>
<p>LLVM: <code>ArgumentPromotionPass</code>. GCC: <code>ipa-sra</code> (Scalar Replacement of
Aggregates inter-procedurally).</p>
<h2 id="04--devirtualization">04 · Devirtualization</h2>
<p>The C++ equivalent: a virtual call resolved at compile time.</p>
<pre><code>   B *p = new D();
   p-&gt;foo();                  ───►   D::foo(p);
                                       │
                                       ▼
                                  inline if small enough
</code></pre>
<p>Conditions:</p>
<ul>
<li>The compiler can prove (or assume, with <code>-fstrict-vtable-pointers</code>,
  <code>final</code>, anonymous namespaces, <code>-fwhole-program</code>) that the dynamic type
  is <code>D</code>.</li>
<li>LTO greatly increases the surface where this fires.</li>
</ul>
<p>LLVM: <code>WholeProgramDevirtPass</code> (with LTO). GCC: <code>-fdevirtualize</code>,
<code>-fdevirtualize-speculatively</code>, <code>ipa-devirt</code>.</p>
<h2 id="05--tail-call-elimination-tce">05 · Tail-call elimination (TCE)</h2>
<p>If a call is in <em>tail position</em>, the caller&rsquo;s frame can be <strong>reused</strong> by
the callee. Recursive calls become loops.</p>
<pre><code>   factorial(n, acc) {                   factorial:
     if (n == 0) return acc;             1: cmp n, 0
     return factorial(n-1, acc*n);       2: je  done
   }                                     3: mul acc, n
                                          4: sub n,  1
                                          5: jmp 1             ← TCE: no call!
                                          6: done: mov ret, acc
</code></pre>
<p>LLVM: <code>TailCallElimPass</code>. GCC: <code>-foptimize-sibling-calls</code> (on by default).
Both compilers also do <strong>sibling-call</strong> elimination across functions with
compatible signatures.</p>
<p>Caveats:</p>
<ul>
<li>Caller and callee ABI must allow it (matching argument shapes; no
  stack-passed <code>va_args</code>; no destructors in scope in C++).</li>
<li>The call must be the <em>last</em> thing the caller does <em>and</em> its return value
  must flow directly to caller&rsquo;s return.</li>
</ul>
<h2 id="06--function-attributes-that-unlock-ipo">06 · Function attributes that unlock IPO</h2>
<pre><code class="language-c">__attribute__((const))      // No memory reads, no side effects. Strongest.
__attribute__((pure))       // Reads memory but no side effects.
__attribute__((noreturn))   // Lets caller drop the epilogue (e.g. for exit()).
__attribute__((malloc))     // Result aliases nothing the caller can see.
__attribute__((nonnull(1))) // Tells AA that argument 1 isn't null.
__attribute__((returns_nonnull))
__attribute__((cold))       // Demote to .text.cold; reorder branches against it.
__attribute__((hot))        // Promote; preserve I-cache neighbours.
__attribute__((always_inline))
__attribute__((noinline))
__attribute__((flatten))    // Recursively inline everything called.
__attribute__((target(&quot;avx2&quot;))) // Compile this function for a specific ISA.
</code></pre>
<p>LLVM IR equivalents on the function: <code>readnone</code>, <code>readonly</code>, <code>writeonly</code>,
<code>noreturn</code>, <code>nonnull</code>, <code>noalias</code>, <code>dereferenceable(N)</code>, <code>cold</code>, <code>hot</code>.</p>
<h2 id="07--link-time-optimization-lto-and-thinlto">07 · Link-Time Optimization (LTO) and ThinLTO</h2>
<p>Without LTO, each translation unit is optimized independently and the linker
just shuffles bytes. With LTO, the optimizer <strong>runs again</strong> at link time
with the <em>entire program</em> visible.</p>
<pre><code>   ┌────────────┐    ┌────────────┐    ┌────────────┐
   │   a.c      │    │   b.c      │    │   c.c      │
   │   ─►a.o    │    │   ─►b.o    │    │   ─►c.o    │  ← bytecode/IR with -flto
   └──────┬─────┘    └──────┬─────┘    └──────┬─────┘
          └─────────────┬────────────────────┘
                        ▼
              ┌─────────────────────┐
              │ linker merges IR,   │
              │ optimizer runs      │   ◄── whole-program view enables
              │ AGAIN on the whole  │       cross-TU inlining, dead-fn
              │ program             │       elimination, devirtualization
              └──────────┬──────────┘
                         ▼
                       a.out
</code></pre>
<h3 id="full-lto-vs-thinlto">Full LTO vs ThinLTO</h3>
<table>
<thead>
<tr>
<th>Aspect</th>
<th>Full LTO</th>
<th>ThinLTO</th>
</tr>
</thead>
<tbody>
<tr>
<td>Memory at link</td>
<td>Linear in program size; can be huge</td>
<td>Bounded; per-TU + summary</td>
</tr>
<tr>
<td>Link wall-clock</td>
<td>Long, single-threaded link step</td>
<td>Parallel across TUs</td>
</tr>
<tr>
<td>Distributed build</td>
<td>Not friendly</td>
<td>Cache-friendly, distributable</td>
</tr>
<tr>
<td>Quality of opts</td>
<td>Best</td>
<td>Within ~95% of full LTO</td>
</tr>
<tr>
<td>Flags (Clang)</td>
<td><code>-flto</code></td>
<td><code>-flto=thin</code></td>
</tr>
<tr>
<td>Flags (GCC)</td>
<td><code>-flto</code></td>
<td><code>-flto=jobserver</code> for parallelism</td>
</tr>
</tbody>
</table>
<h3 id="what-lto-actually-unlocks">What LTO actually unlocks</h3>
<ul>
<li><strong>Cross-TU inlining</strong> (huge for templated C++ code).</li>
<li><strong>Devirtualization</strong> with whole-program assumption.</li>
<li><strong>Dead-symbol elimination</strong> at function/global granularity.</li>
<li><strong>ConstMerge</strong> of identical constants across TUs.</li>
<li><strong>Layout</strong> of <code>.text</code> for I-cache (see chapter 10).</li>
</ul>
<h3 id="hello-world-demo">Hello-world demo</h3>
<pre><code>    07_lto.c        ─── defines  int add(int,int)
    07_lto_mod.c    ─── uses     add() and ALWAYS passes (1,2)

    Without LTO: separate .o; the call to add stays.
    With LTO:    add() is inlined into the caller and the constants
                 propagate. Final code: mov eax, 3 ; ret.
</code></pre>
<p>Run:</p>
<pre><code class="language-bash">clang -O2 -flto -c 07_lto.c     -o 07_lto.o
clang -O2 -flto -c 07_lto_mod.c -o 07_lto_mod.o
clang -O2 -flto 07_lto.o 07_lto_mod.o -o 07_lto.out
objdump -d 07_lto.out | sed -n '/&lt;callee&gt;:/,/^$/p'
</code></pre>
<pre><code class="language-bash">gcc -O2 -flto -c 07_lto.c     -o 07_lto.o
gcc -O2 -flto -c 07_lto_mod.c -o 07_lto_mod.o
gcc -O2 -flto 07_lto.o 07_lto_mod.o -o 07_lto.out
</code></pre>
<h3 id="pitfalls">Pitfalls</h3>
<ul>
<li>Static libraries must be built with the same LTO bytecode/IR version.</li>
<li><code>__attribute__((used))</code> may be needed to keep symbols the linker
  can&rsquo;t see referenced (e.g. resolved by <code>dlsym</code>).</li>
<li>Debug-info quality with LTO is improving but still imperfect.</li>
</ul>
